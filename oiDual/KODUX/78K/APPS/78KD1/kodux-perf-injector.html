<script>

/**
 * KODUX ORB NEXUS - PERFORMANCE INJECTOR
 * Auto-analisa o DOM rodando e injeta patches cirúrgicos on-the-fly.
 * Pronto para ser injetado via monólito (1 linha).
 */
(function() {
    // Evita injeção dupla
    if (document.getElementById('kdx-perf-container')) return;

    // =========================================================================
    // 1. INJETAR CSS DO WIDGET E DO PATCH DE PERFORMANCE
    // =========================================================================
    const style = document.createElement('style');
    style.innerHTML = `
        /* --- A. PATCH DE PERFORMANCE UNIVERSAL --- */
        html[data-kdx-perf="on"] [data-kdx-fx~="shadow"] { 
            box-shadow: none !important; 
        }
        html[data-kdx-perf="on"] [data-kdx-fx~="glass"] { 
            backdrop-filter: none !important; 
            -webkit-backdrop-filter: none !important; 
            /* Fallback escuro para não ficar invisível sem o vidro */
            background-color: rgba(15, 15, 20, 0.95) !important; 
        }
        html[data-kdx-perf="on"] [data-kdx-fx~="blur"] { 
            filter: none !important; 
        }
        /* Desliga transições e força renderização de GPU apenas quando ativo */
        html[data-kdx-perf="on"] * { 
            transition: none !important; 
            animation-duration: 0.01s !important; 
            will-change: auto !important; 
        }

        /* --- B. ESTILO DO WIDGET FLUTUANTE (NEXUS VIBE) --- */
        #kdx-perf-container {
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            z-index: 2147483647; /* Máximo possível */
            font-family: 'JetBrains Mono', 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
        }
        .kdx-fab {
            width: 55px; 
            height: 55px; 
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: 2px solid rgba(255,255,255,0.2); 
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .kdx-fab:hover { 
            transform: scale(1.1) rotate(5deg); 
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.6);
        }
        .kdx-fab svg { 
            width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 2.5; 
        }
        
        .kdx-panel {
            position: absolute; 
            bottom: 75px; 
            right: 0;
            width: 320px; 
            background: rgba(10, 10, 12, 0.95); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #27273a;
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            display: none; 
            flex-direction: column; 
            gap: 15px;
            opacity: 0; 
            transform: translateY(20px); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom right;
        }
        .kdx-panel.open {
            display: flex; 
            opacity: 1; 
            transform: translateY(0);
        }
        .kdx-header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #27273a; padding-bottom: 10px; 
        }
        .kdx-header h3 { 
            margin: 0; font-size: 15px; font-weight: 800; color: #fff; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .kdx-header h3 span { color: #6366f1; }
        
        .kdx-stat-row { 
            display: flex; justify-content: space-between; font-size: 13px; color: #94a3b8; 
            padding: 4px 0;
        }
        .kdx-stat-val { font-weight: bold; color: #10b981; }
        
        .kdx-btn-scan {
            background: #1e1e2e; color: #fff; border: 1px solid #3f3f5a;
            padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .kdx-btn-scan:hover { background: #2a2a3e; border-color: #6366f1; }
        
        .kdx-toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(30, 30, 46, 0.6); padding: 15px; border-radius: 10px; border: 1px solid #3f3f5a;
            margin-top: 5px;
        }
        .kdx-toggle span { font-size: 14px; font-weight: bold; color: #fff; }
        
        /* Toggle Switch Customizado */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f5a; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .kdx-pulse { animation: kdx-pulse 2s infinite; }
        @keyframes kdx-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    `;
    document.head.appendChild(style);

    // =========================================================================
    // 2. CONSTRUIR UI HTML
    // =========================================================================
    const container = document.createElement('div');
    container.id = 'kdx-perf-container';
    container.innerHTML = `
        <div class="kdx-panel" id="kdx-panel">
            <div class="kdx-header">
                <h3>⚡ KODUX <span>PERF-CORE</span></h3>
                <button id="kdx-close" style="border:none;background:none;color:#94a3b8;font-size:18px;cursor:pointer;">✕</button>
            </div>
            <p style="font-size:12px; margin:0; color:#64748b; line-height: 1.4;">
                Scanner de renderização. Mapeia o DOM rodando e injeta override em elementos pesados.
            </p>
            
            <button class="kdx-btn-scan" id="kdx-btn-scan">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Escanear DOM em Tempo Real
            </button>
            
            <div id="kdx-stats" style="display:none; flex-direction:column; gap:8px; margin: 5px 0; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; border: 1px dashed #3f3f5a;">
                <div class="kdx-stat-row">Box-Shadow (Sombras): <span class="kdx-stat-val" id="stat-shadow">0</span></div>
                <div class="kdx-stat-row">Backdrop-Filter (Vidro): <span class="kdx-stat-val" id="stat-glass">0</span></div>
                <div class="kdx-stat-row">Filter (Blur/Efeitos): <span class="kdx-stat-val" id="stat-blur">0</span></div>
            </div>

            <div class="kdx-toggle">
                <span>Modo Desempenho</span>
                <label class="switch">
                    <input type="checkbox" id="kdx-perf-switch">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="kdx-fab" id="kdx-fab" title="KODUX Performance Core">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
    `;
    document.body.appendChild(container);

    // =========================================================================
    // 3. LÓGICA DO MOTOR
    // =========================================================================
    const fab = document.getElementById('kdx-fab');
    const panel = document.getElementById('kdx-panel');
    const btnClose = document.getElementById('kdx-close');
    const btnScan = document.getElementById('kdx-btn-scan');
    const perfSwitch = document.getElementById('kdx-perf-switch');
    const statsBox = document.getElementById('kdx-stats');

    // Abre / Fecha painel flutuante
    fab.addEventListener('click', () => panel.classList.toggle('open'));
    btnClose.addEventListener('click', () => panel.classList.remove('open'));

    // Liga / Desliga Performance
    perfSwitch.addEventListener('change', (e) => {
        if (e.target.checked) {
            // Ativa o Modo Leve
            document.documentElement.setAttribute('data-kdx-perf', 'on');
            fab.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            fab.style.boxShadow = '0 0 20px rgba(16, 185, 129, 0.5)';
            fab.classList.add('kdx-pulse');
        } else {
            // Volta ao Normal (Pesado)
            document.documentElement.setAttribute('data-kdx-perf', 'off');
            fab.style.background = 'linear-gradient(135deg, #6366f1, #a855f7)';
            fab.style.boxShadow = '0 0 20px rgba(99, 102, 241, 0.4)';
            fab.classList.remove('kdx-pulse');
        }
    });

    // Scanner Cirúrgico (A Mágica)
    btnScan.addEventListener('click', () => {
        btnScan.innerHTML = "Escaneando Árvore DOM...";
        btnScan.style.opacity = '0.7';
        
        // Timeout pequeno para permitir que a UI atualize o texto antes de travar a thread
        setTimeout(() => {
            let stats = { shadow: 0, glass: 0, blur: 0 };
            
            // Pega absolutamente TUDO que está renderizado no body
            const allElements = document.querySelectorAll('body *');
            
            allElements.forEach(el => {
                // Ignora o próprio painel injetado para não cagar a UI dele
                if (el.closest('#kdx-perf-container')) return;

                // getComputedStyle lê a CSS final renderizada pelo browser (ignora se veio de inline, class, ou external CSS)
                const computed = window.getComputedStyle(el);
                let fxList = [];

                if (computed.boxShadow !== 'none') { fxList.push('shadow'); stats.shadow++; }
                if (computed.backdropFilter !== 'none') { fxList.push('glass'); stats.glass++; }
                if (computed.filter !== 'none' && computed.filter.includes('blur')) { fxList.push('blur'); stats.blur++; }

                // Se o elemento tiver alguma propriedade gráfica pesada, injetamos nossa tag cirúrgica
                if (fxList.length > 0) {
                    const currentFx = el.getAttribute('data-kdx-fx') || '';
                    const newFx = [...new Set([...currentFx.split(' '), ...fxList])].join(' ').trim();
                    el.setAttribute('data-kdx-fx', newFx);
                }
            });

            // Atualiza estatísticas no Painel
            document.getElementById('stat-shadow').textContent = stats.shadow;
            document.getElementById('stat-glass').textContent = stats.glass;
            document.getElementById('stat-blur').textContent = stats.blur;
            
            statsBox.style.display = 'flex';
            btnScan.innerHTML = "✓ DOM Mapeado e Tagueado!";
            btnScan.style.opacity = '1';
            btnScan.style.borderColor = '#10b981';
            btnScan.style.color = '#10b981';
            
            setTimeout(() => {
                btnScan.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l-4.5 4.5"/></svg> Reescanear DOM';
                btnScan.style.borderColor = '#3f3f5a';
                btnScan.style.color = '#fff';
            }, 3500);

        }, 50);
    });

})();

    </script>
