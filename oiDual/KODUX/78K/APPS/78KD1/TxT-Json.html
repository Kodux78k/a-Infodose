<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Texto → JSON</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111827;
    color:#fff;
    margin:0;
    padding:20px;
}
textarea{
    width:100%;
    height:300px;
    margin:15px 0;
    background:#1f2937;
    color:#fff;
    border:1px solid #444;
    border-radius:10px;
    padding:10px;
    box-sizing:border-box;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#1f2937;
    color:#fff;
    border:1px solid #444;
    border-radius:10px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<h2>📄 Texto → JSON</h2>

<input
id="nome"
placeholder="Nome do arquivo"
value="meu-json">

<textarea
id="texto"
placeholder="Cole seu texto aqui..."></textarea>

<button onclick="salvarJSON()">
💾 Salvar JSON
</button>

<script>
function salvarJSON(){

    const nome =
        document.getElementById("nome").value.trim() || "arquivo";

    const texto =
        document.getElementById("texto").value;

    const json = {
        nome,
        data: new Date().toISOString(),
        texto
    };

    const blob = new Blob(
        [JSON.stringify(json,null,2)],
        {type:"application/json"}
    );

    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=nome+".json";
    a.click();

    URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
