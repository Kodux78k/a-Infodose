<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
<!-- PWA METADATA & VIEWPORT FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f0f11">

<!-- iOS Support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="./icon-192.png">

<!-- Manifest -->
<link rel="manifest" href="./manifest.json">


<link rel="stylesheet" href="https://www.infodose.com.br/css/main.css">

  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-glass-0.css">

  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-e.css">

<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kxt-solar.css"> 


<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-nanai.css"> 
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-glass-0.css">

</head>

<body class="ui-safe-vertical" data-theme="dark" data-arch="" data-user="" data-zpr="" data-intensity="0.72">

 <div id="kxtsk-shell">


    <div class="os-topbar">
      <div class="os-brand">
    
      </div>

      <div class="top-actions">

<div class="win-navrow" onclick="event.stopPropagation()">
      <input
        class="win-urlbar" style="display:flex"
        type="text"
        id="urlInputNav"
        placeholder="Digite uma URL..."
        spellcheck="false"
        autocomplete="off"
      >
      <button class="win-go-btn" style="display:none" type="button" id="goNavBtn">Go</button>
         <button class="launcher-btn" id="openKobBtn">+ Abrir</button>
         <button class="soft-btn" id="openLogsBtn">Logs</button>
  </div>

      </div>
    </div>

    <div id="dock"></div>

    <div id="bg-gradient"></div>

    <div id="bg-fake-custom"></div>

    <div id="arch-overlay"></div>

  <style>
  .win-urlbar{
    width: 100%;
    box-sizing: border-box;
    margin-top: 8px;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    color: #fff;
    outline: none;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 14px;
    transition: .25s ease;
  }
  .win-urlbar::placeholder{
    color: rgba(255,255,255,.45);
  }
  .win-urlbar:focus{
    border-color: rgba(0,242,255,.4);
    box-shadow: 0 0 16px rgba(0,242,255,.15);
    background: rgba(255,255,255,.08);
  }
  .win-navrow{
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
    padding: 0 16px 10px;
    box-sizing: border-box;
  }
  .win-go-btn{
    border: 0;
    border-radius: 12px;
    padding: 10px 12px;
    background: rgba(0,242,255,.12);
    color: #fff;
    cursor: pointer;
    flex: 0 0 auto;
  }
</style>

<div id="stackWrap">
  <div class="session-window peeked" id="session-iframe">
    <div class="win-hdr" onclick="handleHeaderClick(event, 'session-iframe')">
      <div class="win-controls" onclick="event.stopPropagation()">
        <button onclick="minimizeWindow('session-iframe')" title="Minimizar para o Dock">🌐</button>

      </div> 
    </div>

   

    <iframe
      class="win-frame"
      data-runtime="nav"
      id="navFrame"
      src="https://www.infodose.com.br"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
      allow="fullscreen; accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>
</div>


<link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/di_Pad/css/zpr.css">

  <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/bgPanel.js"></script>

  <script src="https://kodux78k.github.io/oiDual--Y-/js/78F-bgPanel.js"></script>
  <div class="theme-switch" id="themeSwitch" title="Alternar tema"></div>
<style> body, html{
overflow-y:auto ;}

</style>

<script src="https://www.infodose.com.br/js/main.js"> </script>

</body>
</html>
