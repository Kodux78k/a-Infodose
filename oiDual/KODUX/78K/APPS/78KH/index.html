<!DOCTYPE html>
<html lang="pt-BR"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>KODUX OS</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22KODUX%20OS%22%2C%22short_name%22%3A%22KODUX%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20fill%3D'%23000'%2F%3E%3Ctext%20x%3D'50'%20y%3D'55'%20font-size%3D'40'%20fill%3D'%23fff'%20text-anchor%3D'middle'%20dominant-baseline%3D'middle'%3EK%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

  <!-- FontAwesome (icons only — zero layout conflict) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- External stylesheets (iFSw patch chain) -->


  
<link rel="stylesheet" href="./css/main.css"></head>
<body data-theme="dark">

  <div id="boot-screen">
    <h1>METALUX • OS v3</h1>
    <div class="boot-bar-wrap">
      <div id="boot-progress"></div>
    </div>
  </div>

  <div id="kxtsk-shell">


    <div class="os-topbar">

      <div class="os-brand">
        KxTsK
        <small>Unified Patch Loader</small>
      </div>

      <div class="top-actions">
        <button class="launcher-btn" id="openKobBtn">+ Abrir</button>
        <button class="soft-btn" id="openLogsBtn">Logs</button>
      </div>
    </div>

<div id="stackWrap"> </div>

    <div id="dock"></div>

    <div id="bg-gradient"></div>

    <div id="bg-fake-custom"></div>

    <div id="arch-overlay"></div>


    <div id="home-screen">
         <div id="stackWrap"></div>
 <h2>oiDual</h2>
      <div id="app-grid"></div>
    </div>

    <div id="dock" style="position:absolute; bottom:20px; display:flex; gap:10px; z-index:90000;"></div>
  </div>

  

  <!-- APP BROWSER (Tab Engine) -->
  <div style="z-index:3" id="app-browser" class="app-view">

    

    <!-- Browser Header -->
    <div class="browser-header glass safe-pt">
      <button class="browser-back-btn" onclick="OS.UI.goHome()">
        <i class="fa-solid fa-chevron-left" style="font-size:.875rem;"></i>
      </button>
      <div class="address-form">
        <i class="fa-solid fa-lock"></i>
        <input type="text" id="address-bar" placeholder="Pesquisar ou URL" onkeydown="if(event.key==='Enter'){OS.Browser.navigateBar();event.preventDefault();}">
        <button class="address-reload-btn" onclick="OS.Browser.reload()">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>
      <button class="tab-count-btn" onclick="OS.TabEngine.showTabSwitcher()">
        <span id="tab-count">1</span>
      </button>
    </div>

    <!-- Iframe area -->
    <div id="iframe-container" class="session-window">
      <div id="browser-empty-state" class="session-window">
        <i class="fa-solid fa-globe"></i>
        <p>Muitos sites bloqueiam iframes por segurança (X-Frame-Options).</p>
        <div class="empty-links">
          <button class="empty-link-btn" onclick="OS.Browser.loadUrl('https://pt.wikipedia.org')">Wikipedia</button>
          <button class="empty-link-btn" onclick="OS.Browser.loadUrl('https://example.com')">Example.com</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB SWITCHER -->
  <div id="tab-switcher" class="app-view">
    <div class="tabs-header">
      <h2>Abas Abertas</h2>
      <button class="new-tab-btn" onclick="OS.TabEngine.newTab()">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
    <div id="tabs-grid"></div>
    <div class="tabs-done-wrap">
      <button class="tabs-done-btn glass-panel" onclick="OS.TabEngine.hideTabSwitcher()">Concluído</button>
    </div>
  </div>

  <!-- NOTES APP -->
  <div style="z-index:1" id="app-notes" class="app-view">
    <div class="notes-header glass safe-pt">
      <button class="notes-back-btn" onclick="OS.UI.goHome()">
        <i class="fa-solid fa-chevron-left"></i> OS
      </button>
      <span class="notes-title-label">Notas</span>
      <button class="notes-save-btn" onclick="OS.Apps.Notes.save()">Salvar</button>
    </div>
    <textarea id="notes-content" placeholder="Comece a digitar..."></textarea>
  </div>

  <!-- PLUGINS APP -->
  <div style="z-index:1" id="app-plugins" class="app-view">
    <div class="plugins-header glass safe-pt">
      <button class="plugins-back-btn" onclick="OS.UI.goHome()">
        <i class="fa-solid fa-chevron-left"></i> Voltar
      </button>
      <span class="plugins-title-label">Plugins JS</span>
      <button class="plugins-add-btn" onclick="OS.Plugins.promptInstall()">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
    <div id="plugins-list"></div>
  </div>

  <!-- BOTTOM DOCK -->
  <div style="z-index:0; scale:0.39;" id="bottom-dock">
    <div class="dock-inner glass">
      <button class="dock-btn" onclick="OS.UI.goHome()">
        <i class="fa-solid fa-house"></i>
      </button>
      <button class="dock-btn" onclick="OS.UI.openApp('browser')">
        <i class="fa-solid fa-compass" style="font-size:1.5rem;"></i>
      </button>
      <button class="dock-btn" onclick="OS.UI.openApp('notes')">
        <i class="fa-solid fa-note-sticky"></i>
      </button>
      <button class="dock-btn" onclick="OS.UI.openApp('plugins')">
        <i class="fa-solid fa-puzzle-piece"></i>
      </button>
    </div>
  </div>

  <!-- POPUP LAYER -->
  <div id="popup-layer">
    <div id="popup-box" class="glass-panel">
      <h3 id="popup-title">Título</h3>
      <div id="popup-body">Conteúdo</div>
      <div id="popup-actions"></div>
    </div>
  </div>

 

  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/iFSw/css/iFSw-fix.css">

<script type="module" src="./js/main.js"></script></body></html>
