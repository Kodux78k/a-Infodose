<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ESPAÇO DA MENTE · FRACTAL 369</title>
<style>
:root{
  --bg:#05060a;
  --glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#e8e8f0;
  --muted:#8a8aa3;
  --glow:#7b61ff;
  --glow2:#00f5ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
}
.blob{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
  animation:float 20s ease-in-out infinite;
  pointer-events:none;
}
.blob1{width:400px;height:400px;background:var(--glow);top:-100px;left:-100px}
.blob2{width:300px;height:300px;background:var(--glow2);bottom:-80px;right:-80px;animation-delay:5s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-30px) scale(1.1)}}

.wrap{width:100%;max-width:520px;z-index:10;display:flex;flex-direction:column;gap:20px}
.title{
  font-size:28px;
  font-weight:200;
  letter-spacing:-1px;
  text-align:center;
  margin-bottom:10px;
}
.sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px;text-transform:uppercase;letter-spacing:2px}

.input-box{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:20px;
  backdrop-filter:blur(20px);
  transition:all.3s;
}
.input-box:focus-within{border-color:var(--glow);box-shadow:0 0 30px rgba(123,97,255,0.15)}
.input-box label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:10px}
textarea{
  width:100%;
  min-height:120px;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-size:16px;
  line-height:1.6;
  resize:vertical;
  font-family:inherit;
}
textarea::placeholder{color:var(--muted)}

.btn{
  width:100%;
  padding:18px;
  background:linear-gradient(135deg,var(--glow),var(--glow2));
  border:none;
  border-radius:20px;
  color:#fff;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:all.3s;
  letter-spacing:0.5px;
}
.btn:active{transform:scale(0.98)}
.btn-78k{
  background:linear-gradient(135deg,#ff6b6b,#ffa502);
  margin-top:10px;
}

.output{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:24px;
  padding:30px 20px;
  backdrop-filter:blur(20px);
  min-height:200px;
  font-size:18px;
  line-height:1.8;
  white-space:pre-wrap;
  animation:fadeIn.6s;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.file-btn{
  font-size:12px;
  color:var(--muted);
  text-align:center;
  cursor:pointer;
  padding:10px;
  border:1px dashed var(--border);
  border-radius:12px;
  margin-top:10px;
}
.file-btn:hover{border-color:var(--glow);color:var(--text)}
input[type=file]{display:none}

.hint{font-size:10px;color:var(--muted);text-align:center;margin-top:30px}

.arch-select{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  color:var(--text);
  width:100%;
  margin-top:10px;
  font-size:14px;
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="wrap">
  <div>
    <h1 class="title">ESPAÇO DA MENTE</h1>
    <p class="sub">Fusor Fractal 369 · Merge sem A e B</p>
  </div>

  <div class="input-box">
    <label>Texto 1 · Semente</label>
    <textarea id="t1" placeholder="Cola tua ideia aqui... ou áudio transcrito..."></textarea>
    <div class="file-btn" onclick="document.getElementById('f1').click()">+ Importar.txt ou.html</div>
    <input type="file" id="f1" accept=".txt,.html,.md">
  </div>

  <div class="input-box">
    <label>Texto 2 · Espelho</label>
    <textarea id="t2" placeholder="Cola outro texto pra fundir..."></textarea>
    <div class="file-btn" onclick="document.getElementById('f2').click()">+ Importar.txt ou.html</div>
    <input type="file" id="f2" accept=".txt,.html,.md">
  </div>

  <button class="btn" onclick="fractalMerge()">⊕ FUNDIR FRACTAL</button>

  <div id="out" class="output" style="display:none"></div>

  <select id="archSelect" class="arch-select" style="display:none">
    <option value="">Escolher Arquétipo 78K...</option>
    <option value="kodux">KODUX · Violeta</option>
    <option value="kobllux">KOBLLUX · Ciano</option>
    <option value="atlas">ATLAS · Dourado</option>
    <option value="nova">NOVA · Rosa</option>
    <option value="bllue">BLLUE · Azul</option>
  </select>

  <button id="btn78k" class="btn btn-78k" style="display:none" onclick="enviar78K()">🎧 ENVIAR PRO 78K E OUVIR</button>

  <p class="hint">Salva esta página. É o anúncio. É o motor. É teu.</p>
</div>

<script>
const motor369 = {
  merge(a,b){
    const s1 = a.split(/[.!?]+/).filter(s=>s.trim());
    const s2 = b.split(/[.!?]+/).filter(s=>s.trim());
    const max = Math.max(s1.length, s2.length);
    let res = '';
    for(let i=0;i<max;i++){
      const padrao = i % 3;
      if(padrao === 0 && s1[i]) res += s1[i].trim() + '. ';
      else if(padrao === 1 && s2[i]) res += s2[i].trim() + '. ';
      else if(padrao === 2 && s1[i]) res += s1[i].trim() + '. ';
      else if(s2[i]) res += s2[i].trim() + '. ';
    }
    return res;
  }
}

function fractalMerge(){
  const t1 = document.getElementById('t1').value.trim();
  const t2 = document.getElementById('t2').value.trim();

  if(!t1 ||!t2){
    alert('Cola 2 textos primeiro, mano');
    return;
  }

  const fundido = motor369.merge(t1,t2);
  const out = document.getElementById('out');
  out.style.display = 'block';
  out.textContent = fundido;

  localStorage.setItem('fractal_ultimo', fundido);
  localStorage.setItem('fractal_t1', t1);
  localStorage.setItem('fractal_t2', t2);

  // Mostra seletor 78K
  document.getElementById('archSelect').style.display = 'block';
  document.getElementById('btn78k').style.display = 'block';
}

// INTEGRAÇÃO 78K - usa teus JS/JSON do localStorage
function enviar78K(){
  const texto = localStorage.getItem('fractal_ultimo');
  const arch = document.getElementById('archSelect').value || 'kodux';

  if(!texto){
    alert('Funde os textos primeiro');
    return;
  }

  // 1. Salva no formato que teu motor 78K espera
  localStorage.setItem('kobllux_last_result', JSON.stringify({
    arch: arch,
    text: texto,
    timestamp: Date.now()
  }));

  // 2. Dispara evento pro teu motor escutar
  window.dispatchEvent(new CustomEvent('di:storage', {
    detail: { key: 'kobllux_last_result', value: texto, arch: arch }
  }));

  // 3. TTS nativo do navegador pra ouvir agora
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(texto);

    // Pega voz do arquétipo no teu JSON se tiver
    const voices = speechSynthesis.getVoices();
    const vozPT = voices.find(v => v.lang.startsWith('pt'));
    if(vozPT) utter.voice = vozPT;

    utter.rate = 0.95;
    utter.pitch = arch === 'kobllux'? 1.1 : 1.0;
    speechSynthesis.speak(utter);
  }

  alert(`Enviado pro 78K como ${arch.toUpperCase()} ✓\nTambém tá tocando agora`);
}

// Import arquivo
function lerArquivo(input, textareaId){
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      let txt = ev.target.result;
      if(file.name.endsWith('.html')){
        const div = document.createElement('div');
        div.innerHTML = txt;
        txt = div.textContent || div.innerText || '';
      }
      document.getElementById(textareaId).value = txt;
    };
    reader.readAsText(file);
  }
}
lerArquivo(document.getElementById('f1'), 't1');
lerArquivo(document.getElementById('f2'), 't2');

// Carrega último do storage
window.onload = () => {
  const ult = localStorage.getItem('fractal_ultimo');
  if(ult) {
    document.getElementById('t1').value = localStorage.getItem('fractal_t1') || '';
    document.getElementById('t2').value = localStorage.getItem('fractal_t2') || '';
    document.getElementById('out').style.display = 'block';
    document.getElementById('out').textContent = ult;
    document.getElementById('archSelect').style.display = 'block';
    document.getElementById('btn78k').style.display = 'block';
  }
}
</script>
</body>
</html>
