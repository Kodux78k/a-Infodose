<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KODUX · FUSOR MINDAL 3697</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05060a;
  --glass: rgba(255, 255, 255, 0.04);
  --glass-hover: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.08);
  --border-active: rgba(0, 245, 255, 0.4);
  --text: #e8e8f0;
  --muted: #8a8aa3;
  --glow: #7b61ff;
  --glow2: #00f5ff;
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* BLOBS DE FUNDO */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: float 20s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
.blob1 { width: 400px; height: 400px; background: var(--glow); top: -100px; left: -100px; }
.blob2 { width: 300px; height: 300px; background: var(--glow2); bottom: -80px; right: -80px; animation-delay: 5s; }
@keyframes float { 
  0%, 100% { transform: translate(0, 0) scale(1); } 
  50% { transform: translate(30px, -30px) scale(1.1); } 
}

/* CONTAINER & SECTIONS */
.container {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 650px;
  margin: 0 auto;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

section { display: flex; flex-direction: column; gap: 16px; animation: fadeIn 0.6s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* TEXTOS */
.title { font-size: 28px; font-weight: 200; letter-spacing: -1px; text-align: center; }
.title b { font-weight: 800; background: linear-gradient(90deg, var(--glow), var(--glow2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sub { font-size: 11px; color: var(--muted); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
.section-title { font-size: 13px; color: var(--text); font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* GLASSMORPHISM */
.glass-panel {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* INPUTS & LABELS */
.input-group { margin-bottom: 16px; }
.input-group:last-child { margin-bottom: 0; }
label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; font-weight: 600; }

textarea, select, input[type="file"] {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: all 0.3s;
}
textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
textarea:focus, select:focus { border-color: var(--glow2); box-shadow: 0 0 15px rgba(0, 245, 255, 0.1); }

.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* SLIDERS */
input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--glow2); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px var(--glow2); }
input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border); border-radius: 2px; }

/* BOTOES */
.btn {
  width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text); font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.3s; letter-spacing: 1px; margin-top: 10px;
}
.btn:hover { border-color: var(--glow2); background: rgba(0,245,255,0.05); }
.btn-primary { background: linear-gradient(90deg, #003f3f, #25102d); border-color: var(--glow2); }
.btn-primary:hover { box-shadow: 0 0 18px rgba(0, 255, 255, 0.15); }
.btn-green { border-color: #00ff99; color: #00ff99; }
.btn-green:hover { background: rgba(0,255,153,0.1); }
.btn-78k { background: linear-gradient(135deg, #ff6b6b, #ffa502); border: none; color: #fff; }
.file-btn { font-size: 11px; color: var(--glow2); text-align: center; cursor: pointer; padding: 10px; border: 1px dashed var(--border); border-radius: 10px; margin-top: 8px; }

/* FRACTAL NODES */
.fractal-flow { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.fractal-node { width: 50px; height: 50px; border: 1px solid var(--border); border-radius: 50%; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 255, 255, 0.05); }
.fractal-node strong { color: var(--glow2); font-size: 16px; }
.fractal-node span { color: #888; font-size: 6px; margin-top: 2px; letter-spacing: 1px; }
.fractal-arrow { color: #444; font-size: 14px; }

/* OUTPUTS & PREVIEW */
.preview { position: relative; min-height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; border-radius: 14px; border: 1px solid var(--border); }
canvas { max-width: 100%; height: auto; display: block; }
#hiddenCanvas { display: none; }

.output-box { margin-top: 10px; background: #030303; border: 1px solid #191919; border-radius: 12px; padding: 14px; max-height: 180px; overflow: auto; color: #aaa; font-size: 11px; line-height: 1.6; white-space: pre-wrap; }
.crypto-box { background: #020202; font-family: monospace; font-size: 10px; color: #555; word-break: break-all; margin-top: 10px; }
.output-title { color: var(--glow2); font-size: 9px; font-weight: 700; letter-spacing: .16em; margin-bottom: 8px; }

.status { margin-top: 8px; font-size: 10px; color: #777; text-align: center; }
@media(max-width: 600px){ .fractal-arrow { display: none; } .fractal-node{ width: 60px; height: 60px; } .fractal-node span{ font-size: 8px; } }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">
  
  <header>
    <h1 class="title">INFODOSE <b>MINDAL</b></h1>
    <div class="sub">TEXTO → SEMÂNTICA → 3·6·9·7 → FORMA</div>
  </header>

  <!-- 1. MERGE FRACTAL -->
  <section id="sect-merge">
    <div class="section-title">1. SEMENTE & ESPELHO</div>
    <div class="glass-panel">
      <div class="input-group">
        <label>Texto 1 · Origem</label>
        <textarea id="t1" placeholder="Cola tua ideia aqui..."></textarea>
      </div>
      <div class="input-group">
        <label>Texto 2 · Espelho</label>
        <textarea id="t2" placeholder="Cola outro texto pra fundir..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="fractalMerge()">⊕ FUNDIR FRACTAL 369</button>
    </div>
  </section>

  <!-- 2. MOTOR SEMÂNTICO E CONTROLES -->
  <section id="sect-engine" style="display:none;">
    
    <div class="fractal-flow">
      <div class="fractal-node"><strong>3</strong><span>ORIGEM</span></div>
      <div class="fractal-arrow">→</div>
      <div class="fractal-node"><strong>6</strong><span>MOVIMENTO</span></div>
      <div class="fractal-arrow">→</div>
      <div class="fractal-node"><strong>9</strong><span>EXPANSÃO</span></div>
      <div class="fractal-arrow">→</div>
      <div class="fractal-node"><strong>7</strong><span>INTEGRAÇÃO</span></div>
    </div>

    <div class="section-title">2. MOTOR MINDAL CHAR ART</div>
    <div class="glass-panel">
      
      <div class="input-group">
        <label>Matéria Semântica (Resultado da Fusão)</label>
        <textarea id="textInput" placeholder="O texto fundido aparecerá aqui e alimentará a arte..." oninput="generateAll()"></textarea>
      </div>

      <div class="input-group">
        <label>Arquivo Original (Imagem)</label>
        <input id="imageInput" type="file" accept="image/*">
      </div>

      <div class="controls-grid">
        <div class="input-group">
          <label>Modo</label>
          <select id="mode" onchange="generateAll()">
            <option value="semantic">SEMANTIC ART</option>
            <option value="ascii">CHAR ART</option>
            <option value="hybrid">HYBRID</option>
          </select>
        </div>
        <div class="input-group">
          <label>Inversão</label>
          <select id="invert" onchange="generateAll()">
            <option value="0">NORMAL</option>
            <option value="1">INVERTIDO</option>
          </select>
        </div>
        <div class="input-group">
          <label>Densidade (ASCII)</label>
          <input id="density" type="range" min="4" max="18" value="9" oninput="generateAll()">
        </div>
        <div class="input-group">
          <label>Tamanho Fonte</label>
          <input id="fontSize" type="range" min="5" max="18" value="9" oninput="generateAll()">
        </div>
      </div>

      <div class="controls-grid" style="margin-top:10px;">
        <button class="btn" onclick="copyStory()">⧉ HISTÓRIA</button>
        <button class="btn" onclick="copyFractal()">⧉ FRASES 3697</button>
        <button class="btn btn-green" onclick="feedStory()" style="grid-column: span 2;">↻ RETROINSERIR HISTÓRIA</button>
      </div>
    </div>
  </section>

  <!-- 3. OUTPUT E PREVIEW -->
  <section id="sect-preview" style="display:none;">
    <div class="section-title">3. PREVIEW & CÓDIGOS</div>
    
    <div class="preview">
      <canvas id="canvas"></canvas>
    </div>
    <div id="status" class="status">Aguardando imagem para renderizar...</div>
    
    <div class="controls-grid">
        <button class="btn" onclick="copyArt()">⧉ COPIAR CHAR ART</button>
        <button class="btn" onclick="downloadArt()">↓ EXPORTAR PNG</button>
    </div>

    <div class="glass-panel" style="margin-top: 10px; padding: 16px;">
      <div class="output-title">OUTPUT · HISTÓRIA SEMÂNTICA</div>
      <div id="storyOutput" class="output-box" style="color:#ddd; font-size:12px;"></div>
      
      <div class="output-title" style="margin-top:16px;">OUTPUT · FRASES FRACTAIS</div>
      <div id="fractalOutput" class="output-box"></div>

      <div class="output-title" style="margin-top:16px;">MOTOR CRIPTO</div>
      <div id="cryptoOutput" class="output-box crypto-box">Aguardando entrada...</div>
    </div>
  </section>

  <!-- 4. INTEGRAÇÃO 78K -->
  <section id="sect-78k" style="display:none;">
    <div class="glass-panel">
      <label>Enviar para Ecossistema 78K</label>
      <select id="archSelect" style="margin-bottom: 12px;">
        <option value="kodux">KODUX · Violeta</option>
        <option value="kobllux">KOBLLUX · Ciano</option>
        <option value="atlas">ATLAS · Dourado</option>
        <option value="nova">NOVA · Rosa</option>
      </select>
      <button class="btn btn-78k" onclick="enviar78K()">🎧 ENVIAR E OUVIR</button>
    </div>
  </section>

</div>

<canvas id="hiddenCanvas"></canvas>

<script>
/* =========================
   ELEMENTOS & ESTADO
========================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const hidden = document.getElementById("hiddenCanvas");
const hctx = hidden.getContext("2d");

let sourceImage = null;
let lastArt = "";
let generatedStory = "";
let generatedFractal = "";
let debounceTimer;

const stopWords = new Set(["o","a","os","as","um","uma","uns","umas","de","da","do","das","dos","e","ou","em","no","na","nos","nas","que","se","por","para","com","como","mais","menos","sobre","ela","ele","seu","sua","seus","suas","é","ser","ao","aos","às","à","isso","esse","essa","este","esta","onde","quando","porque"]);

/* =========================
   1. MOTOR 369 (FUSOR)
========================= */
const motor369 = {
  merge(a, b) {
    const s1 = a.split(/[.!?]+/).filter(s => s.trim());
    const s2 = b.split(/[.!?]+/).filter(s => s.trim());
    const max = Math.max(s1.length, s2.length);
    let res = '';
    for(let i=0; i<max; i++){
      const pad = i % 3;
      if(pad === 0 && s1[i]) res += s1[i].trim() + '. ';
      else if(pad === 1 && s2[i]) res += s2[i].trim() + '. ';
      else if(pad === 2 && s1[i]) res += s1[i].trim() + '. ';
      else if(s2[i]) res += s2[i].trim() + '. ';
    }
    return res;
  }
}

function fractalMerge() {
  const t1 = document.getElementById('t1').value.trim();
  const t2 = document.getElementById('t2').value.trim();

  if(!t1 && !t2) {
    alert('Cola os textos primeiro.');
    return;
  }

  const fundido = motor369.merge(t1 || "Origem vazia.", t2 || "Espelho vazio.");
  document.getElementById('textInput').value = fundido;

  localStorage.setItem('di_fractal_ultimo', fundido);
  localStorage.setItem('di_fractal_t1', t1);
  localStorage.setItem('di_fractal_t2', t2);

  document.getElementById('sect-engine').style.display = 'flex';
  document.getElementById('sect-preview').style.display = 'flex';
  document.getElementById('sect-78k').style.display = 'flex';
  
  document.getElementById('sect-engine').scrollIntoView({ behavior: 'smooth' });

  generateAll();
}

/* =========================
   2. CARREGAR IMAGEM
========================= */
document.getElementById("imageInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = event => {
    sourceImage = new Image();
    sourceImage.onload = () => {
      generateAll();
      document.getElementById('sect-preview').scrollIntoView({ behavior: 'smooth' });
    };
    sourceImage.src = event.target.result;
  };
  reader.readAsDataURL(file);
});

/* =========================
   3. MOTORES DE TEXTO & CRIPTO
========================= */
function extractWords(text){
  const words = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s]/gi," ").split(/\s+/).filter(Boolean).filter(w => w.length > 2).filter(w => !stopWords.has(w));
  const frequency = {};
  words.forEach(word => { frequency[word] = (frequency[word] || 0) + 1; });
  return frequency;
}

function cryptoEncode(text){
  const bytes = new TextEncoder().encode(text);
  let result = "";
  for(let i=0; i<bytes.length; i++){
    result += bytes[i].toString(16).padStart(2,"0");
  }
  return result;
}

function generateStory(text){
  const words = Object.keys(extractWords(text));
  if(!words.length) return "A matéria semântica ainda não possui palavras suficientes para formar um ciclo.";
  
  const origin = `No princípio, ${text.slice(0,220).trim()}...`;
  const movement = `A partir dessa origem, ${words.slice(0,18).join(" ")} começam a se mover, encontrar e transformar significado.`;
  const expansion = `Nesse movimento, ${words.slice(18,36).join(" ")} ampliam a narrativa e revelam novas conexões entre o visível e o invisível.`;
  const integration = `Ao retornar ao centro, ${words.slice(-18).join(" ")} integram a experiência em uma nova forma de organização.`;
  
  return ["3 · ORIGEM", origin, "", "6 · MOVIMENTO", movement, "", "9 · EXPANSÃO", expansion, "", "7 · INTEGRAÇÃO", integration].join("\n");
}

function generateFractal(text){
  const words = Object.keys(extractWords(text));
  const a = words.slice(0,5).join(" ");
  const b = words.slice(5,10).join(" ");
  const c = words.slice(10,15).join(" ");
  const d = words.slice(-5).join(" ");
  
  return [
    `3 · Tudo começa em ${a}.`,
    `6 · O movimento transforma ${b}.`,
    `9 · A expansão revela ${c}.`,
    `7 · A integração retorna ao centro: ${d}.`,
    `∞ · O fim retorna ao início, e o início já contém o próximo movimento.`
  ].join("\n");
}

/* =========================
   4. GERADOR PRINCIPAL (LIVE)
========================= */
function generateAll() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(processGeneration, 100);
}

function processGeneration() {
  const text = document.getElementById("textInput").value.trim();
  if(!text) return;

  // 4.1 Histórias e Códigos
  generatedStory = generateStory(text);
  generatedFractal = generateFractal(text);
  document.getElementById("storyOutput").textContent = generatedStory;
  document.getElementById("fractalOutput").textContent = generatedFractal;
  document.getElementById("cryptoOutput").textContent = "HEX STREAM · " + cryptoEncode(generatedStory);

  if(!sourceImage){
    document.getElementById("status").textContent = "Ciclo fractal gerado. Carregue imagem para a arte.";
    return;
  }

  // 4.2 Lógica Visual
  const frequency = extractWords(text);
  let words = Object.keys(frequency).sort((a,b) => frequency[b] - frequency[a]);
  if(!words.length) words = ["INFODOSE"];

  const maxWidth = window.innerWidth < 650 ? window.innerWidth - 40 : 800;
  const ratio = sourceImage.height / sourceImage.width;
  const width = Math.min(maxWidth, sourceImage.width);
  const height = Math.floor(width * ratio);

  hidden.width = width; hidden.height = height;
  hctx.drawImage(sourceImage, 0, 0, width, height);
  canvas.width = width; canvas.height = height;
  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, width, height);
  
  const data = hctx.getImageData(0, 0, width, height).data;
  
  const mode = document.getElementById("mode").value;
  const invert = document.getElementById("invert").value === "1";
  const density = Number(document.getElementById("density").value);
  const fontSize = Number(document.getElementById("fontSize").value);

  if(mode === "ascii"){
    generateASCII(data, width, height, density);
  } else {
    generateSemantic(data, width, height, words, frequency, fontSize, invert, mode === "hybrid");
  }
  
  document.getElementById("status").textContent = `Mindal atualizado · ${words.length} palavras · ${mode.toUpperCase()} · 3·6·9·7`;
}

function generateASCII(data, width, height, density){
  const chars = " .:-=+*#%@";
  ctx.font = `${density}px monospace`;
  ctx.fillStyle = "var(--glow2)";
  ctx.textBaseline = "top";
  lastArt = "";
  for(let y=0; y<height; y+=density){
    let line = "";
    for(let x=0; x<width; x+=density){
      const i = (y*width+x)*4;
      const lum = (data[i]*.299 + data[i+1]*.587 + data[i+2]*.114);
      const index = Math.floor(lum / 256 * chars.length);
      const char = chars[Math.min(chars.length-1, index)];
      ctx.fillText(char, x, y);
      line += char;
    }
    lastArt += line + "\n";
  }
}

function generateSemantic(data, width, height, words, frequency, fontSize, invert, hybrid){
  ctx.font = `700 ${fontSize}px Montserrat`;
  ctx.textBaseline = "middle";
  lastArt = "";
  for(let y=0; y<height; y+=fontSize*1.25){
    let line = "";
    for(let x=0; x<width; x+=fontSize*5){
      const px = Math.min(width-1, Math.floor(x));
      const py = Math.min(height-1, Math.floor(y));
      const i = (py*width+px)*4;
      const lum = (data[i]*.299 + data[i+1]*.587 + data[i+2]*.114) / 255;
      
      let wIdx = Math.floor((1-lum) * (words.length-1));
      if(invert) wIdx = words.length - 1 - wIdx;
      wIdx = Math.abs(wIdx + Math.floor(Math.sin(x*.01 + y*.02)*2)) % words.length;
      
      const word = words[wIdx];
      ctx.globalAlpha = .35 + lum*.65;
      const scale = Math.min(1.8, 1 + (frequency[word]||1)*.05);
      
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.fillStyle = hybrid ? `rgb(${Math.floor(255*lum)}, ${Math.floor(255*(1-lum))}, 255)` : "#ffffff";
      ctx.fillText(word, 0, 0);
      ctx.restore();
      line += word + " ";
    }
    lastArt += line + "\n";
  }
  ctx.globalAlpha = 1;
}

/* =========================
   5. BOTÕES DE AÇÃO
========================= */
function feedStory(){
  if(!generatedStory){ alert("Gere a história primeiro."); return; }
  const input = document.getElementById("textInput");
  input.value = input.value + "\n\n⟲ RETROALIMENTAÇÃO MINDAL\n\n" + generatedStory + "\n\n" + generatedFractal;
  document.getElementById("status").textContent = "História retroinserida. O ciclo se renova.";
  generateAll();
}

async function copyStory(){ if(generatedStory) await navigator.clipboard.writeText(generatedStory); alert("História copiada."); }
async function copyFractal(){ if(generatedFractal) await navigator.clipboard.writeText(generatedFractal); alert("Frases copiadas."); }
async function copyArt(){ if(lastArt) await navigator.clipboard.writeText(lastArt); alert("Arte copiada."); }

function downloadArt(){
  if(!sourceImage) return;
  const link = document.createElement("a");
  link.download = "infodose-mindal-3697.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

/* =========================
   6. INTEGRAÇÃO 78K
========================= */
function enviar78K() {
  const texto = document.getElementById('textInput').value;
  const arch = document.getElementById('archSelect').value;

  if(!texto) { alert('Falta o texto semântico.'); return; }

  localStorage.setItem('di_kobllux_last_result', JSON.stringify({
    arch: arch, text: texto, timestamp: Date.now()
  }));

  window.dispatchEvent(new CustomEvent('di:storage', {
    detail: { key: 'di_kobllux_last_result', value: texto, arch: arch }
  }));

  if('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(texto);
    const voices = speechSynthesis.getVoices();
    const vozPT = voices.find(v => v.lang.startsWith('pt'));
    if(vozPT) utter.voice = vozPT;
    utter.rate = 0.95;
    utter.pitch = arch === 'kobllux' ? 1.1 : 1.0;
    speechSynthesis.speak(utter);
  }
  alert(`Semente enviada pro Ecossistema 78K [${arch.toUpperCase()}] ✓`);
}

// Inicia com o cache
window.onload = () => {
  const ult = localStorage.getItem('di_fractal_ultimo');
  if(ult) {
    document.getElementById('t1').value = localStorage.getItem('di_fractal_t1') || '';
    document.getElementById('t2').value = localStorage.getItem('di_fractal_t2') || '';
