    const STORAGE_KEYS = [
        'fractal_ultimo',
        'fractal_t1',
        'fractal_t2',
        'fractal',
        'motor_fractal',
        'motor_text',
        'di_userName',

        'ultimo_texto'
    ];

    const LENSES = {
        kobllux: ' .,:;KOBLLUXkobllux',
        kaos: '01',
        atlas: ' .:-=+*#%@',
        nova: ' ░▒▓█',
        custom: ' .oO0@',
        matrix: ' 01',

    };

    let renderHistory = [];

    function cleanText(value) {
        return String(value || '')
            .replace(/\u0000/g, '')
            .replace(/\r\n/g, '\n')
            .replace(/\r/g, '\n')
            .trim();
    }

    function getMotorText() {
        const globals = [
            window.motorText,
            window.MOTOR_TEXT,
            window.fractalText,
            window.FRactalText,
            window.ultimoFractal,
            window.textoMotor,
            window.espacoDaMente,
            window.ESPACO_DA_MENTE
        ];
        for (const value of globals) {
            if (typeof value === 'string' && value.trim()) {
                return cleanText(value);
            }
        }
        for (const key of STORAGE_KEYS) {
            const value = localStorage.getItem(key);
            if (value && value.trim()) {
                try {
                    const parsed = JSON.parse(value);
                    if (typeof parsed === 'string') {
                        return cleanText(parsed);
                    }
                    if (parsed && typeof parsed === 'object') {
                        const candidates = [
                            parsed.text,
                            parsed.content,
                            parsed.conteudo,
                            parsed.fractal,
                            parsed.value,
                            parsed.prompt,
                            parsed.motor
                        ];
                        for (const item of candidates) {
                            if (typeof item === 'string' && item.trim()) {
                                return cleanText(item);
                            }
                        }
                    }
                } catch (e) {
                    return cleanText(value);
                }
            }
        }
        return '';
    }

    function buildLiveCharset(text) {
        const chars = Array.from(
            cleanText(text)
                .replace(/\s/g, '')
        );
        const unique = [...new Set(chars)];
        if (unique.length >= 2) {
            return ' ' + unique.join('');
        }
        return LENSES.custom;
    }

    function getCharset(lens, text) {
        if (lens === 'custom') {
            return buildLiveCharset(text);
        }
        return LENSES[lens] || LENSES.kobllux;
    }

    function renderText(text, lens = 'kobllux', density = 80) {
        text = cleanText(text);
        if (!text) return '';

        density = Math.max(20, Math.min(200, Number(density) || 80));
        const charset = getCharset(lens, text);
        const chars = Array.from(charset);
        const compact = text.replace(/\s+/g, ' ');
        const rows = Math.max(4, Math.ceil(compact.length / density));

        const output = [];
        for (let y = 0; y < rows; y++) {
            let line = '';
            for (let x = 0; x < density; x++) {
                const pos = y * density + x;
                const char = compact[pos % compact.length];
                const code = char.charCodeAt(0);

                const wave = Math.sin((x + 1) * 0.17 + y * 0.31);
                const intensity = Math.max(0, Math.min(0.999999,
                    ((code % 97) / 96) * 0.72 + (wave + 1) * 0.14
                ));

                if (lens === 'kaos' || lens === 'matrix') {
                    line += intensity >= 0.5 ? '1' : '0';
                } else {
                    const index = Math.floor(intensity * chars.length);
                    line += chars[Math.min(index, chars.length - 1)] || ' ';
                }
            }
            output.push(line);
        }
        return output.join('\n');
    }

    function getMetrics(text, art) {
        const lines = art.split('\n').length;
        const chars = art.replace(/\s/g, '').length;
        const uniqueChars = new Set(art).size;
        return {
            lines,
            chars,
            uniqueChars,
            density: Math.round((chars / (lines || 1))),
            textLength: text.length
        };
    }

    function syncMotor() {
        const text = getMotorText();
        const input = document.getElementById('rc-input');
        const status = document.getElementById('rc-status');
        const count = document.getElementById('rc-char-count');

        if (!input) return;

        if (text) {
            input.value = text;
            status.textContent = '🧠 MOTOR ONLINE · ' + text.length + ' CHARS';
            if (count) count.textContent = text.length + ' caracteres';
        } else {
            status.textContent = '⚠️ MOTOR SEM TEXTO';
            if (count) count.textContent = '0 caracteres';
        }

        updateCharCount();

        // Auto-render se ativado
        const autoBtn = document.getElementById('rc-auto-render');
        if (autoBtn && autoBtn.classList.contains('active')) {
            render();
        }
    }

    function updateCharCount() {
        const input = document.getElementById('rc-input');
        const count = document.getElementById('rc-char-count');
        if (input && count) {
            count.textContent = input.value.length + ' caracteres';
        }
    }

    function render() {
        const input = document.getElementById('rc-input');
        const lens = document.getElementById('rc-lens').value;
        const density = document.getElementById('rc-density').value;
        const output = document.getElementById('render-char-output');
        const wrap = document.getElementById('render-char-output-wrap');
        const status = document.getElementById('rc-status');
        const metrics = document.getElementById('rc-metrics');

        const text = input.value;
        if (!text.trim()) {
            status.textContent = '⚠️ VAZIO';
            return;
        }

        const startTime = performance.now();
        const art = renderText(text, lens, density);
        const endTime = performance.now();

        output.textContent = art;
        wrap.style.display = 'block';

        const m = getMetrics(text, art);
        metrics.innerHTML = `
            <span>📏 Linhas: <span class="highlight">${m.lines}</span></span>
            <span>🔤 Caracteres: <span class="highlight">${m.chars}</span></span>
            <span>🎯 Densidade: <span class="highlight">${m.density}</span></span>
            <span>⚡ ${(endTime - startTime).toFixed(1)}ms</span>
        `;

        status.textContent = `${lens.toUpperCase()} · RENDERIZADO (${m.chars} chars)`;

        // Salva no histórico
        const entry = {
            text: text.slice(0, 50) + (text.length > 50 ? '...' : ''),
            lens,
            density,
            timestamp: Date.now()
        };
        renderHistory.unshift(entry);
        if (renderHistory.length > 10) renderHistory.pop();
        saveHistory();
        updateHistory();

        document.getElementById('rc-api-status').textContent =
            `${m.chars} caracteres · ${m.lines} linhas · ${(endTime - startTime).toFixed(0)}ms`;
    }

    async function copyText() {
        const output = document.getElementById('render-char-output');
        const text = output?.textContent || '';
        if (!text.trim()) {
            alert('Nada para copiar.');
            return;
        }

        try {
            await navigator.clipboard.writeText(text);
            const status = document.getElementById('rc-status');
            status.textContent = '📋 COPIADO!';
            setTimeout(() => syncMotor(), 1500);
        } catch (e) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            alert('✦ Char Art copiado!');
        }
    }

    function exportSVG() {
        const output = document.getElementById('render-char-output');
        const text = output?.textContent || '';

            return;
        }

        const lines = text.split('\n');
        const fontSize = 8;
        const charWidth = fontSize * 0.6;
        const charHeight = fontSize * 1.2;
        const width = Math.max(...lines.map(l => l.length)) * charWidth + 20;
        const height = lines.length * charHeight + 20;

        let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
            <rect width="100%" height="100%" fill="#0a0a12" rx="8"/>
            <text x="10" y="16" font-family="monospace" font-size="${fontSize}" fill="#00f2ff">`;

        lines.forEach((line, i) => {
            svgContent += `<tspan x="10" dy="${charHeight}">${escapeXML(line)}</tspan>`;
        });

        svgContent += `</text></svg>`;

        const blob = new Blob([svgContent], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `char-art-${Date.now()}.svg`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeXML(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function toggleAutoRender() {
        const btn = document.getElementById('rc-auto-render');
        btn.classList.toggle('active');
        btn.textContent = btn.classList.contains('active') ? '⏱️ AUTO ON' : '⏱️ AUTO';
        if (btn.classList.contains('active')) {
            render();
        }
    }

    function toggleTheme() {
        const engine = document.getElementById('render-char-engine');
        const toggle = document.getElementById('rc-theme-toggle');
        isDarkMode = !isDarkMode;
        engine.classList.toggle('light');
        toggle.classList.toggle('active');
    }

    function saveHistory() {
        try {
            localStorage.setItem('renderCharHistory', JSON.stringify(renderHistory));
        } catch (e) { /* ignore */ }
    }

    function loadHistory() {
        try {
            const data = localStorage.getItem('renderCharHistory');
            if (data) {
                renderHistory = JSON.parse(data);
                updateHistory();
            }
        } catch (e) { /* ignore */ }
    }

    function updateHistory() {
        const container = document.getElementById('rc-history');
        if (!container) return;
        container.innerHTML = renderHistory.map((item, index) =>
            `<span class="rc-history-item ${index === 0 ? 'active' : ''}" data-index="${index}">
                ${item.lens} · ${item.text}
            </span>`
        ).join('');

        container.querySelectorAll('.rc-history-item').forEach(el => {
            el.onclick = function() {
                const idx = parseInt(this.dataset.index);
                const item = renderHistory[idx];
                if (item) {
                    document.getElementById('rc-lens').value = item.lens;
                    document.getElementById('rc-density').value = item.density || 80;
                    document.getElementById('rc-density-value').textContent = item.density || 80;
                    // Busca o texto original
                    const input = document.getElementById('rc-input');
                    const fullText = localStorage.getItem('fractal_ultimo') || item.text;
                    input.value = fullText;
                    render();
                }
            };
        });
    }

    function bindEvents() {
        document.getElementById('rc-sync').onclick = syncMotor;
        document.getElementById('rc-render').onclick = render;
        document.getElementById('rc-copy').onclick = copyText;
        document.getElementById('rc-export-svg').onclick = exportSVG;
        document.getElementById('rc-auto-render').onclick = toggleAutoRender;
        document.getElementById('rc-theme-toggle').onclick = toggleTheme;

        document.getElementById('rc-input').oninput = function() {
            updateCharCount();
            const autoBtn = document.getElementById('rc-auto-render');
            if (autoBtn && autoBtn.classList.contains('active')) {
                render();
            }
        };

        document.getElementById('rc-density').oninput = function() {
            document.getElementById('rc-density-value').textContent = this.value;
        };

        document.getElementById('rc-lens').onchange = function() {
            const autoBtn = document.getElementById('rc-auto-render');
            if (autoBtn && autoBtn.classList.contains('active')) {
                render();
            }
        };

        document.getElementById('rc-source').onchange = async function() {
            if (this.value === 'clipboard') {
                try {
                    const text = await navigator.clipboard.readText();
                    document.getElementById('rc-input').value = text;
                    updateCharCount();
                    toast('📋 Conteúdo colado do clipboard');
                } catch (e) {
                    toast('⚠️ Erro ao acessar clipboard');
                }
                this.value = 'manual';
            }
        };

        // Teclas de atalho
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                render();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'c' && e.shiftKey) {
                e.preventDefault();
                copyText();
            }
        });

        window.addEventListener('storage', function(event) {
            if (STORAGE_KEYS.includes(event.key)) {
                syncMotor();
            }
        });

        // Toast simples
        window.toast = function(msg) {
            const status = document.getElementById('rc-status');
            const old = status.textContent;
            status.textContent = '📢 ' + msg;
            setTimeout(() => {
                if (status.textContent === '📢 ' + msg) {
                    status.textContent = old;
                }
            }, 2000);
        };
    }

    /* ============================================================
       4. API PÚBLICA
    ============================================================ */
    window.KOBLLUXRenderChar = {
        render: async function(options = {}) {
            return renderText(
                options.text || '',
                options.lens || 'kobllux',
                options.density || 80
            );
        },
        motor: function() {
            return getMotorText();
        },
        sync: function() {
            syncMotor();
        },
        lenses: Object.keys(LENSES),
        history: function() {
            return renderHistory;
        },
        version: '2.0'
    };

    /* ============================================================
       5. BOOT
    ============================================================ */
    function boot() {
        createUI();
        // Renderiza automaticamente após 500ms
        setTimeout(() => {
            const autoBtn = document.getElementById('rc-auto-render');
            if (autoBtn) {
                autoBtn.classList.add('active');
                autoBtn.textContent = '⏱️ AUTO ON';
                render();
            }
        }, 500);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
    } else {
        boot();
    }

})();
</script>
