<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orb DevTools · Motor Engine Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 72px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0 12px;
            flex-shrink: 0;
            overflow-y: auto;
            gap: 6px;
        }

        .sidebar .logo {
            margin-bottom: 20px;
            opacity: 0.8;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .sidebar .logo:hover {
            transform: rotate(15deg);
        }

        .sidebar .engine-btn {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }

        .sidebar .engine-btn:hover {
            background: #21262d;
            color: #f0f6fc;
        }

        .sidebar .engine-btn.active {
            background: #1f2937;
            color: #58a6ff;
            box-shadow: inset 0 0 0 1px #58a6ff;
        }

        .sidebar .engine-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #f0883e;
            color: #0d1117;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 12px;
            line-height: 14px;
        }

        .sidebar .engine-btn svg {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ===== TABS BAR ===== */
        .tabs-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 8px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .tabs-bar::-webkit-scrollbar {
            height: 4px;
        }

        .tabs-bar::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 2px;
        }

        .tab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            height: 32px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            color: #8b949e;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-size: 12px;
        }

        .tab-item:hover {
            background: #21262d;
            color: #f0f6fc;
        }

        .tab-item.active {
            background: #161b22;
            color: #58a6ff;
            border-color: #58a6ff;
        }

        .tab-item .tab-close {
            margin-left: 4px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .tab-item .tab-close:hover {
            opacity: 1;
        }

        .tab-icon {
            font-size: 14px;
        }

        /* ===== HEADER ===== */
        .topbar {
            padding: 12px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .topbar h2 {
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar h2 svg {
            width: 20px;
            height: 20px;
            fill: #58a6ff;
        }

        .topbar .actions {
            display: flex;
            gap: 12px;
        }

        .topbar .actions button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .topbar .actions button:hover {
            background: #30363d;
        }

        /* ===== CONTENT AREA ===== */
        .content-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            flex: 1;
            overflow-y: auto;
            display: none;
            flex-direction: column;
        }

        .app-container.active {
            display: flex;
        }

        /* ===== CONTENT STYLES ===== */
        .content {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ===== OVERVIEW CARDS (stats) ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: #58a6ff;
            background: #21262d;
        }

        .stat-card .icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-card .icon svg {
            width: 24px;
            height: 24px;
            fill: #58a6ff;
        }

        .stat-card .info {
            display: flex;
            flex-direction: column;
        }

        .stat-card .info .number {
            font-size: 22px;
            font-weight: 600;
            line-height: 1.2;
        }

        .stat-card .info .label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        /* ===== SECTION (painel ativo) ===== */
        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px 24px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .panel-header h3 {
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-header h3 svg {
            width: 18px;
            height: 18px;
            fill: #58a6ff;
        }

        .panel-header .filters {
            display: flex;
            gap: 8px;
        }

        .panel-header .filters button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }

        .panel-header .filters button.active {
            background: #1f2937;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .panel-header .filters button:hover {
            background: #30363d;
        }

        /* ===== ANALYSIS STATS ===== */
        .analysis-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
            padding: 16px;
            background: #0d1117;
            border-radius: 10px;
            border: 1px solid #30363d;
        }

        .analysis-stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .analysis-stat .value {
            font-size: 20px;
            font-weight: 700;
            color: #58a6ff;
            font-family: 'Courier New', monospace;
        }

        .analysis-stat .label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ===== CARDS DE FUNÇÃO / CLASSE ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .func-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px 18px;
            transition: 0.2s;
        }

        .func-card:hover {
            border-color: #58a6ff;
            background: #0f151e;
        }

        .func-card .name {
            font-size: 15px;
            font-weight: 500;
            color: #f0f6fc;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .func-card .name .type-badge {
            font-size: 10px;
            background: #1f2937;
            color: #8b949e;
            padding: 0 10px;
            border-radius: 12px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .func-card .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 12px;
            color: #8b949e;
            margin: 6px 0 10px;
        }

        .func-card .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .func-card .meta svg {
            width: 14px;
            height: 14px;
            fill: #8b949e;
        }

        .func-card .desc {
            font-size: 13px;
            color: #b1bac4;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .func-card .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .func-card .actions button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 2px 14px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .func-card .actions button:hover {
            background: #30363d;
            border-color: #58a6ff;
        }

        .func-card .actions button svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
        }

        /* classe especial */
        .class-card .methods {
            margin: 8px 0 4px;
            padding-left: 6px;
            border-left: 2px solid #30363d;
        }

        .class-card .methods .method-item {
            font-size: 12px;
            color: #8b949e;
            padding: 2px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .class-card .methods .method-item svg {
            width: 12px;
            height: 12px;
            fill: #58a6ff;
        }

        /* ===== SVG inline gráficos ===== */
        .mini-chart {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
            margin-top: 4px;
        }

        .mini-chart .bar {
            width: 8px;
            background: #58a6ff;
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
        }

        .mini-chart .bar.warn {
            background: #f0883e;
        }

        .mini-chart .bar.danger {
            background: #f85149;
        }

        /* ===== IFRAME CONTAINER ===== */
        .iframe-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .sidebar {
                width: 56px;
                padding: 10px 0;
            }
            .sidebar .engine-btn {
                width: 40px;
                height: 40px;
            }
            .sidebar .engine-btn svg {
                width: 20px;
                height: 20px;
            }
            .content {
                padding: 12px;
            }
            .stats-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .topbar {
                padding: 8px 16px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .tabs-bar {
                height: 36px;
                padding: 0 4px;
            }
            .tab-item {
                padding: 0 8px;
                font-size: 11px;
            }
        }

        /* scroll */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        .placeholder-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8b949e;
            font-size: 18px;
            text-align: center;
        }

        /* ================================================================
           ===== LOCALHOST OS · CAMADA DE EXPANSÃO ========================
           ================================================================ */

        .los-divider {
            width: 32px;
            height: 1px;
            background: #30363d;
            margin: 6px 0;
            flex-shrink: 0;
        }

        /* ---- header LOCALHOST OS ---- */
        .los-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, #10231b 0%, #161b22 60%);
            border: 1px solid #22462f;
            border-radius: 12px;
            padding: 18px 22px;
        }

        .los-hero .los-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .los-hero .los-orb {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
        }

        .los-hero h1 {
            font-size: 19px;
            font-weight: 600;
            color: #f0f6fc;
            letter-spacing: 0.3px;
        }

        .los-hero .los-sub {
            font-size: 12px;
            color: #7ee787;
            font-family: 'Courier New', monospace;
            margin-top: 2px;
        }

        .los-status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0d1117;
            border: 1px solid #238636;
            color: #7ee787;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .los-status-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
            box-shadow: 0 0 6px #3fb950;
            animation: losBlink 1.6s infinite;
        }

        @keyframes losBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        /* ---- info grid (host/protocolo/endereço/ip) ---- */
        .los-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .los-info-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 12px 16px;
        }

        .los-info-card .los-info-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .los-info-card .los-info-value {
            font-size: 14px;
            font-family: 'Courier New', monospace;
            color: #58a6ff;
            word-break: break-all;
        }

        /* ---- cards de serviço ---- */
        .los-services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .los-service-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px 18px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .los-service-card:hover {
            border-color: #3fb950;
        }

        .los-service-card .los-service-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .los-service-card .los-service-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            color: #f0f6fc;
        }

        .los-service-icon {
            font-size: 18px;
        }

        .los-badge-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid #30363d;
            color: #8b949e;
        }

        .los-badge-status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #484f58;
        }

        .los-badge-status.online { border-color: #238636; color: #7ee787; }
        .los-badge-status.online .dot { background: #3fb950; box-shadow: 0 0 5px #3fb950; }
        .los-badge-status.offline { border-color: #6e2e2e; color: #f0888b; }
        .los-badge-status.offline .dot { background: #f85149; }
        .los-badge-status.unknown { border-color: #30363d; color: #8b949e; }

        .los-service-desc {
            font-size: 12.5px;
            color: #b1bac4;
            line-height: 1.4;
        }

        .los-service-url {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #58a6ff;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 5px 10px;
        }

        .los-service-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        .los-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11.5px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .los-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
        }

        .los-btn.danger:hover {
            border-color: #f85149;
            color: #f0888b;
        }

        .los-btn.primary {
            background: #12261b;
            border-color: #238636;
            color: #7ee787;
        }

        .los-btn.primary:hover {
            background: #163a25;
        }

        /* ---- formulário LOCALHOST OS ---- */
        .los-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            background: #0d1117;
            border: 1px dashed #30363d;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .los-form label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 11px;
            color: #8b949e;
        }

        .los-form input, .los-form select {
            background: #161b22;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12.5px;
            font-family: inherit;
        }

        .los-form input:focus, .los-form select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .los-form .los-form-actions {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        /* ---- tabela de portas ---- */
        .los-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .los-table th {
            text-align: left;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #8b949e;
            padding: 8px 12px;
            border-bottom: 1px solid #30363d;
        }

        .los-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #21262d;
            color: #c9d1d9;
        }

        .los-table tr:hover td {
            background: #161b22;
        }

        .los-table .mono {
            font-family: 'Courier New', monospace;
            color: #58a6ff;
        }

        .los-dot-cell {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .los-dot-cell.online { background: #3fb950; box-shadow: 0 0 5px #3fb950; }
        .los-dot-cell.offline { background: #f85149; }
        .los-dot-cell.unknown { background: #484f58; }

        /* ---- navegador de arquivos ---- */
        .los-file-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .los-file-tabs button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .los-file-tabs button.active {
            border-color: #58a6ff;
            color: #58a6ff;
            background: #1f2937;
        }

        .los-file-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .los-file-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 9px 14px;
            font-size: 13px;
        }

        .los-file-row .los-file-type {
            font-size: 16px;
            width: 22px;
            text-align: center;
        }

        .los-file-row .los-file-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .los-file-row .los-file-path {
            color: #8b949e;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .los-empty {
            color: #6e7681;
            font-size: 13px;
            text-align: center;
            padding: 24px 12px;
            border: 1px dashed #21262d;
            border-radius: 10px;
        }

        .los-note {
            font-size: 11.5px;
            color: #8b949e;
            background: #101820;
            border-left: 3px solid #f0883e;
            padding: 8px 12px;
            border-radius: 0 8px 8px 0;
            line-height: 1.5;
        }

        /* ---- navegador local (localhost builder) ---- */
        .los-url-builder {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px 16px;
        }

        .los-url-builder .los-static {
            color: #6e7681;
        }

        .los-url-builder input {
            background: #161b22;
            border: 1px solid #30363d;
            color: #7ee787;
            padding: 6px 10px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            width: 90px;
        }

        .los-url-result {
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #58a6ff;
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 10px 14px;
            word-break: break-all;
        }

        .los-net-explain {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .los-net-explain .box {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 12px;
            color: #b1bac4;
            line-height: 1.5;
        }

        .los-net-explain .box strong {
            color: #f0f6fc;
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
        }

        /* ---- atalhos / meus serviços ---- */
        .los-shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
        }

        .los-shortcut-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .los-shortcut-card:hover {
            transform: translateY(-3px);
            border-color: #58a6ff;
            background: #0f151e;
        }

        .los-shortcut-card .emoji {
            font-size: 26px;
        }

        .los-shortcut-card .label {
            font-size: 12px;
            color: #c9d1d9;
        }

        /* ---- console/terminal ---- */
        .los-console {
            background: #010409;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 12.5px;
            color: #7ee787;
            max-height: 200px;
            overflow-y: auto;
        }

        .los-console .los-console-title {
            color: #8b949e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .los-console .line {
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .los-console .line .ts {
            color: #484f58;
            margin-right: 8px;
        }

        /* ---- bridge / configurações ---- */
        .los-bridge-diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12.5px;
            color: #8b949e;
            padding: 14px 0;
        }

        .los-bridge-diagram .node {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 6px 16px;
            color: #c9d1d9;
        }

        .los-bridge-diagram .node.active {
            border-color: #3fb950;
            color: #7ee787;
        }

        .los-bridge-diagram .arrow {
            color: #484f58;
        }

        .los-toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #21262d;
        }

        .los-toggle-row:last-child {
            border-bottom: none;
        }

        .los-toggle-row .los-toggle-label {
            font-size: 13px;
            color: #e6edf3;
        }

        .los-toggle-row .los-toggle-sub {
            font-size: 11px;
            color: #8b949e;
            margin-top: 2px;
        }

        .los-switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .los-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .los-switch .slider {
            position: absolute;
            inset: 0;
            background: #30363d;
            border-radius: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .los-switch .slider::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            top: 3px;
            background: #c9d1d9;
            border-radius: 50%;
            transition: 0.2s;
        }

        .los-switch input:checked + .slider {
            background: #238636;
        }

        .los-switch input:checked + .slider::before {
            transform: translateX(18px);
            background: #fff;
        }

        @media (max-width: 700px) {
            .los-hero { padding: 14px 16px; }
            .los-form { grid-template-columns: 1fr 1fr; }
            .los-url-builder input { width: 70px; }
        }
    </style>
</head>

    <script>
        const APPS = {
            'overview': {
                title: '🏠 Visão Geral',
                icon: '🏠',
                type: 'inline',
                content: 'home'
            },
            'index': {
                title: '📚 Biblioteca Viva',
                icon: '📚',
                type: 'iframe',
                url: './index.html'
            },
            'fusion': {
                title: '⚡ SÜMBÜS FUSION',
                icon: '⚡',
                type: 'iframe',
                url: './sumbus_fusion (7).html'
            },
            'kompiler': {
                title: '🔧 KOMPILER',
                icon: '🔧',
                type: 'iframe',
                url: './KOMPILER-[KXTSK]-c.html'
            },
            'devos': {
                title: '⚙️ DevOS',
                icon: '⚙️',
                type: 'iframe',
                url: './Painel-SVG-LS-DEVOS.html'
            },
            'fractal': {
                title: '369 FRACTAL',
                icon: '369',
                type: 'iframe',
                url: './fractal_369_v3_com_motor_kobllux.html'
            },
            'help': {
                title: '❓ Help',
                icon: '❓',
                type: 'inline',
                content: 'help'
            },
            'info': {
                title: 'ℹ️ Info',
                icon: 'ℹ️',
                type: 'inline',
                content: 'info'
            },

            /* ===== LOCALHOST OS ===== */
            'los-dashboard': {
                title: '🟢 LOCALHOST OS · Dashboard',
                icon: '🟢',
                type: 'inline',
                content: 'los-dashboard'
            },
            'los-services': {
                title: '🚪 Serviços',
                icon: '🚪',
                type: 'inline',
                content: 'los-services'
            },
            'los-ports': {
                title: '🔌 Portas',
                icon: '🔌',
                type: 'inline',
                content: 'los-ports'
            },
            'los-files': {
                title: '📁 Arquivos',
                icon: '📁',
                type: 'inline',
                content: 'los-files'
            },
            'los-browser': {
                title: '🌐 Navegador Local',
                icon: '🌐',
                type: 'inline',
                content: 'los-browser'
            },
            'los-settings': {
                title: '⚙️ Configurações',
                icon: '⚙️',
                type: 'inline',
                content: 'los-settings'
            }
        };

        let openedTabs = [];
        let currentTab = null;

        // ===== INICIALIZAÇÃO =====
        function initializeApp() {
            // LOCALHOST OS: prepara registros e console na primeira execução
            losSeedDefaults();
            if (losConsoleLog().length === 0) {
                losPushConsole('Painel iniciado');
                losPushConsole('LOCALHOST OS carregado sobre Painel-SVG🟢');
                losPushConsole('Navegação local disponível');
            }

            // Abre a aba de visão geral por padrão
            openApp('overview');

            // Event listeners para botões da sidebar
            document.querySelectorAll('.sidebar .engine-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const appId = btn.dataset.app;
                    openApp(appId);
                });
            });
        }

        // ===== ABRIR APP =====
        function openApp(appId) {
            const app = APPS[appId];
            if (!app) return;

            // Verifica se já existe uma aba aberta com este app
            const existingTab = openedTabs.find(tab => tab.id === appId);
            
            if (existingTab) {
                // Apenas ativa a aba existente
                switchTab(appId);
                return;
            }

            // Cria nova aba
            const tab = {
                id: appId,
                title: app.title,
                icon: app.icon,
                type: app.type,
                content: app.content || null,
                url: app.url || null
            };

            openedTabs.push(tab);
            renderTabs();
            switchTab(appId);
        }

        // ===== FECHAR ABA =====
        function closeTab(appId) {
            openedTabs = openedTabs.filter(tab => tab.id !== appId);

            // Se fechou a aba ativa, abre a primeira disponível
            if (currentTab === appId) {
                if (openedTabs.length > 0) {
                    switchTab(openedTabs[0].id);
                } else {
                    // Se não tem nenhuma aba, abre a overview
                    openApp('overview');
                }
            } else {
                renderTabs();
            }
        }

        // ===== RENDERIZAR ABAS =====
        function renderTabs() {
            const tabsBar = document.getElementById('tabs-bar');
            tabsBar.innerHTML = '';

            openedTabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab-item ${tab.id === currentTab ? 'active' : ''}`;
                tabEl.innerHTML = `
                    <span class="tab-icon">${tab.icon}</span>
                    <span>${tab.title}</span>
                    <span class="tab-close" onclick="event.stopPropagation(); closeTab('${tab.id}')" title="Fechar aba">✕</span>
                `;
                tabEl.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('tab-close')) {
                        switchTab(tab.id);
                    }
                });
                tabsBar.appendChild(tabEl);
            });
        }

        // ===== TROCAR ABA ATIVA =====
        function switchTab(appId) {
            currentTab = appId;
            const contentArea = document.getElementById('content-area');
            const app = APPS[appId];

            // Remove todos os containers
            contentArea.innerHTML = '';

            // Cria novo container
            const container = document.createElement('div');
            container.className = 'app-container active';
            container.id = `app-${appId}`;

            if (app.type === 'inline') {
                // Renderiza conteúdo inline
                if (appId === 'overview') {
                    container.innerHTML = getHomeContent();
                } else if (appId === 'help') {
                    container.innerHTML = getHelpContent();
                } else if (appId === 'info') {
                    container.innerHTML = getInfoContent();
                } else if (appId === 'los-dashboard') {
                    container.innerHTML = getLosDashboardContent();
                } else if (appId === 'los-services') {
                    container.innerHTML = getLosServicesContent();
                } else if (appId === 'los-ports') {
                    container.innerHTML = getLosPortsContent();
                } else if (appId === 'los-files') {
                    container.innerHTML = getLosFilesContent();
                } else if (appId === 'los-browser') {
                    container.innerHTML = getLosBrowserContent();
                } else if (appId === 'los-settings') {
                    container.innerHTML = getLosSettingsContent();
                }

                // pós-render: hooks específicos do LOCALHOST OS
                if (appId.startsWith('los-')) {
                    requestAnimationFrame(() => losPostRender(appId));
                }
            } else if (app.type === 'iframe') {
                // Renderiza iframe
                container.innerHTML = `<div class="iframe-container"><iframe src="${app.url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe></div>`;
            }

            contentArea.appendChild(container);
            renderTabs();

            // Atualiza topbar
            document.getElementById('topbar-title').textContent = app.title;

            // Atualiza botão ativo da sidebar
            document.querySelectorAll('.sidebar .engine-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.app === appId);
            });
        }

        // ===== CONTEÚDO HOME =====
        function getHomeContent() {
            return `
                <div class="content">
                    <!-- stats overview -->
                    <section class="stats-grid">
                        <div class="stat-card" onclick="analyzeApp('motors')">
                            <div class="icon"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div>
                            <div class="info"><span class="number">8</span><span class="label">Motores</span></div>
                        </div>
                        <div class="stat-card" onclick="analyzeApp('functions')">
                            <div class="icon"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg></div>
                            <div class="info"><span class="number">43</span><span class="label">Funções</span></div>

        const LOS_KEYS = {

            bridge: 'los_bridge_v1',

        function losLoad(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (e) {
                return fallback;
            }
        }

        function losSave(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (e) {
                return false;
            }
        }

        function losUid() {
            return 'los_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
        }

        function losEsc(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Registros configuráveis de exemplo — NÃO significa que estão ativos.
        function losSeedDefaults() {
            const existing = losLoad(LOS_KEYS.services, null);

            const seed = [
                { id: losUid(), name: 'Painel SVG', desc: 'Painel-SVG🟢 · LOCALHOST OS', port: 7700, url: 'http://localhost:7700', icon: '🟢', status: 'unknown', lastCheck: null },

                { id: losUid(), name: 'App Local', desc: 'Aplicação local em desenvolvimento', port: 3000, url: 'http://localhost:3000', icon: '🟣', status: 'unknown', lastCheck: null }
            ];
            losSave(LOS_KEYS.services, seed);
        }

        function losServices() { return losLoad(LOS_KEYS.services, []); }
        function losFiles() { return losLoad(LOS_KEYS.files, []); }
        function losConsoleLog() { return losLoad(LOS_KEYS.console, []); }
        function losBridge() { return losLoad(LOS_KEYS.bridge, { enabled: false, endpoint: '' }); }
        function losNetworkIP() { return localStorage.getItem(LOS_KEYS.network) || ''; }

        function losPushConsole(text) {
            const log = losConsoleLog();
            log.push({ ts: new Date().toLocaleTimeString('pt-BR'), text });
            while (log.length > 60) log.shift();
            losSave(LOS_KEYS.console, log);
        }

        function losOrigin() {
            const loc = window.location;
            const isFile = loc.protocol === 'file:';
            return {
                protocol: (loc.protocol || 'file:').replace(':', '').toUpperCase(),
                host: loc.hostname || '(arquivo local)',
                address: isFile ? decodeURIComponent(loc.href.split('/').pop() || loc.href) : loc.href,

        function losGuessFileType(name) {
            const ext = (name.split('.').pop() || '').toLowerCase();
            if (ext === 'html' || ext === 'htm') return 'html';
            if (ext === 'svg') return 'svg';
            if (ext === 'js') return 'js';
            if (ext === 'css') return 'css';
            return 'other';
        }

        function losSubmitService(evt) {
            evt.preventDefault();
            const name = document.getElementById('los-svc-name').value.trim();
            const desc = document.getElementById('los-svc-desc').value.trim();
            const port = parseInt(document.getElementById('los-svc-port').value, 10);
            let url = document.getElementById('los-svc-url').value.trim();
            const icon = document.getElementById('los-svc-icon').value;

            if (!name || !port) return false;
            if (!url) url = 'http://localhost:' + port;

            const services = losServices();
            if (losEditingServiceId) {
                const idx = services.findIndex(s => s.id === losEditingServiceId);
                if (idx > -1) {
                    services[idx] = Object.assign({}, services[idx], { name, desc, port, url, icon });
                    losPushConsole('Serviço atualizado: ' + name + ' (porta ' + port + ')');
                }
                losEditingServiceId = null;
            } else {
                services.push({ id: losUid(), name, desc, port, url, icon, status: 'unknown', lastCheck: null });
                losPushConsole('Serviço registrado: ' + name + ' · porta ' + port);
            }
            losSave(LOS_KEYS.services, services);
            switchTab('los-services');
            return false;
        }

        function losStartEditService(id) {
            losEditingServiceId = id;
            switchTab('los-services');
        }

        function losCancelEditService() {
            losEditingServiceId = null;
            switchTab('los-services');
        }

        function losDeleteService(id) {
            let services = losServices();
            const target = services.find(s => s.id === id);
            if (!confirm('Remover o serviço "' + (target ? target.name : '') + '"?')) return;
            services = services.filter(s => s.id !== id);
            losSave(LOS_KEYS.services, services);
            losPushConsole('Serviço removido: ' + (target ? target.name : id));
            switchTab(currentTab && currentTab.startsWith('los-') ? currentTab : 'los-services');
        }

        function losTestServiceStatus(id) {
            const services = losServices();
            const svc = services.find(s => s.id === id);
            if (!svc) return;

            losPushConsole('Verificando status de ' + svc.name + ' (' + svc.url + ')…');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 2500);

            fetch(svc.url, { mode: 'no-cors', signal: controller.signal })
                .then(() => {
                    clearTimeout(timeout);
                    svc.status = 'online';
                    svc.lastCheck = new Date().toISOString();
                    losSave(LOS_KEYS.services, services);
                    losPushConsole('✅ ' + svc.name + ' respondeu · status: online');
                    if (currentTab && currentTab.startsWith('los-')) switchTab(currentTab);
                })
                .catch(() => {
                    clearTimeout(timeout);
                    svc.status = 'offline';
                    svc.lastCheck = new Date().toISOString();
                    losSave(LOS_KEYS.services, services);
                    losPushConsole('⚠️ ' + svc.name + ' não respondeu · status: offline');
                    if (currentTab && currentTab.startsWith('los-')) switchTab(currentTab);
                });
        }

        function losTestAllServices() {
            losServices().forEach(s => losTestServiceStatus(s.id));
        }

        function losSetFileFilter(type) {
            losFileFilter = type;
            switchTab('los-files');
        }

        function losAddFileManual(evt) {
            evt.preventDefault();
            const name = document.getElementById('los-file-name').value.trim();
            const path = document.getElementById('los-file-path').value.trim();
            if (!name || !path) return false;
            const files = losFiles();
            files.push({ id: losUid(), name, path, type: losGuessFileType(name) });
            losSave(LOS_KEYS.files, files);
            losPushConsole('Arquivo adicionado: ' + name);
            switchTab('los-files');
            return false;
        }

        function losDeleteFile(id) {
            let files = losFiles();
            files = files.filter(f => f.id !== id);
            losSave(LOS_KEYS.files, files);
            switchTab('los-files');
        }

        async function losPickDirectory() {
            if (!('showDirectoryPicker' in window)) {
                alert('Este navegador não oferece acesso direto ao sistema de arquivos (File System Access API indisponível). Use o Modo Manual para cadastrar arquivos.');
                return;
            }
            try {
                const dirHandle = await window.showDirectoryPicker();
                const files = losFiles();
                let count = 0;
                for await (const [name, handle] of dirHandle.entries()) {
                    if (handle.kind === 'file') {
                        files.push({ id: losUid(), name, path: '📂 ' + dirHandle.name + '/' + name, type: losGuessFileType(name) });
                    } else {
                        files.push({ id: losUid(), name, path: '📂 ' + dirHandle.name + '/' + name + '/', type: 'folder' });
                    }
                    count++;
                }
                losSave(LOS_KEYS.files, files);
                losPushConsole('Pasta autorizada: ' + dirHandle.name + ' · ' + count + ' itens importados');
                switchTab('los-files');
            } catch (err) {
                losPushConsole('Seleção de pasta cancelada ou negada pelo usuário.');
            }
        }

        function losBuildLocalUrl() {
            const portEl = document.getElementById('los-nav-port');
            const port = portEl ? portEl.value.trim() : '';
            const resultEl = document.getElementById('los-nav-result');
            if (resultEl) resultEl.textContent = 'http://localhost:' + port;

        function losOpenBuiltUrl(newTab) {
            const el = document.getElementById('los-nav-result');
            const url = el ? el.textContent.trim() : '';
            if (!url || url.endsWith(':')) { alert('Informe uma porta válida.'); return; }
            losOpenURL(url, newTab);
        }

        function losCopyBuiltUrl() {
            const el = document.getElementById('los-nav-result');
            if (el) losCopyText(el.textContent.trim());
        }

        function losBuildNetworkUrl() {
            const ip = document.getElementById('los-nav-ip').value.trim();
            const port = document.getElementById('los-nav-net-port').value.trim();
            if (!ip || !port) { alert('Informe o IP e a porta.'); return; }
            localStorage.setItem(LOS_KEYS.network, ip);
            const url = 'http://' + ip + ':' + port;
            document.getElementById('los-net-result').textContent = url;
            losPushConsole('Endereço de rede gerado: ' + url);
        }

        function losToggleBridge(checked) {
            const bridge = losBridge();
            bridge.enabled = checked;
            losSave(LOS_KEYS.bridge, bridge);
            losPushConsole('LOCALHOST BRIDGE ' + (checked ? 'habilitado' : 'desabilitado') + ' (slot de configuração, sem conexão real).');
            switchTab('los-settings');
        }

        function losSaveBridgeEndpoint(evt) {
            evt.preventDefault();
            const bridge = losBridge();
            bridge.endpoint = document.getElementById('los-bridge-endpoint').value.trim();
            losSave(LOS_KEYS.bridge, bridge);
            losPushConsole('Endpoint da LOCALHOST BRIDGE salvo: ' + (bridge.endpoint || '(vazio)'));
            return false;
        }

        function losExportData() {
            const data = {
                services: losServices(),
                files: losFiles(),
                bridge: losBridge(),
                network: losNetworkIP(),
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'localhost-os-backup.json';
            a.click();
            URL.revokeObjectURL(a.href);
            losPushConsole('Backup dos dados exportado.');
        }

        function losImportData(evt) {
            const file = evt.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const data = JSON.parse(reader.result);
                    if (data.services) losSave(LOS_KEYS.services, data.services);
                    if (data.files) losSave(LOS_KEYS.files, data.files);
                    if (data.bridge) losSave(LOS_KEYS.bridge, data.bridge);
                    if (data.network) localStorage.setItem(LOS_KEYS.network, data.network);
                    losPushConsole('Backup importado com sucesso.');
                    switchTab('los-settings');
                } catch (e) {
                    alert('Arquivo inválido.');
                }
            };
            reader.readAsText(file);
        }

        function losResetData() {
            if (!confirm('Isso vai apagar serviços, portas, arquivos e configurações do LOCALHOST OS salvos neste navegador. Continuar?')) return;
            Object.values(LOS_KEYS).forEach(k => localStorage.removeItem(k));
            losSeedDefaults();
            losPushConsole('Dados do LOCALHOST OS reiniciados.');
            switchTab('los-dashboard');
        }

        function losOpenURL(url, newTab) {
            if (!url || url === '#') return;
            window.open(url, newTab ? '_blank' : '_self');
            losPushConsole('Navegação local: ' + url);
        }

        function losCopyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    losPushConsole('Endereço copiado: ' + text);
                }).catch(() => losFallbackCopy(text));
            } else {
                losFallbackCopy(text);
            }
        }

        function losFallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); losPushConsole('Endereço copiado: ' + text); } catch (e) {}
            document.body.removeChild(ta);
        }

        function losPostRender(appId) {
            if (appId === 'los-dashboard') {
                const box = document.getElementById('los-console-box');
                if (box) box.scrollTop = box.scrollHeight;
            }
        }
