  <style id="app-core-styles">
    :root {
      --z-base: 0;
      --z-content: 100;
      --z-widget: 500;
      --z-overlay: 1000;
      --z-system: 5000;
      --orb-speed: 18s;
    }

    html, body {
      width: 100%; height: 100%;
      margin: 0; padding: 0;
      background: #0a0c14;
      color: white;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    .wrap { min-height: 100vh; display: flex; flex-direction: column; }
    .content { padding-top: 0; margin-top: auto; }

    /* Orb */
    .orb {      
 background: radial-gradient(circle at 30% 30%, var(--orb-accent, #78e7ff), transparent 60%),
                  radial-gradient(circle at 70% 70%, var(--kob-voice-primary, #00f2ff), var(--kob-voice-secondary, #3b82f6));
      box-shadow: 0 0 18px var(--orb-primary), 0 0 36px rgba(120,227,255,0.4);
      animation: orbSpin var(--orb-speed) linear infinite;
      width: 100%; height: 100%; border-radius: 50%; display: grid; place-items: center;

      width: 56px; height: 56px; 

    }
    .orb-core {

      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--orb-accent, #78e7ff), transparent 60%),
                  radial-gradient(circle at 70% 70%, var(--kob-voice-primar, #00f2ff), var(--kob-voice-primary, #3b82f6));
      box-shadow: 0 0 18px var(--kob-voice-secondary), 0 0 36px rgba(120,227,255,0.4);
      animation: orbSpin var(--orb-speed) linear infinite;

      width: 56px; height: 56px; 

    }
    @keyframes orbSpin { to { transform: rotate(360deg); } }
    @keyframes orbPulse { from { transform: scale(1); } to { transform: scale(1.15); } }

    /* Nagatanazare Panel */
    #kblx-back {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      padding: 22px; background: rgba(0,0,0,0.7); backdrop-filter: blur(14px); z-index: 999999;
    }
    #kblx-back.is-open { display: flex; }

    /* Player Idle */
    #bodyPlayer { position: relative; width: 100%; min-height: 100vh; overflow: hidden; }
    .kob-tts-dock, #kodux-widget, [data-idle-target] {
      transition: transform .35s ease, opacity .65s ease;
    }
    .idle { opacity: .18; transform: scale(.87); }
    :not(.idle):hover { opacity: 1; transform: scale(1); }
  </style>

  <!-- Idle Handler -->
  <script>
    (() => {
      const idleSelector = '#kodux-widget, [data-idle-target]';
      let idleTimer;
      function resetIdle() {
        document.querySelectorAll(idleSelector).forEach(el => el.classList.remove('idle'));
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          document.querySelectorAll(idleSelector).forEach(el => el.classList.add('idle'));
        }, 1870);
      }
      ['pointerdown','mousemove','scroll','touchstart'].forEach(ev => document.addEventListener(ev, resetIdle, {passive:true}));
      resetIdle();
    })();
  </script>
