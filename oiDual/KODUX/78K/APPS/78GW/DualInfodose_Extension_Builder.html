<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Universal Extension Builder</title>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
:root{
--bg:#0f1115;
--card:#181c24;
--border:#2d3442;
--txt:#fff;
--accent:#00d4ff;
}

*{box-sizing:border-box}

body{
margin:0;
background:var(--bg);
color:var(--txt);
font-family:system-ui;
padding:20px;
}

.wrap{
max-width:1400px;
margin:auto;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:15px;
margin-bottom:15px;
}

h1{
margin-top:0;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

input,button,select{
background:#111;
color:white;
border:1px solid #333;
padding:10px;
border-radius:8px;
}

textarea{
width:100%;
height:300px;
background:#111;
color:#fff;
border:1px solid #333;
padding:10px;
border-radius:8px;
}

button{
cursor:pointer;
}

button:hover{
border-color:var(--accent);
}

#dropzone{
border:2px dashed #555;
padding:30px;
text-align:center;
border-radius:12px;
}

pre{
background:#111;
padding:15px;
overflow:auto;
border-radius:10px;
max-height:400px;
}
</style>
</head>
<body>

<div class="wrap">

<h1>Universal Extension Builder</h1>

<div class="card">

<div class="row">
<input id="fileInput" type="file" accept=".html,.htm">
<button id="pasteBtn">Clipboard</button>
<button id="analyzeBtn">Analisar</button>
<button id="exportBtn">Exportar ZIP</button>
</div>

<br>

<div id="dropzone">
Arraste HTML aqui
</div>

</div>

<div class="card">

<div class="row">
<input id="appName" placeholder="Nome">
<input id="appVersion" value="1.0.0">
<select id="platform">
<option>Safari</option>
<option>Chrome</option>
<option>Firefox</option>
<option>Edge</option>
</select>
</div>

</div>

<div class="card">
<h3>HTML Fonte</h3>
<textarea id="htmlSource"></textarea>
</div>

<div class="card">
<h3>Manifest Preview</h3>
<pre id="manifestPreview"></pre>
</div>

</div>

<script>

const htmlSource=document.getElementById("htmlSource")

let extracted={}

function parseHTML(html){

const doc=new DOMParser()
.parseFromString(html,"text/html")

const title=
doc.querySelector("title")?.innerText
||"Extension"

const icons=[...doc.querySelectorAll(`
link[rel*=icon],
link[rel='apple-touch-icon']
`)]
.map(i=>i.href)

const manifestLink=
doc.querySelector("link[rel='manifest']")

extracted={
title,
icons,
manifest:manifestLink?.href||""
}

if(!appName.value)
appName.value=title

return extracted
}

async function loadFile(file){
htmlSource.value=await file.text()
}

fileInput.onchange=e=>{
if(e.target.files[0])
loadFile(e.target.files[0])
}

pasteBtn.onclick=async()=>{
try{
htmlSource.value=
await navigator.clipboard.readText()
}catch(err){
alert(err)
}
}

dropzone.ondragover=e=>{
e.preventDefault()
}

dropzone.ondrop=e=>{
e.preventDefault()

const f=e.dataTransfer.files[0]

if(f) loadFile(f)
}

function buildManifest(){

const data=parseHTML(htmlSource.value)

const manifest={

manifest_version:3,

name:
appName.value ||
data.title,

version:
appVersion.value,

description:data.title,

permissions:[
"storage",
"tabs",
"activeTab"
],

host_permissions:[
"<all_urls>"
],

action:{
default_title:data.title
},

background:{
service_worker:"background.js"
},

content_scripts:[
{
matches:["<all_urls>"],
js:["content.js"]
}
],

icons:{
16:data.icons[0]||"",
48:data.icons[0]||"",
128:data.icons[0]||""
}

}

manifestPreview.textContent=
JSON.stringify(manifest,null,2)

return manifest
}

analyzeBtn.onclick=buildManifest

function generateBackground(){

return `

chrome.runtime.onInstalled.addListener(()=>{
console.log("Extension instalada");
});

`
}

function generateContent(){

return `

console.log("Content Script carregado");

`
}

function generateSW(){

return `

self.addEventListener('install',()=>{
self.skipWaiting();
});

self.addEventListener('activate',()=>{
self.clients.claim();
});

`
}

function generatePopup(){

return htmlSource.value
}

exportBtn.onclick=async()=>{

const zip=new JSZip()

const manifest=buildManifest()

zip.file(
"manifest.json",
JSON.stringify(manifest,null,2)
)

zip.file(
"popup.html",
generatePopup()
)

zip.file(
"background.js",
generateBackground()
)

zip.file(
"content.js",
generateContent()
)

zip.file(
"service-worker.js",
generateSW()
)

zip.file(
"README.txt",
`
Universal Extension Builder

Platform:
${platform.value}

Generated:
${new Date().toISOString()}
`
)

const blob=
await zip.generateAsync({
type:"blob"
})

saveAs(
blob,
`${manifest.name.replaceAll(" ","_")}_extension.zip`
)

}

</script>

</body>
</html>
