<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Warp Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        darkBorder: '#334155'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        
        .markdown-body { color: inherit; line-height: 1.6; }
        .markdown-body h1, .markdown-body h2 { border-bottom: 1px solid #334155; padding-bottom: 0.3em; margin-top: 1em; }
        .markdown-body pre { background-color: #0f172a; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
        .markdown-body code { font-family: monospace; background-color: rgba(110, 118, 129, 0.4); padding: 0.2em 0.4em; border-radius: 6px; }
        .markdown-body pre code { background-color: transparent; padding: 0; }
        .markdown-body a { color: #60a5fa; text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        
        .toast-enter { animation: toastIn 0.3s ease-out forwards; }
        .toast-exit { animation: toastOut 0.3s ease-in forwards; }
        @keyframes toastIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }

        /* Esconder sidebar no mobile por padrão */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); transition: transform 0.3s ease; position: fixed; z-index: 50; height: 100%; }
            #sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-darkBg dark:text-slate-100 h-screen flex overflow-hidden transition-colors duration-200">

    <!-- Overlay Mobile -->
    <div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar Lateral -->
    <aside id="sidebar" class="w-64 bg-white dark:bg-darkCard border-r border-slate-200 dark:border-darkBorder flex flex-col shadow-xl md:shadow-none">
        <div class="p-6 border-b border-slate-200 dark:border-darkBorder flex justify-between items-center">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-500">
                <i class="fa-solid fa-rocket mr-2 text-indigo-500"></i>Warp Explorer
            </h1>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-500"><i class="fa-solid fa-times"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-4">
            <div class="mb-6">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Principal</h3>
                <ul class="space-y-1">
                    <li><button onclick="setFilter('category', '')" class="nav-btn w-full text-left px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition active-nav"><i class="fa-solid fa-border-all w-6"></i> Todos</button></li>
                    <li><button onclick="setFilter('favorite', true)" class="nav-btn w-full text-left px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition"><i class="fa-solid fa-star text-yellow-500 w-6"></i> Favoritos</button></li>
                </ul>
            </div>

            <div class="mb-6">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Categorias</h3>
                <ul class="space-y-1" id="categoryList">
                    <!-- Gerado via JS -->
                </ul>
            </div>
        </div>

        <div class="p-4 border-t border-slate-200 dark:border-darkBorder space-y-2">
            <button onclick="document.getElementById('importFile').click()" class="w-full px-3 py-2 text-sm text-center bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition"><i class="fa-solid fa-file-import mr-2"></i> Importar JSON</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
            <button onclick="exportData()" class="w-full px-3 py-2 text-sm text-center bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition"><i class="fa-solid fa-file-export mr-2"></i> Exportar Base</button>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header -->
        <header class="bg-white/80 dark:bg-darkCard/80 backdrop-blur-md border-b border-slate-200 dark:border-darkBorder p-4 sticky top-0 z-30">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded bg-slate-200 dark:bg-slate-800"><i class="fa-solid fa-bars"></i></button>
                <div class="relative flex-1">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Buscar repos, tags ou descrições..." 
                           class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <button onclick="openSyncModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-lg shadow-indigo-500/30 whitespace-nowrap"><i class="fa-solid fa-link mr-2"></i>Warp Sync</button>
                <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 transition"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
            </div>

            <!-- Stats Bar -->
            <div class="flex gap-4 overflow-x-auto custom-scrollbar pb-2 text-xs text-slate-600 dark:text-slate-400 whitespace-nowrap" id="statsBar">
                <!-- Gerado via JS -->
            </div>
        </header>

        <!-- Container de Cards -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-6 pb-24">
            <div class="flex justify-between items-center mb-4">
                <h2 id="currentCategoryTitle" class="text-xl font-bold">Todos os Achados</h2>
                <select id="sortSelect" onchange="renderLibrary()" class="bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm p-2 outline-none">
                    <option value="recent">Recentes</option>
                    <option value="az">A-Z</option>
                    <option value="stars">Mais Estrelas</option>
                </select>
            </div>
            
            <div id="libraryGrid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
                <!-- Cards -->
            </div>
        </div>
    </main>

    <!-- Modal README Preview -->
    <div id="readmeModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkCard w-full max-w-4xl max-h-[90vh] rounded-2xl flex flex-col shadow-2xl border border-slate-200 dark:border-darkBorder overflow-hidden">
            <div class="p-4 border-b border-slate-200 dark:border-darkBorder flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
                <h3 class="font-bold text-lg"><i class="fa-brands fa-readme mr-2"></i> README Preview</h3>
                <button onclick="closeReadme()" class="text-slate-500 hover:text-red-500 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="readmeContent" class="p-6 overflow-y-auto custom-scrollbar flex-1 markdown-body bg-white dark:bg-darkCard">
                Carregando...
            </div>
        </div>
    </div>

    <!-- Modal Warp Sync -->
    <div id="syncModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-darkCard w-full max-w-lg rounded-2xl p-6 shadow-2xl border border-slate-200 dark:border-darkBorder">
            <h3 class="font-bold text-xl mb-2 flex items-center"><i class="fa-solid fa-link text-indigo-500 mr-2"></i> Warp Sync</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Cole a URL de um repositório GitHub para gerar e catalogar automaticamente os links da biblioteca.</p>
            <input type="url" id="syncUrl" placeholder="Ex: https://github.com/mrdoob/three.js" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeSyncModal()" class="px-4 py-2 rounded-lg text-sm bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition">Cancelar</button>
                <button onclick="processSync()" class="px-4 py-2 rounded-lg text-sm bg-indigo-600 hover:bg-indigo-500 text-white transition">Sincronizar</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // --- Dados Iniciais (Infodose Warp + Exemplos Open Source) ---
        const defaultData = [
            {
                id: crypto.randomUUID(), name: "Particles.js", description: "Sistema de partículas em Canvas leve e configurável.", author: "Vincent Garreau", github: "https://github.com/VincentGarreau/particles.js",
                readme: "https://raw.githubusercontent.com/VincentGarreau/particles.js/master/README.md", raw: "https://raw.githubusercontent.com/VincentGarreau/particles.js/master/particles.min.js", cdn: "https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js",
                stars: 58000, language: "JavaScript", license: "MIT", tags: ["Canvas", "Particles", "Animation"], category: "Canvas", type: "script", favorite: false, notes: "Excelente para fundos de login.", addedAt: Date.now()
            },
            {
                id: crypto.randomUUID(), name: "Main Engine", description: "Motor principal do sistema.", author: "Infodose", cdn: "https://www.infodose.com.br/js/main.js",
                language: "JavaScript", license: "Proprietário", tags: ["Main", "Bootstrap"], category: "Core", type: "module", favorite: true, notes: "Não alterar sem revisar as dependências.", addedAt: Date.now() - 1000
            },
            {
                id: crypto.randomUUID(), name: "Nephesh", description: "Módulo de controle da Alma/Core.", author: "Infodose", cdn: "https://www.infodose.com.br/js/modules/nephesh.js",
                language: "JavaScript", license: "Proprietário", tags: ["Soul", "Core"], category: "Core", type: "module", favorite: false, notes: "", addedAt: Date.now() - 2000
            },
            {
                id: crypto.randomUUID(), name: "kodbrain-66", description: "Motor de inteligência artificial.", author: "Infodose", cdn: "https://www.infodose.com.br/js/kodbrain-66.js",
                language: "JavaScript", license: "Proprietário", tags: ["Brain", "AI"], category: "IA", type: "module", favorite: true, notes: "Modelo 66 - última versão estável.", addedAt: Date.now() - 3000
            },
            {
                id: crypto.randomUUID(), name: "KOB2 DATA", description: "Base de dados KOB2 (78K).", author: "Infodose", cdn: "https://www.infodose.com.br/oiDual/KODUX/78K/DATA/kob2.js",
                language: "JavaScript", license: "Proprietário", tags: ["78K", "Data"], category: "DATA", type: "script", favorite: false, notes: "", addedAt: Date.now() - 4000
            },
            {
                id: crypto.randomUUID(), name: "a€ParTKlz", description: "Módulo de partículas inseridas.", author: "Infodose", cdn: "https://www.infodose.com.br/js/modules/a%E2%82%ACParTKlz.js",
                language: "JavaScript", license: "Proprietário", tags: ["Insert", "Particles"], category: "Insert", type: "module", favorite: false, notes: "URL encodada para evitar bugs.", addedAt: Date.now() - 5000
            },
            {
                id: crypto.randomUUID(), name: "Archetypes JSON", description: "Definições de arquétipos do sistema.", author: "Infodose", cdn: "https://www.infodose.com.br/oiDual/KODUX/78K/DATA/json/archetypes.json",
                language: "JSON", license: "Proprietário", tags: ["Archetypes", "Config"], category: "JSON", type: "json", favorite: false, notes: "", addedAt: Date.now() - 6000
            },
            {
                id: crypto.randomUUID(), name: "Tailwind CSS", description: "Framework CSS utilitário.", author: "Tailwind Labs", github: "https://github.com/tailwindlabs/tailwindcss",
                readme: "https://raw.githubusercontent.com/tailwindlabs/tailwindcss/master/README.md", raw: "", cdn: "https://cdn.tailwindcss.com",
                stars: 70000, language: "CSS", license: "MIT", tags: ["CSS", "Framework", "UI"], category: "CSS", type: "script", favorite: true, notes: "Usar CDN apenas para desenvolvimento rápido.", addedAt: Date.now() - 7000
            }
        ];

        // --- Estado Global ---
        let library = [];
        let currentFilter = { text: '', category: '', favorite: false };

        // --- Inicialização ---
        function init() {
            const saved = localStorage.getItem('github_warp_library');
            if (saved) {
                library = JSON.parse(saved);
            } else {
                library = [...defaultData];
                saveData();
            }

            // Setup Theme
            if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeIcon').className = "fa-solid fa-sun";
            }

            renderSidebar();
            renderLibrary();
            updateStats();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentFilter.text = e.target.value.toLowerCase();
                renderLibrary();
            });
        }

        function saveData() {
            localStorage.setItem('github_warp_library', JSON.stringify(library));
            updateStats();
        }

        // --- Renderização Principal ---
        function renderLibrary() {
            const grid = document.getElementById('libraryGrid');
            const sort = document.getElementById('sortSelect').value;
            grid.innerHTML = "";

            let filtered = library.filter(item => {
                const matchText = item.name.toLowerCase().includes(currentFilter.text) || 
                                  (item.description && item.description.toLowerCase().includes(currentFilter.text)) ||
                                  item.tags.some(t => t.toLowerCase().includes(currentFilter.text));
                const matchCategory = currentFilter.category ? item.category === currentFilter.category : true;
                const matchFav = currentFilter.favorite ? item.favorite === true : true;
                return matchText && matchCategory && matchFav;
            });

            // Ordenação
            filtered.sort((a, b) => {
                if (sort === 'az') return a.name.localeCompare(b.name);
                if (sort === 'stars') return (b.stars || 0) - (a.stars || 0);
                return b.addedAt - a.addedAt; // Recentes
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500"><i class="fa-solid fa-ghost text-4xl mb-4 opacity-50"></i><p>Nenhum achado encontrado nesta dimensão.</p></div>`;
                return;
            }

            filtered.forEach(item => {
                const tagColor = item.type === 'module' ? 'bg-purple-500/20 text-purple-400 border-purple-500/30' : 
                                 item.type === 'json' ? 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30' : 'bg-blue-500/20 text-blue-400 border-blue-500/30';
                
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-darkCard p-5 rounded-2xl border border-slate-200 dark:border-darkBorder hover:border-indigo-500/50 dark:hover:border-indigo-500/50 transition shadow-sm hover:shadow-xl group flex flex-col h-full";
                
                let actionButtonsHTML = '';
                
                // Botão de Copiar Tag Inteligente
                let snippet = "";
                if (item.type === 'module') snippet = `<script type="module" src="${item.cdn}"><\/script>`;
                else if (item.type === 'json') snippet = `fetch("${item.cdn}").then(r => r.json()).then(console.log);`;
                else snippet = `<script src="${item.cdn}"><\/script>`;

                actionButtonsHTML += `<button onclick="copyToClipboard('${snippet.replace(/'/g, "\\'")}', 'Tag Gerada')" class="flex-1 bg-indigo-600/10 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-600 hover:text-white p-2 rounded-lg text-xs font-medium transition" title="Gerar e copiar tag">⚡ Gerar Tag</button>`;

                if(item.readme) {
                    actionButtonsHTML += `<button onclick="openReadme('${item.readme}')" class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 p-2 rounded-lg text-xs font-medium transition"><i class="fa-brands fa-readme"></i> Ler</button>`;
                }
                if(item.github) {
                    actionButtonsHTML += `<a href="${item.github}" target="_blank" class="flex-1 text-center bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 p-2 rounded-lg text-xs font-medium transition"><i class="fa-brands fa-github"></i> Repo</a>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xs px-2 py-1 rounded-md border ${tagColor} font-mono">${item.type.toUpperCase()}</span>
                            ${item.stars ? `<span class="text-xs text-yellow-500 font-medium"><i class="fa-solid fa-star text-[10px]"></i> ${(item.stars/1000).toFixed(1)}k</span>` : ''}
                        </div>
                        <button onclick="toggleFav('${item.id}')" class="text-xl transition hover:scale-110 focus:outline-none ${item.favorite ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]' : 'text-slate-300 dark:text-slate-600 hover:text-yellow-400'}">
                            <i class="fa-solid fa-star"></i>
                        </button>
                    </div>
                    
                    <h3 class="font-bold text-lg mb-1 truncate" title="${item.name}">${item.name}</h3>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mb-3 line-clamp-2 h-10">${item.description || 'Sem descrição.'}</p>
                    
                    <div class="flex flex-wrap gap-1.5 mb-4 mt-auto">
                        ${item.tags.map(t => `<span class="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-[10px] px-2 py-0.5 rounded-full border border-slate-200 dark:border-slate-700">${t}</span>`).join('')}
                    </div>

                    <div class="mb-4">
                        <textarea id="note-${item.id}" onchange="saveNote('${item.id}', this.value)" placeholder="Adicione observações (salva ao sair)..." class="w-full h-12 text-xs bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-lg p-2 focus:ring-1 focus:ring-indigo-500 outline-none resize-none custom-scrollbar transition">${item.notes || ''}</textarea>
                    </div>

                    <div class="flex gap-2 mt-auto">
                        ${actionButtonsHTML}
                        <button onclick="copyToClipboard('${item.cdn}', 'URL Copiada')" class="p-2 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg text-xs transition" title="Copiar URL bruta"><i class="fa-solid fa-link"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Sidebar & Categorias ---
        function renderSidebar() {
            const catList = document.getElementById('categoryList');
            catList.innerHTML = "";
            
            const categories = [...new Set(library.map(i => i.category))].sort();
            
            const icons = {
                'Core': 'fa-microchip', 'DATA': 'fa-database', 'IA': 'fa-brain', 'JSON': 'fa-brackets-curly', 
                'Insert': 'fa-plug', 'Canvas': 'fa-gamepad', 'CSS': 'fa-palette', 'Module': 'fa-cubes'
            };

            categories.forEach(cat => {
                if(!cat) return;
                const icon = icons[cat] || 'fa-folder';
                const count = library.filter(i => i.category === cat).length;
                
                catList.innerHTML += `
                    <li>
                        <button onclick="setFilter('category', '${cat}')" class="nav-btn w-full flex items-center justify-between px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition text-sm">
                            <span><i class="fa-solid ${icon} w-6 text-slate-400"></i> ${cat}</span>
                            <span class="bg-slate-200 dark:bg-slate-700 text-xs px-2 py-0.5 rounded-full">${count}</span>
                        </button>
                    </li>
                `;
            });
        }

        function setFilter(type, value) {
            if(type === 'category') {
                currentFilter.category = value;
                currentFilter.favorite = false;
                document.getElementById('currentCategoryTitle').innerText = value || 'Todos os Achados';
            } else if(type === 'favorite') {
                currentFilter.category = '';
                currentFilter.favorite = true;
                document.getElementById('currentCategoryTitle').innerText = '⭐ Seus Favoritos';
            }
            renderLibrary();
            if(window.innerWidth < 768) toggleSidebar();
        }

        // --- Estatísticas Header ---
        function updateStats() {
            const statsBar = document.getElementById('statsBar');
            const favs = library.filter(i => i.favorite).length;
            const tags = new Set(library.flatMap(i => i.tags)).size;
            const mit = library.filter(i => i.license && i.license.toLowerCase().includes('mit')).length;
            const propr = library.filter(i => i.license && i.license.toLowerCase().includes('propriet')).length;

            statsBar.innerHTML = `
                <div class="bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full"><i class="fa-solid fa-book text-indigo-500 mr-1"></i> Total: ${library.length}</div>
                <div class="bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full"><i class="fa-solid fa-star text-yellow-500 mr-1"></i> Favoritos: ${favs}</div>
                <div class="bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full"><i class="fa-solid fa-tags text-emerald-500 mr-1"></i> Tags Únicas: ${tags}</div>
                <div class="bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full"><i class="fa-solid fa-scale-balanced text-slate-400 mr-1"></i> Licenças: MIT (${mit}) | Propr. (${propr})</div>
            `;
            renderSidebar();
        }

        // --- Ações dos Cards ---
        function toggleFav(id) {
            const item = library.find(i => i.id === id);
            if(item) {
                item.favorite = !item.favorite;
                saveData();
                renderLibrary();
                showToast(item.favorite ? "Adicionado aos favoritos! ⭐" : "Removido dos favoritos.");
            }
        }

        function saveNote(id, text) {
            const item = library.find(i => i.id === id);
            if(item) {
                item.notes = text;
                saveData();
                showToast("Nota salva! 📝");
            }
        }

        // --- Warp Sync (Mágica do GitHub URL) ---
        function openSyncModal() { document.getElementById('syncModal').classList.remove('hidden'); }
        function closeSyncModal() { document.getElementById('syncModal').classList.add('hidden'); document.getElementById('syncUrl').value = ''; }
        
        function processSync() {
            const url = document.getElementById('syncUrl').value.trim();
            if(!url.includes('github.com')) {
                showToast("Por favor, insira uma URL válida do GitHub.", "error");
                return;
            }

            try {
                // Parse simplificado: https://github.com/autor/repo
                const parts = url.split('github.com/')[1].split('/');
                const author = parts[0];
                const repo = parts[1].replace('.git', '');

                const newItem = {
                    id: crypto.randomUUID(),
                    name: repo,
                    description: `Repositório importado via Warp Sync.`,
                    author: author,
                    github: `https://github.com/${author}/${repo}`,
                    readme: `https://raw.githubusercontent.com/${author}/${repo}/master/README.md`,
                    raw: `https://raw.githubusercontent.com/${author}/${repo}/master/`,
                    cdn: `https://cdn.jsdelivr.net/gh/${author}/${repo}@master/`,
                    language: "Auto", license: "Verificar", tags: ["Sync", repo],
                    category: "Bibliotecas", type: "script", favorite: false, notes: "", addedAt: Date.now()
                };

                library.unshift(newItem);
                saveData();
                renderLibrary();
                closeSyncModal();
                showToast(`Warp Sync concluído: ${repo} adicionado! 🚀`);

            } catch (e) {
                showToast("Erro ao processar a URL.", "error");
            }
        }

        // --- README Modal ---
        async function openReadme(url) {
            const modal = document.getElementById('readmeModal');
            const content = document.getElementById('readmeContent');
            modal.classList.remove('hidden');
            content.innerHTML = `<div class="flex items-center justify-center h-full"><i class="fa-solid fa-spinner fa-spin text-3xl text-indigo-500"></i></div>`;
            
            try {
                const response = await fetch(url);
                if(!response.ok) throw new Error('Não foi possível carregar.');
                const text = await response.text();
                // Usando marked.js para renderizar o Markdown
                content.innerHTML = marked.parse(text);
            } catch (error) {
                content.innerHTML = `<div class="text-center text-red-500 py-10"><i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i><br>Erro ao buscar README.<br><a href="${url}" target="_blank" class="text-indigo-500 underline mt-2 inline-block">Abrir Link Direto</a></div>`;
            }
        }
        function closeReadme() { document.getElementById('readmeModal').classList.add('hidden'); }

        // --- Utilitários ---
        function copyToClipboard(text, msg = "Copiado!") {
            navigator.clipboard.writeText(text).then(() => showToast(msg));
        }

        function showToast(message, type = "success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            toast.className = `toast-enter ${color} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 text-sm`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'}"></i> ${message}`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('hidden');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            html.classList.toggle('dark');
            if (html.classList.contains('dark')) {
                localStorage.theme = 'dark';
                icon.className = "fa-solid fa-moon";
            } else {
                localStorage.theme = 'light';
                icon.className = "fa-solid fa-sun";
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(library, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `github_warp_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("Backup exportado com sucesso! 📦");
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const imported = JSON.parse(event.target.result);
                    if(Array.isArray(imported)) {
                        library = imported;
                        saveData();
                        renderLibrary();
                        showToast("Biblioteca importada com sucesso! ✨");
                    }
                } catch(err) {
                    showToast("Erro: Arquivo JSON inválido.", "error");
                }
            };
            reader.readAsText(file);
        }

        // Inicializar
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
