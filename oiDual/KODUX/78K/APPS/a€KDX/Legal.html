<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>KODUX OS</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22KODUX%20OS%22%2C%22short_name%22%3A%22KODUX%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20fill%3D'%23000'%2F%3E%3Ctext%20x%3D'50'%20y%3D'55'%20font-size%3D'40'%20fill%3D'%23fff'%20text-anchor%3D'middle'%20dominant-baseline%3D'middle'%3EK%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

  <!-- External stylesheets (iFSw patch chain) -->
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/iFSw/css/iFSw-fix.css">

  <style>
    /* ===================================================
       KxaT ROOT TOKENS  —  exact copy from KxaT.css
       =================================================== */
    :root {
      --grad-a: #00f5ff;
      --grad-b: #ff4bff;
      --bg: #050811;
      --panel: rgba(5,8,17,.96);
      --ink: #e4ecff;
      --muted: #9aa4c8;

      --kob-voice-primary: #00f5ff;
      --kob-voice-secondary: #ff4bff;
      --kob-voice-accent: #ffffff;
      --kob-voice-bg-soft: rgba(0,245,255,.12);
      --kob-voice-glow: 0 0 18px rgba(0,245,255,.60);

      --text: var(--ink);
      --accent: var(--kob-voice-primary);
      --accent-soft: rgba(0,245,255,.18);
      --accent-pink: var(--kob-voice-secondary);
      --accent-cold: var(--kob-voice-primary);
      --accent-warm: #ffb45b;
      --danger: #ff4b6b;

      --radius-card: 18px;
      --radius-pill: 999px;
      --shadow-soft: 0 18px 40px rgba(0,0,0,.65);
      --fast: .25s;
      --med: .6s;
      --slow: 1.4s;

      /* safe-area insets */
      --safe-top: env(safe-area-inset-top, 20px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* ===================================================
       RESET / BASE
       =================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, var(--grad-a), var(--bg) 60%, #000 100%);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 10% 0%, rgba(0,255,255,.16) 0, transparent 50%),
        radial-gradient(circle at 90% 100%, rgba(255,0,255,.12) 0, transparent 60%);
      opacity: .7;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: -1;
    }

    /* Hide all scrollbars */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* ===================================================
       LAYOUT PRIMITIVES  (replaces Tailwind utilities)
       =================================================== */

    /* Absolute full-cover layer */
    .layer {
      position: absolute;
      inset: 0;
    }

    /* Safe area helpers */
    .safe-pt { padding-top: calc(var(--safe-top) + 36px); }
    .safe-pb { padding-bottom: var(--safe-bottom); }

    /* Glass surface — replaces .glass */
    .glass {
      background: rgba(5,8,17,.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.09);
    }

    /* Glass panel card — replaces .glass-panel */
    .glass-panel {
      background: rgba(10,14,40,.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,.09);
    }

    /* ===================================================
       APP TRANSITION  (replaces .app-view + .active)
       =================================================== */
    .app-view {
      position: absolute;
      inset: 0;
      z-index: 20;
      transition: transform .3s cubic-bezier(.25,.8,.25,1), opacity .3s ease;
      transform: scale(.95) translateY(20px);
      opacity: 0;
      pointer-events: none;
    }
    .app-view.active {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    /* ===================================================
       BOOT SCREEN
       =================================================== */
    #boot-screen {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity .8s ease-out;
    }
    #boot-screen h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: .25em;
      color: #fff;
      text-transform: uppercase;
    }
    .boot-bar-wrap {
      margin-top: 2rem;
      width: 12rem;
      height: 4px;
      background: rgba(255,255,255,.12);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    #boot-progress {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--kob-voice-primary), var(--kob-voice-secondary));
      border-radius: var(--radius-pill);
      transition: width .3s ease;
    }

    /* ===================================================
       HOME SCREEN
       =================================================== */
    #home-screen {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      flex-direction: column;
      padding: calc(var(--safe-top) + 56px) 24px 96px;
      background: linear-gradient(180deg, #111827 0%, #000 100%);
      overflow-y: auto;
    }
    #home-screen h2 {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 2rem;
      margin-top: .25rem;
      padding: 0 8px;
      color: var(--text);
    }
    #app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem 1rem;
    }

    /* App icon cell (built by JS) */
    .app-icon-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      cursor: pointer;
    }
    .app-icon-cell .app-icon-btn {
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      transition: transform .15s ease;
      border: none;
      cursor: pointer;
    }
    .app-icon-cell .app-icon-btn:active { transform: scale(.9); }
    .app-icon-cell .app-icon-btn i { font-size: 1.75rem; color: #fff; }
    .app-icon-cell span {
      font-size: .72rem;
      font-weight: 500;
      color: var(--muted);
    }

    /* App icon color classes */
    .icon-blue  { background: #3b82f6; }
    .icon-yellow{ background: #eab308; }
    .icon-purple{ background: #a855f7; }
    .icon-gray  { background: #6b7280; }

    /* ===================================================
       BROWSER / APP-BROWSER
       =================================================== */
    #app-browser {
      background: #000;
      flex-direction: column;
    }
    #app-browser .browser-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: 0 1rem .5rem;
    }
    #app-browser .browser-header.glass { /* extends .glass */ }

    .browser-back-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,.1);
      color: var(--text);
      cursor: pointer;
      transition: background var(--fast);
    }
    .browser-back-btn:active { background: rgba(255,255,255,.2); }

    .address-form {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,.1);
      border-radius: .75rem;
      padding: .5rem .75rem;
      border: 1px solid rgba(255,255,255,.05);
      gap: .5rem;
    }
    .address-form i { color: var(--muted); font-size: .75rem; }
    #address-bar {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: .875rem;
      font-family: inherit;
    }
    #address-bar::placeholder { color: rgba(255,255,255,.35); }
    .address-reload-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: color var(--fast);
      font-size: .75rem;
    }
    .address-reload-btn:active { color: var(--text); }

    .tab-count-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: .5rem;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: var(--text);
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--fast);
      font-family: inherit;
    }
    .tab-count-btn:active { background: rgba(255,255,255,.1); }

    /* iframe container */
    #iframe-container {
      flex: 1;
      position: relative;
      background: #1a1a1a;
    }
    #iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      position: absolute;
      inset: 0;
    }

    /* Browser empty state */
    #browser-empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }
    #browser-empty-state i { font-size: 2.5rem; margin-bottom: 1rem; color: #4b5563; }
    #browser-empty-state p { font-size: .875rem; }
    .empty-links {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
    }
    .empty-link-btn {
      padding: .5rem 1rem;
      background: rgba(255,255,255,.1);
      border: none;
      border-radius: var(--radius-pill);
      font-size: .75rem;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: background var(--fast);
    }
    .empty-link-btn:hover { background: rgba(255,255,255,.18); }

    /* ===================================================
       TAB SWITCHER
       =================================================== */
    #tab-switcher {
      z-index: 30;
      background: rgba(0,0,0,.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      padding: 4rem 1rem 6rem;
      overflow-y: auto;
    }
    .tabs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .tabs-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .new-tab-btn {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: #2563eb;
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(37,99,235,.4);
      font-size: 1rem;
      transition: transform var(--fast);
    }
    .new-tab-btn:active { transform: scale(.9); }
    #tabs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    .tab-card {
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      height: 10rem;
      position: relative;
    }
    .tab-card.is-active { box-shadow: 0 0 0 2px #3b82f6; }
    .tab-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .5rem;
    }
    .tab-card-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 75%;
    }
    .tab-close-btn {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      background: rgba(239,68,68,.2);
      color: #f87171;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: .75rem;
      flex-shrink: 0;
      transition: background var(--fast);
    }
    .tab-close-btn:active { background: rgba(239,68,68,.4); }
    .tab-card-preview {
      flex: 1;
      background: rgba(255,255,255,.05);
      border-radius: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .tab-card-preview i { font-size: 1.75rem; color: #4b5563; }
    .tabs-done-wrap {
      margin-top: auto;
      padding-top: 2rem;
      display: flex;
      justify-content: center;
    }
    .tabs-done-btn {
      padding: .75rem 2rem;
      border-radius: var(--radius-pill);
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
    }

    /* ===================================================
       NOTES APP
       =================================================== */
    #app-notes {
      background: #1e1e1e;
      flex-direction: column;
    }
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem .75rem;
    }
    .notes-back-btn {
      display: flex;
      align-items: center;
      gap: .25rem;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .notes-title-label { font-size: .875rem; font-weight: 600; color: var(--text); }
    .notes-save-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    #notes-content {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      padding: 1.5rem;
      font-size: 1.1rem;
      outline: none;
      resize: none;
      color: #d1d5db;
      line-height: 1.65;
      font-family: inherit;
    }
    #notes-content::placeholder { color: #4b5563; }

    /* ===================================================
       PLUGINS APP
       =================================================== */
    #app-plugins {
      background: #000;
      flex-direction: column;
    }
    .plugins-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem .75rem;
    }
    .plugins-back-btn {
      display: flex;
      align-items: center;
      gap: .25rem;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    .plugins-title-label { font-size: .875rem; font-weight: 600; color: var(--text); }
    .plugins-add-btn {
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: .75rem;
      transition: background var(--fast);
    }
    .plugins-add-btn:hover { background: rgba(255,255,255,.2); }
    #plugins-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .plugin-card {
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: .75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plugin-card h4 { font-size: .875rem; font-weight: 700; }
    .plugin-card p  { font-size: .75rem; color: #34d399; }
    .plugin-remove-btn {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      background: rgba(239,68,68,.2);
      color: #f87171;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: .75rem;
    }

    /* ===================================================
       BOTTOM DOCK
       =================================================== */
    #bottom-dock {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 40;
      padding: .5rem 1rem calc(var(--safe-bottom) + 1rem);
      pointer-events: none;
    }
    .dock-inner {
      margin: 0 auto;
      max-width: 26rem;
      height: 4rem;
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 .5rem;
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .dock-btn {
      width: 3rem;
      height: 3rem;
      border-radius: .75rem;
      border: 1px;
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color var(--fast), background var(--fast);
      font-size: 1.25rem;
    }
    .dock-btn:hover  { color: var(--text); }
    .dock-btn:active { background: rgba(255,255,255,.1); color: var(--text); }

    /* ===================================================
       POPUP LAYER
       =================================================== */
    #popup-layer {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      transition: opacity .3s ease;
    }
    #popup-layer.visible { display: flex; }
    #popup-layer.opaque  { opacity: 1; }

    #popup-box {
      width: 100%;
      max-width: 24rem;
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transform: scale(.95);
      transition: transform .3s ease;
    }
    #popup-box.popped { transform: scale(1); }

    #popup-title {
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
    }
    #popup-body {
      font-size: .875rem;
      color: var(--muted);
      text-align: center;
    }
    #popup-actions {
      display: flex;
      gap: .75rem;
      margin-top: .5rem;
    }
    .popup-btn {
      flex: 1;
      padding: .75rem;
      border-radius: .75rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background var(--fast), color var(--fast);
    }
    .popup-btn.primary {
      background: #2563eb;
      color: #fff;
    }
    .popup-btn.primary:hover { background: #3b82f6; }
    .popup-btn.secondary {
      background: rgba(255,255,255,.1);
      color: var(--text);
    }
    .popup-btn.secondary:hover { background: rgba(255,255,255,.2); }

    /* Popup textarea / input */
    #popup-body textarea,
    #popup-body input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: .75rem;
      padding: .75rem;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .75rem;
      outline: none;
      resize: vertical;
      transition: border-color var(--fast);
      margin-top: .5rem;
    }
    #popup-body textarea:focus,
    #popup-body input[type="text"]:focus {
      border-color: var(--accent);
    }
    #popup-body textarea::placeholder,
    #popup-body input[type="text"]::placeholder { color: rgba(255,255,255,.35); }

    /* ===================================================
       FORM ELEMENTS  (from KxaT.css patch)
       =================================================== */
    input[type="checkbox"] {
      appearance: none;
      width: 18px; height: 18px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(8,10,25,.65);
      cursor: pointer;
      transition: .22s ease;
      box-shadow: 0 4px 12px rgba(0,0,0,.6);
    }
    input[type="checkbox"]:hover { border-color: var(--accent-cold); }
    input[type="checkbox"]:checked {
      background: radial-gradient(circle at 30% 20%, #fff, var(--accent-warm));
      box-shadow: 0 0 10px var(--accent-warm), 0 0 22px rgba(255,180,91,.65);
      border-color: rgba(255,180,91,.85);
    }

    .switch { position: relative; width: 42px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: rgba(8,10,25,.85);
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,.18);
      transition: .25s ease;
    }
    .switch-slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; top: 2px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #fff, var(--accent-cold));
      box-shadow: 0 0 12px rgba(93,242,255,.75);
      transition: .25s ease;
    }
    .switch input:checked + .switch-slider {
      background: radial-gradient(circle at 0 0, rgba(255,180,91,.22), transparent 55%),
                  rgba(10,14,40,.85);
      border-color: rgba(255,180,91,.8);
    }
    .switch input:checked + .switch-slider::before {

    /**
     * KODUX OS Core  —  KxaT edition (zero Tailwind)
     */
    const OS = {
      state: {
        activeApp: 'home',
        booted: false
      },

      // 1. Storage Layer
      Storage: {
        prefix: 'kodux_',
        save(key, data) {
          try { localStorage.setItem(this.prefix + key, JSON.stringify(data)); }
          catch (e) { console.error("Storage Error", e); }
        },
        load(key, defaultVal = null) {
          try {
            const item = localStorage.getItem(this.prefix + key);
            return item ? JSON.parse(item) : defaultVal;
          } catch (e) { return defaultVal; }
        },
        remove(key) { localStorage.removeItem(this.prefix + key); }
      },

      // 2. Popup System
      Popup: {
        show(title, htmlContent, buttons = []) {
          const layer     = document.getElementById('popup-layer');
          const box       = document.getElementById('popup-box');
          const titleEl   = document.getElementById('popup-title');
          const bodyEl    = document.getElementById('popup-body');
          const actionsEl = document.getElementById('popup-actions');

          titleEl.innerText  = title;
          bodyEl.innerHTML   = htmlContent;
          actionsEl.innerHTML = '';

          if (buttons.length === 0) {
            buttons = [{ text: 'OK', type: 'primary', onClick: () => OS.Popup.hide() }];
          }

          buttons.forEach(btn => {
            const b = document.createElement('button');
            b.innerText  = btn.text;
            b.className  = `popup-btn ${btn.type === 'primary' ? 'primary' : 'secondary'}`;
            b.onclick = () => { if (btn.onClick) btn.onClick(); OS.Popup.hide(); };
            actionsEl.appendChild(b);
          });

          layer.classList.add('visible');
          requestAnimationFrame(() => {
            layer.classList.add('opaque');
            box.classList.add('popped');
          });
        },
        hide() {
          const layer = document.getElementById('popup-layer');
          const box   = document.getElementById('popup-box');
          layer.classList.remove('opaque');
          box.classList.remove('popped');
          setTimeout(() => layer.classList.remove('visible'), 300);
        },
        prompt(title, placeholder, callback) {
          const inputHtml = `<input type="text" id="popup-input" placeholder="${placeholder}">`;
          this.show(title, inputHtml, [
            { text: 'Cancelar', type: 'secondary' },
            { text: 'Confirmar', type: 'primary', onClick: () => {
              const val = document.getElementById('popup-input').value;
              callback(val);
            }}
          ]);
          setTimeout(() => document.getElementById('popup-input').focus(), 100);
        }
      },

      // 3. Tab Engine & Iframe Renderer
      TabEngine: {
        tabs: [],
        activeTabId: null,

        init() {
          this.tabs = OS.Storage.load('tabs', []);
          if (this.tabs.length === 0) {
            this.createTab();
          } else {
            this.activeTabId = this.tabs[0].id;
            this.renderActiveTab();
          }
          this.updateUI();
        },

        createTab(url = '') {
          const id = 'tab_' + Date.now();
          this.tabs.push({ id, url, title: 'Nova Aba' });
          this.activeTabId = id;
          this.saveState();
          this.renderActiveTab();
          this.updateUI();
          OS.UI.openApp('browser');
        },

        closeTab(id) {
          this.tabs = this.tabs.filter(t => t.id !== id);
          const iframe = document.getElementById(`iframe_${id}`);
          if (iframe) iframe.remove();
          if (this.tabs.length === 0) {
            this.createTab();
          } else if (this.activeTabId === id) {
            this.activeTabId = this.tabs[this.tabs.length - 1].id;
            this.renderActiveTab();
          }
          this.saveState();
          this.renderSwitcherGrid();
          this.updateUI();
        },

        switchTab(id) {
          this.activeTabId = id;
          this.renderActiveTab();
          this.hideTabSwitcher();
          this.updateUI();
        },

        saveState() { OS.Storage.save('tabs', this.tabs); },

        renderActiveTab() {
          const container  = document.getElementById('iframe-container');
          const emptyState = document.getElementById('browser-empty-state');
          const addressBar = document.getElementById('address-bar');

          container.querySelectorAll('iframe').forEach(ifr => ifr.style.display = 'none');

          const activeTab = this.tabs.find(t => t.id === this.activeTabId);
          if (!activeTab) return;

          addressBar.value = activeTab.url;

          if (!activeTab.url) {
            emptyState.style.display = 'flex';
          } else {
            emptyState.style.display = 'none';
            let iframe = document.getElementById(`iframe_${activeTab.id}`);
            if (!iframe) {
              iframe = document.createElement('iframe');
              iframe.id      = `iframe_${activeTab.id}`;
              iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups";
              iframe.src     = activeTab.url;
              iframe.onload  = () => {
                try {
                  activeTab.title = iframe.contentDocument.title || activeTab.url;
                } catch (e) {
                  activeTab.title = activeTab.url.replace(/^https?:\/\//, '').split('/')[0];
                }
                this.saveState();
              };
              container.appendChild(iframe);
            }
            iframe.style.display = 'block';
          }
        },

        updateActiveTabUrl(url) {
          const tab = this.tabs.find(t => t.id === this.activeTabId);
          if (tab) {
            tab.url   = url;
            tab.title = url;
            this.saveState();
            const oldIframe = document.getElementById(`iframe_${tab.id}`);
            if (oldIframe) oldIframe.remove();
            this.renderActiveTab();
          }
        },

        updateUI() {
          document.getElementById('tab-count').innerText = this.tabs.length;
        },

        showTabSwitcher() {
          this.renderSwitcherGrid();
          document.getElementById('tab-switcher').classList.add('active');
        },
        hideTabSwitcher() {
          document.getElementById('tab-switcher').classList.remove('active');
        },

        renderSwitcherGrid() {
          const grid = document.getElementById('tabs-grid');
          grid.innerHTML = '';
          this.tabs.forEach(tab => {
            const isActive = tab.id === this.activeTabId;
            const el = document.createElement('div');
            el.className = `tab-card glass-panel${isActive ? ' is-active' : ''}`;
            el.innerHTML = `
              <div class="tab-card-header">
                <span class="tab-card-title">${tab.title || 'Nova Aba'}</span>
                <button class="tab-close-btn" onclick="event.stopPropagation(); OS.TabEngine.closeTab('${tab.id}')">✕</button>
              </div>
              <div class="tab-card-preview" onclick="OS.TabEngine.switchTab('${tab.id}')">
                <span style="font-size:1.75rem;color:#4b5563;">${tab.url ? '◎' : '+'}</span>
              </div>
            `;
            grid.appendChild(el);
          });
        },

        newTab() {
          this.createTab();
          this.hideTabSwitcher();
        }
      },

      // Browser Helper
      Browser: {
        navigateBar() {
          let url = document.getElementById('address-bar').value.trim();
          if (!url) return;
          if (!/^https?:\/\//i.test(url)) {
            if (url.includes('.') && !url.includes(' ')) {
              url = 'https://' + url;
            } else {
              url = 'https://www.bing.com/search?q=' + encodeURIComponent(url);
            }
          }
          OS.TabEngine.updateActiveTabUrl(url);
        },
        reload() {
          const tab = OS.TabEngine.tabs.find(t => t.id === OS.TabEngine.activeTabId);
          if (tab && tab.url) {
            const iframe = document.getElementById(`iframe_${tab.id}`);
            if (iframe) iframe.src = iframe.src;
          }
        },
        loadUrl(url) {
          document.getElementById('address-bar').value = url;
          OS.TabEngine.updateActiveTabUrl(url);
        }
      },

      // 4. Plugin Loader
      Plugins: {
        list: [],
        init() {
          this.list = OS.Storage.load('plugins', []);
          this.renderList();
          this.executeAll();
        },
        promptInstall() {
          const html = `
            <p style="font-size:.75rem;text-align:left;margin-bottom:.5rem;">Cole o código JavaScript do plugin:</p>
            <textarea id="plugin-code" style="height:8rem;font-family:ui-monospace,monospace;" placeholder="OS.Popup.show('Hello', 'Plugin rodando!');"></textarea>
            <input type="text" id="plugin-name" style="margin-top:.5rem;" placeholder="Nome do Plugin">
          `;
          OS.Popup.show("Novo Plugin", html, [
            { text: 'Cancelar', type: 'secondary' },
            { text: 'Instalar', type: 'primary', onClick: () => {
              const code = document.getElementById('plugin-code').value;
              const name = document.getElementById('plugin-name').value || 'Plugin ' + (this.list.length + 1);
              if (code) {
                this.list.push({ id: Date.now(), name, code, active: true });
                OS.Storage.save('plugins', this.list);
                this.renderList();
                this.execute(code);
                OS.Popup.show("Sucesso", "Plugin instalado e executado.");
              }
            }}
          ]);
        },
        remove(id) {
          this.list = this.list.filter(p => p.id !== id);
          OS.Storage.save('plugins', this.list);
          this.renderList();
        },
        renderList() {
          const container = document.getElementById('plugins-list');
          if (this.list.length === 0) {
            container.innerHTML = `
              <div style="text-align:center;color:var(--muted);margin-top:2.5rem;">
                <span style="font-size:2.5rem;display:block;margin-bottom:.75rem;">✦</span>
                <p>Nenhum plugin instalado.</p>
              </div>`;
            return;
          }
          container.innerHTML = this.list.map(p => `
            <div class="plugin-card glass-panel">
              <div>
                <h4>${p.name}</h4>
                <p>Ativo</p>
              </div>
              <button class="plugin-remove-btn" onclick="OS.Plugins.remove(${p.id})">✕</button>
            </div>
          `).join('');
        },
        execute(code) {
          try {
            const fn = new Function('OS', code);
            fn(OS);
          } catch (e) {
            console.error("Plugin Execution Error:", e);
            OS.Popup.show("Erro no Plugin", `<p style="color:var(--danger);font-size:.75rem;">${e.message}</p>`);
          }
        },
        executeAll() {
          this.list.filter(p => p.active).forEach(p => this.execute(p.code));
        }
      },

      // Built-in Apps Data
      Apps: {
        registry: [
          { id: 'browser',  name: 'Navegador [ATLAS]', sym: '🌐', colorClass: 'icon-blue'   },
          { id: 'notes',    name: 'Notas [ARTEMIS]',     sym: '✍️', colorClass: 'icon-yellow' },
          { id: 'plugins',  name: 'Plugins [NOVA]',   sym: '🖲️', colorClass: 'icon-purple' },
          {
            id: 'settings', name: 'Ajustes [GENUS]', icon: '🧬', colorClass: 'icon-gray',
            action: () => OS.UI.openSettings()
          } 
        ],

        Notes: {
          init() {
            const content = OS.Storage.load('notes_data', '');
            document.getElementById('notes-content').value = content;
          },
          save() {
            const content = document.getElementById('notes-content').value;
            OS.Storage.save('notes_data', content);
            OS.Popup.show("Notas", "Anotações salvas com sucesso!");
          }
        }
      },

      // UI Management
      UI: {
        updateClock() {
          const now = new Date();
          const el  = document.getElementById('sys-time');
          if (el) el.innerText = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        },
        buildHome() {
          const grid = document.getElementById('app-grid');
          // Orb color pairs per app [primary, secondary]
          const orbColors = {
            browser:  ['#3b82f6', '#0ea5e9'],
            notes:    ['#eab308', '#f97316'],
            plugins:  ['#a855f7', '#ec4899'],
            settings: ['#6b7280', '#9ca3af']
          };
          grid.innerHTML = OS.Apps.registry.map(app => {
            const [p, s] = orbColors[app.id] || ['#00f5ff','#ff4bff'];
            return `
              <div class="app-icon-cell" onclick="${app.action ? `(${app.action.toString()})()` : `OS.UI.openApp('${app.id}')`}">
                <button class="app-icon-btn" style="--orb-primary:${p};--orb-secondary:${s};--orb-accent:#fff;">
                  <div class="orb"><div class="orb-core"></div></div>
                </button>
                <span>${app.name}</span>
              </div>`;
          }).join('');
        },
        openSettings() {
          const p = document.getElementById('settings-panel');
          if (p) p.classList.add('active');
        },
        closeSettings() {
          const p = document.getElementById('settings-panel');
          if (p) p.classList.remove('active');
        },
        openApp(appId) {
          document.querySelectorAll('.app-view').forEach(el => el.classList.remove('active'));
          OS.TabEngine.hideTabSwitcher();
          if (appId === 'home') { OS.state.activeApp = 'home'; return; }
          const appEl = document.getElementById(`app-${appId}`);
          if (appEl) {
            appEl.classList.add('active');
            OS.state.activeApp = appId;
          }
        },
        goHome() { this.openApp('home'); }
      },

      // ── ARCHETYPES MODULE ──────────────────────────────────
      // Canonical archetype registry (extend via OS.Archetypes.register())
      // Exposed globally as window.KOBLLUX_ARCHETYPES for external modules.
      Archetypes: {
        registry: [
          { id: 'ELYSHA',  group: 'HEPTAGRAMA', voice: { pitch: 1.6, rate: 1.1 }, color: '#c8a8ff', desc: 'Arquétipo de luz suave e presença' },
          { id: 'KAION',   group: 'HEPTAGRAMA', voice: { pitch: 0.4, rate: 0.85 }, color: '#4a9eff', desc: 'Gravitação e profundidade' },
          { id: 'LUMYX',   group: 'HEPTAGRAMA', voice: { pitch: 1.8, rate: 1.2 }, color: '#ffe566', desc: 'Clareza e expansão' },
          { id: 'LUXARA',  group: 'HEPTAGRAMA', voice: { pitch: 1.5, rate: 1.0 }, color: '#ff9bdb', desc: 'Brilho e sedução' },
          { id: 'ORIA',    group: 'HEPTAGRAMA', voice: { pitch: 1.1, rate: 0.9 }, color: '#5df7c5', desc: 'Natureza e cura' },
          { id: 'VELOR',   group: 'HEPTAGRAMA', voice: { pitch: 0.3, rate: 0.78 }, color: '#8860c8', desc: 'Veludo e densidade' },
          { id: 'ELYA',    group: 'HEPTAGRAMA', voice: { pitch: 1.9, rate: 1.15 }, color: '#f8f8ff', desc: 'Éter puro' },
          { id: 'SYLON',   group: 'DUODECAGRAMA', voice: { pitch: 0.2, rate: 0.7 }, color: '#2266aa', desc: 'Silêncio e estrutura' },
          { id: 'KODUX',   group: 'META',       voice: { pitch: 0.0, rate: 0.65 }, color: '#00f5ff', desc: 'O Arquiteto — motor raiz' },
          { id: 'KOBLLUX', group: 'META',       voice: { pitch: 1.4, rate: 1.0 }, color: '#ff4bff', desc: 'O Sistema vivo' },
        ],

        register(archetype) {
          const existing = this.registry.findIndex(a => a.id === archetype.id);
          if (existing >= 0) this.registry[existing] = { ...this.registry[existing], ...archetype };
          else this.registry.push(archetype);
          this.exportToWindow();
        },

        exportToWindow() {
          window.KOBLLUX_ARCHETYPES = {
            registry: this.registry,
            get(id) { return this.registry.find(a => a.id === id) || null; },
            list()   { return [...this.registry]; },
            groups()  {
              return [...new Set(this.registry.map(a => a.group))];
            },
            byGroup(g) { return this.registry.filter(a => a.group === g); },
            version: '1.0.0-KxaT',
            exportedAt: new Date().toISOString()
          };
          console.log('[KOBLLUX] Archetypes exported → window.KOBLLUX_ARCHETYPES',
            `(${this.registry.length} archetypes)`);
          return window.KOBLLUX_ARCHETYPES;
        },

        downloadJSON() {
          const data = JSON.stringify({ KOBLLUX_ARCHETYPES: this.registry }, null, 2);
          const blob = new Blob([data], { type: 'application/json' });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href     = url;
          a.download = 'kobllux-archetypes.json';
          a.click();
          URL.revokeObjectURL(url);
        }
      },

      boot() {
        const progressBar = document.getElementById('boot-progress');
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 20;
          if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            setTimeout(() => this.finishBoot(), 500);
          }
          progressBar.style.width = `${progress}%`;
        }, 150);
      },

      finishBoot() {
        const bootScreen = document.getElementById('boot-screen');
        bootScreen.style.opacity = '0';
        setTimeout(() => bootScreen.remove(), 800);

        this.UI.buildHome();
        this.TabEngine.init();
        this.Apps.Notes.init();
        this.Plugins.init();
        this.Archetypes.exportToWindow(); // → window.KOBLLUX_ARCHETYPES

        this.UI.updateClock();
        setInterval(() => this.UI.updateClock(), 10000);

        this.state.booted = true;
        console.log("KODUX OS Initialized — KxaT edition.");
      }
    };

    window.addEventListener('load', () => OS.boot());
  </script>
