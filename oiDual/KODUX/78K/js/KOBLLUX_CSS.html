<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBLLUX CSS Engine — Tailwind Converter</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#14171c; --border:#242830;
    --text:#e6e8eb; --muted:#8b929e; --accent:#6ee7b7; --accent2:#60a5fa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:ui-monospace,Menlo,Consolas,monospace;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  header{
    padding:1.25rem 1.5rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem;
  }
  header h1{font-size:1rem; margin:0; letter-spacing:.05em;}
  header h1 span{color:var(--accent);}
  header p{margin:0; font-size:.75rem; color:var(--muted);}

  main{
    display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border);
  }
  @media (max-width:800px){ main{grid-template-columns:1fr;} }

  .col{background:var(--bg); padding:1rem; display:flex; flex-direction:column; gap:.75rem;}
  .col h2{font-size:.8rem; color:var(--muted); margin:0; text-transform:uppercase; letter-spacing:.05em;}

  textarea, pre{
    width:100%; flex:1; min-height:320px; background:var(--panel);
    border:1px solid var(--border); border-radius:.5rem; color:var(--text);
    padding:.75rem; font-size:.8rem; line-height:1.5; resize:vertical;
    overflow:auto; white-space:pre-wrap; word-break:break-word;
  }

  .actions{display:flex; gap:.5rem; flex-wrap:wrap; align-items:center;}
  button{
    background:var(--accent); color:#06251a; border:none; border-radius:.375rem;
    padding:.5rem 1rem; font-weight:600; font-size:.8rem; cursor:pointer;
  }
  button.secondary{background:var(--panel); color:var(--text); border:1px solid var(--border);}
  button:hover{filter:brightness(1.08);}

  .stats{
    display:flex; gap:1rem; flex-wrap:wrap; font-size:.75rem; color:var(--muted);
  }
  .stats b{color:var(--accent2);}
  .not-found{color:#f97583; font-size:.72rem;}

/* =========================================================
   KOBLLUX CSS ENGINE — scanner.js
   Percorre um HTML (string ou DOM real) e coleta todas as
   classes usadas em atributos class="".
   ========================================================= */

window.KOBLLUX_CSS = window.KOBLLUX_CSS || {};

/**
 * scanHTML(html) -> string[]
 * Recebe uma string HTML e retorna um array de classes únicas,
 * já ordenado alfabeticamente.
 */
window.KOBLLUX_CSS.scanHTML = function (html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");
  return window.KOBLLUX_CSS.scanDOM(doc.body);
};

/**
 * scanDOM(rootNode) -> string[]
 * Percorre um nó DOM real (útil para escanear a própria página,
 * ex: document.body) e coleta as classes usadas.
 */
window.KOBLLUX_CSS.scanDOM = function (rootNode) {
  const found = new Set();
  const all = rootNode.querySelectorAll("[class]");

  all.forEach((el) => {
    el.classList.forEach((cls) => {
      if (cls.trim()) found.add(cls.trim());
    });
  });

  // também captura o próprio rootNode, se tiver classe
  if (rootNode.classList) {
    rootNode.classList.forEach((cls) => found.add(cls.trim()));
  }

  return Array.from(found).sort();
};



/* =========================================================
   KOBLLUX CSS ENGINE — parser.js
   Recebe a lista de classes encontradas pelo scanner.js e
   consulta o dictionary.js para descobrir a regra CSS de cada
   uma, já resolvendo variantes (hover:, focus:, dark:, md:...).
   ========================================================= */

window.KOBLLUX_CSS = window.KOBLLUX_CSS || {};

/**
 * flattenMap() -> { classe: corpoCSS }
 * Achata o dicionário (que é organizado por categoria) em um
 * único objeto plano para lookup O(1).
 */
window.KOBLLUX_CSS.flattenMap = function () {
  const flat = {};
  const categories = window.KOBLLUX_CSS.map;
  Object.keys(categories).forEach((cat) => {
    Object.assign(flat, categories[cat]);
  });
  return flat;
};

/**
 * parseClasses(classList) -> Array<{token, selector, body, mediaQuery, found}>
 * classList: string[] vindo do scanner
 *
 * Trata prefixos de variante separados por ":" — ex:
 *   "md:flex"        -> media query min-width
 *   "hover:bg-black"  -> pseudo-classe :hover
 *   "dark:text-white" -> escopo ".dark &"
 * Suporta até 1 prefixo por classe (o caso mais comum).
 */
window.KOBLLUX_CSS.parseClasses = function (classList) {
  const flat = window.KOBLLUX_CSS.flattenMap();
  const breakpoints = window.KOBLLUX_CSS.breakpoints;
  const pseudos = window.KOBLLUX_CSS.pseudoVariants;
  const darkSelector = window.KOBLLUX_CSS.darkSelector;

  return classList.map((token) => {
    let base = token;
    let prefix = null;

    const parts = token.split(":");
    if (parts.length === 2) {
      prefix = parts[0];
      base = parts[1];
    }

    const body = flat[base] || null;
    const escapedToken = token.replace(/[:/.]/g, (m) => "\\" + m);

    let selector = `.${escapedToken}`;
    let mediaQuery = null;

    if (prefix && breakpoints[prefix]) {
      mediaQuery = `(min-width:${breakpoints[prefix]})`;
    } else if (prefix && pseudos[prefix]) {
      selector = `.${escapedToken}${pseudos[prefix]}`;
    } else if (prefix === "dark") {
      selector = `${darkSelector} .${escapedToken}`;
    }

    return {
      token,
      selector,
      body,
      mediaQuery,
      found: !!body
    };
  });
};


/* =========================================================
   KOBLLUX CSS ENGINE — resolver-advanced.js
   Camada extra sobre o parser.js: resolve algoritmicamente
   o que não está no dictionary.js estático:
     - escala numérica (w-3, p-6, gap-8, mt-12, z-20...)
     - frações (w-1/2, w-2/3...)
     - valores arbitrários entre colchetes (w-[90%], bg-[#050505])
     - opacidade em cor (bg-black/80, border-white/10, text-blue-500/40)
     - variáveis CSS usadas como cor (bg-[var(--primary)])
     - group-hover: / group-focus:
   Isso cobre a maior parte do "cauda longa" do Tailwind sem
   precisar listar milhares de classes estáticas.
   ========================================================= */

window.KOBLLUX_CSS = window.KOBLLUX_CSS || {};

const SPACING_SCALE = {
  0: "0", px: "1px", "0.5": ".125rem", 1: ".25rem", "1.5": ".375rem",
  2: ".5rem", "2.5": ".625rem", 3: ".75rem", "3.5": ".875rem", 4: "1rem",
  5: "1.25rem", 6: "1.5rem", 7: "1.75rem", 8: "2rem", 9: "2.25rem",
  10: "2.5rem", 11: "2.75rem", 12: "3rem", 14: "3.5rem", 16: "4rem",
  20: "5rem", 24: "6rem", 28: "7rem", 32: "8rem", 36: "9rem", 40: "10rem",
  44: "11rem", 48: "12rem", 52: "13rem", 56: "14rem", 60: "15rem",
  64: "16rem", 72: "18rem", 80: "20rem", 96: "24rem"
};

const SPACING_PREFIXES = {
  "w": ["width"], "h": ["height"], "min-w": ["min-width"], "min-h": ["min-height"],
  "max-w": ["max-width"], "max-h": ["max-height"],
  "p": ["padding"], "px": ["padding-left", "padding-right"], "py": ["padding-top", "padding-bottom"],
  "pt": ["padding-top"], "pb": ["padding-bottom"], "pl": ["padding-left"], "pr": ["padding-right"],
  "m": ["margin"], "mx": ["margin-left", "margin-right"], "my": ["margin-top", "margin-bottom"],
  "mt": ["margin-top"], "mb": ["margin-bottom"], "ml": ["margin-left"], "mr": ["margin-right"],
  "gap": ["gap"], "gap-x": ["column-gap"], "gap-y": ["row-gap"],
  "top": ["top"], "right": ["right"], "bottom": ["bottom"], "left": ["left"], "inset": ["top", "right", "bottom", "left"],
  "z": ["z-index"], "text": ["font-size"], "tracking": ["letter-spacing"]
};

// Paleta reduzida do Tailwind default — cobre os tons mais comuns
const PALETTE = {
  black: "#000000", white: "#ffffff", transparent: "transparent",
  "gray-100": "#f3f4f6", "gray-400": "#9ca3af", "gray-500": "#6b7280",
  "gray-700": "#374151", "gray-800": "#1f2937", "gray-900": "#111827",
  "red-500": "#ef4444", "red-600": "#dc2626",
  "blue-400": "#60a5fa", "blue-500": "#3b82f6", "blue-600": "#2563eb",
  "green-500": "#22c55e", "yellow-500": "#eab308",
  "purple-500": "#a855f7", "pink-500": "#ec4899", "indigo-500": "#6366f1"
};

function hexToRgb(hex) {
  hex = hex.replace("#", "");
  if (hex.length === 3) hex = hex.split("").map((c) => c + c).join("");
  const num = parseInt(hex, 16);
  return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
}

/**
 * resolveAdvanced(base) -> corpo CSS (string) ou null
 * base = a classe já sem o prefixo de variante (hover:, md: etc.)
 */
window.KOBLLUX_CSS.resolveAdvanced = function (base) {

  // ---- 1. valor arbitrário entre colchetes: prop-[valor] ----
  const arbMatch = base.match(/^([a-z-]+)-\[(.+)\]$/i);
  if (arbMatch) {
    const prefix = arbMatch[1];
    let value = arbMatch[2].replace(/_/g, " ");

    const propsForPrefix = {
      "w": "width", "h": "height", "min-w": "min-width", "max-w": "max-width",
      "z": "z-index", "top": "top", "left": "left", "right": "right", "bottom": "bottom",
      "bg": "background", "text": "color", "border": "border-color",
      "shadow": "box-shadow", "tracking": "letter-spacing", "ease": "transition-timing-function"
    };
    const prop = propsForPrefix[prefix];
    if (prop) return `${prop}:${value};`;
  }

  // ---- 2. opacidade em cor: bg-black/80, border-white/10, text-blue-500/40 ----
  const opMatch = base.match(/^(bg|border|text)-([a-z]+(?:-[0-9]{2,3})?)\/(\d{1,3})$/i);
  if (opMatch) {
    const [, kind, colorName, alphaStr] = opMatch;
    const hex = PALETTE[colorName];
    if (hex && hex !== "transparent") {
      const [r, g, b] = hexToRgb(hex);
      const alpha = Math.min(100, parseInt(alphaStr, 10)) / 100;
      const prop = kind === "bg" ? "background" : kind === "border" ? "border-color" : "color";
      return `${prop}:rgba(${r},${g},${b},${alpha});`;
    }
  }

  // ---- 3. cor via variável CSS: bg-[var(--x)], text-[var(--x)] já cai no caso 1 (arbMatch) ----

  // ---- 4. fração: w-1/2, w-2/3, h-1/4 ----
  const fracMatch = base.match(/^(w|h)-(\d+)\/(\d+)$/);
  if (fracMatch) {
    const [, dim, num, den] = fracMatch;
    const pct = (parseInt(num, 10) / parseInt(den, 10)) * 100;
    const prop = dim === "w" ? "width" : "height";
    return `${prop}:${pct.toFixed(4).replace(/0+$/, "").replace(/\.$/, "")}%;`;
  }

  // ---- 5. escala numérica: w-3, p-6, gap-8, mt-12, z-20, text-10 (raro) ----
  const scaleMatch = base.match(/^([a-z-]+)-(-?[\d.]+|px)$/);
  if (scaleMatch) {
    const [, prefix, num] = scaleMatch;
    const props = SPACING_PREFIXES[prefix];
    if (props) {
      let val;
      if (prefix === "z") {
        val = num; // z-index não usa rem
      } else {
        val = SPACING_SCALE[num];
        if (val === undefined) return null;
      }
      return props.map((p) => `${p}:${val};`).join("");
    }
  }

  return null;
};




/* =========================================================
   KOBLLUX CSS ENGINE — generator.js
   Recebe as regras já resolvidas pelo parser.js e monta o
   texto final do mini-tailwind.css, agrupando media queries
   no final do arquivo.
   ========================================================= */

window.KOBLLUX_CSS = window.KOBLLUX_CSS || {};

/**
 * generateCSS(parsedRules, options) -> { css, stats }
 * parsedRules: saída de parseClasses()
 * options.minify: boolean (default false)
 */
window.KOBLLUX_CSS.generateCSS = function (parsedRules, options) {
  options = options || {};
  const minify = !!options.minify;

  const plainRules = [];
  const mediaGroups = {}; // mediaQuery -> [regra css]
  const notFound = [];

  parsedRules.forEach((rule) => {
    if (!rule.found) {
      notFound.push(rule.token);
      return;
    }
    const line = `${rule.selector}{${rule.body}}`;
    if (rule.mediaQuery) {
      if (!mediaGroups[rule.mediaQuery]) mediaGroups[rule.mediaQuery] = [];
      mediaGroups[rule.mediaQuery].push(line);
    } else {
      plainRules.push(line);
    }
  });

  let out = "";
  out += "/* ============================================\n";
  out += "   KOBLLUX mini-tailwind.css — gerado automaticamente\n";
  out += "   Apenas as classes realmente usadas no HTML\n";
  out += "   ============================================ */\n\n";

  out += plainRules.join(minify ? "" : "\n") + "\n";

  Object.keys(mediaGroups).forEach((mq) => {
    out += `\n@media ${mq}{\n`;
    out += mediaGroups[mq].map((l) => "  " + l).join("\n");
    out += "\n}\n";
  });

  const stats = {
    totalClasses: parsedRules.length,
    resolved: parsedRules.length - notFound.length,
    notFound,
    bytes: new Blob([out]).size
  };

  return { css: out, stats };
};



/* =========================================================
   KOBLLUX CSS ENGINE — exporter.js
   Cria o download do arquivo CSS gerado, sem dependências.
   ========================================================= */

window.KOBLLUX_CSS = window.KOBLLUX_CSS || {};

/**
 * downloadCSS(cssText, filename)
 * Dispara o download de um arquivo .css no navegador.
 */
window.KOBLLUX_CSS.downloadCSS = function (cssText, filename) {
  filename = filename || "mini-tailwind.css";
  const blob = new Blob([cssText], { type: "text/css" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
};

/**
 * runFullPipeline(html, options) -> { css, stats }
 * Atalho que roda scanner -> parser -> generator de uma vez.
 */
window.KOBLLUX_CSS.runFullPipeline = function (html, options) {
  const classes = window.KOBLLUX_CSS.scanHTML(html);
  const parsed = window.KOBLLUX_CSS.parseClasses(classes);
  return window.KOBLLUX_CSS.generateCSS(parsed, options);
};





  const inputHTML  = document.getElementById("inputHTML");
  const outputCSS  = document.getElementById("outputCSS");
  const statsBox   = document.getElementById("stats");
  let lastCSS = "";

  const SAMPLE = `<div class="flex items-center justify-between gap-4 p-4 rounded-lg bg-black text-white shadow-lg">
  <h1 class="text-2xl font-bold">KOBLLUX</h1>
  <button class="px-4 py-2 rounded-md bg-blue-500 text-white hover:bg-black transition">
    Entrar
  </button>
</div>`;

  document.getElementById("btnSample").addEventListener("click", () => {
    inputHTML.value = SAMPLE;
  });

  document.getElementById("btnGenerate").addEventListener("click", () => {
    const html = inputHTML.value.trim();
    if (!html) {
      outputCSS.textContent = "/* cole algum HTML antes de gerar */";
      statsBox.textContent = "";
      return;
    }

    const result = window.KOBLLUX_CSS.runFullPipeline(html);
    lastCSS = result.css;
    outputCSS.textContent = result.css;

    const s = result.stats;
    let html2 = `Classes encontradas: <b>${s.totalClasses}</b> · `
              + `Resolvidas: <b>${s.resolved}</b> · `
              + `Tamanho gerado: <b>${(s.bytes/1024).toFixed(2)} KB</b>`;
    if (s.notFound.length) {
      html2 += `<div class="not-found">Não encontradas no dicionário: ${s.notFound.join(", ")}</div>`;
    }
    statsBox.innerHTML = html2;
  });

  document.getElementById("btnDownload").addEventListener("click", () => {
    if (!lastCSS) {
      alert("Gere o CSS primeiro.");
      return;
    }
    window.KOBLLUX_CSS.downloadCSS(lastCSS, "mini-tailwind.css");
  });
</script>
