 /* Orb */
 .orb {      
 background: radial-gradient(circle at 30% 30%, var(--grad-a, #78e7ff), transparent 78%),
                  radial-gradient(circle at 70% 70%, var(--kob-voice-secondary, #00f2ff), var(--orb-secondary, #3b82f6));
      box-shadow: 0 0 18px var(--kob-voice-primary), 0 0 36px rgba(120,227,255,0.4);
      animation: orbSpin var(--orb-speed) linear infinite;
      width: 100%; height: 100%; border-radius: 50%; display: grid; place-items: center;

      width: 56px; height: 56px; 

    }
    .orb-core {

      min-width: 100%; min-height: 100%; 
border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--orb-accent, #78e7ff), transparent 78%),
                  radial-gradient(circle at 70% 70%, var(--kob-voice-primary, #00f2ff), var(--kob-voice-secondary, #3b82f6));
      box-shadow: 0 0 18px var(--kob-voice-secondary), 0 0 36px rgba(120,227,255,0.4);
      animation: orbSpin var(--orb-speed) linear infinite;

      width: 56px; height: 56px; 

    }
    @keyframes orbSpin { to { transform: rotate(360deg); } }
    @keyframes orbPulse { from { transform: scale(1); } to { transform: scale(1.15); } }
 /* ════════════════════════════════════════
   KOB VOICE OVERRIDE • RESPONSE FEED
   Cole no FINAL do CSS
════════════════════════════════════════ */

.response-container{
    --feed-primary: var(--kob-voice-primary) !important;
    --feed-secondary: var(--kob-voice-secondary) !important;

    border:1px solid var(--feed-primary) !important;
    box-shadow:
        0 0 20px color-mix(in srgb,var(--feed-primary) 25%,transparent) !important;
}

.response-block{
    color:var(--feed-primary) !important;

    border:1px solid color-mix(in srgb,var(--feed-primary) 20%,transparent) !important;

    background:
        linear-gradient(
            135deg,
            color-mix(in srgb,var(--feed-primary) 10%,transparent),
            color-mix(in srgb,var(--feed-secondary) 8%,transparent)
        ) !important;
}

.response-block:hover{
    border-color:var(--feed-primary) !important;
    box-shadow:
        0 0 18px color-mix(in srgb,var(--feed-primary) 45%,transparent) !important;
}

.response-block h1,
.response-block h2,
.response-block h3,
.response-block h4,
.response-block strong{
    color:var(--feed-primary) !important;
}

.response-block a{
    color:var(--feed-secondary) !important;
}

.response-block code{
    color:var(--feed-secondary) !important;
    border:1px solid color-mix(in srgb,var(--feed-secondary) 30%,transparent) !important;
}

.intro{
    border-left:4px solid var(--feed-primary) !important;

    background:
        linear-gradient(
            135deg,
            color-mix(in srgb,var(--feed-primary) 14%,transparent),
            transparent
        ) !important;
}

.middle{
    border-left:4px solid var(--feed-primary) !important;
}

.ending{
    border-left:4px solid var(--feed-secondary) !important;

    background:
        linear-gradient(
            135deg,
            color-mix(in srgb,var(--feed-secondary) 14%,transparent),
            transparent
        ) !important;
}

.footer-text{
    color:var(--feed-secondary) !important;
}

.pagination button{
    color:var(--feed-primary) !important;
}

#pageIndicator{
    color:var(--feed-primary) !important;
}

.control-btn{
    border:1px solid color-mix(in srgb,var(--feed-primary) 20%,transparent) !important;
}

.control-btn:hover{
    background:color-mix(in srgb,var(--feed-primary) 12%,transparent) !important;
}

.control-btn svg{
    stroke:var(--feed-primary) !important;
}

.crystal-btn{
    color:var(--feed-primary) !important;
    border-color:var(--feed-primary) !important;
}

.btn-prim{
    background:var(--feed-primary) !important;
    color:#000 !important;
}

#pulsos{
    color:var(--feed-primary) !important;
}

.toggle-button.active svg{
    stroke:var(--feed-primary) !important;
    filter:drop-shadow(0 0 8px var(--feed-primary)) !important;
}

.toggle-button.error svg{
    stroke:var(--feed-secondary) !important;
    filter:drop-shadow(0 0 8px var(--feed-secondary)) !important;
}

.response-container::-webkit-scrollbar-thumb{
    background:var(--feed-primary) !important;
}

.response-container::selection,
.response-block::selection{
    background:var(--feed-primary) !important;
    color:#000 !important;
}
/* ===== TEXT OVERRIDE ===== */

.response-container,
.response-container *{
    color:var(--kob-voice-primary) !important;
}

.response-container .page.initial,
.response-container .page.initial strong,
.response-container .page.initial em,
.response-container .page.initial span{
    color:#fff !important;
    text-shadow:0 0 8px color-mix(in srgb,var(--kob-voice-primary) 35%,transparent) !important;
}

.response-container p,
.response-container li,
.response-container div,
.response-container strong,
.response-container em{
    color:#fff !important;
}

.response-container a{
    color:var(--kob-voice-secondary) !important;
}
