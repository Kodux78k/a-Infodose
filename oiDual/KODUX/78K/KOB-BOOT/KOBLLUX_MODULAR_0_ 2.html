    window.addEventListener('KOBLLUX_READY', () => {
      console.log('🧿 KOBLLUX Pronto! Componentes UI carregados.');
      
      // Inicializar ícones Lucide
      if (window.lucide) lucide.createIcons();

        });
      }
      
      // Função global para toggle de seções
      window.toggleSection = function(id, forceOpen = false) {
        const el = document.getElementById(id);
        if (!el) return;
        const h = el.classList.contains('activation-hidden');
        if (forceOpen && !h) return;
        el.classList.toggle('activation-hidden', !forceOpen && !h);
        el.classList.toggle('activation-open', forceOpen || h);
      };
      
      // Função global para modos
      window.setMode = function(mode) {
        if (window.OrbEngine) window.OrbEngine.setMode(mode);
        const btnModeCard = document.getElementById('btnModeCard');
        const btnModeOrb = document.getElementById('btnModeOrb');
        const btnModeHud = document.getElementById('btnModeHud');
        
        [btnModeCard, btnModeOrb, btnModeHud].forEach(btn => {
          if (btn) btn.classList.remove('active-mode');
        });
        
        if (mode === 'card' && btnModeCard) btnModeCard.classList.add('active-mode');
        if (mode === 'orb' && btnModeOrb) btnModeOrb.classList.add('active-mode');
        if (mode === 'hud' && btnModeHud) btnModeHud.classList.add('active-mode');
      };
    });
