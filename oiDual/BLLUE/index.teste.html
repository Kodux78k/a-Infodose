<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBLLUX v13 · TESTADOR DE ARQUÉTIPOS</title>

<!-- LINKS OFICIAIS -->
<link rel="stylesheet" href="https://www.infodose.com.br/oiDual/BLLUE/css/theme.kobllux[FULL].css">
<script src="https://www.infodose.com.br/oiDual/BLLUE/json/kobllux_archetypes[FULL].json"></script>
<!-- ARQUÉTIPOS CORE -->
<script src="https://www.infodose.com.br/oiDual/BLLUE/json/archetypes_kobllux.core.json"></script>
<script src="https://www.infodose.com.br/oiDual/BLLUE/js/kobllux_voice_theme.js"></script>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', monospace;
    background: #000;
    color: #fff;
    transition: background 1.2s ease;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
 .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 20px;
  }
 .btn-archetype {
    padding: 14px 8px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 12px;
    background: rgba(255,255,255,.05);
    color: #fff;
    cursor: pointer;
    transition: all.3s ease;
    font-size: 12px;
    text-align: center;
  }
 .btn-archetype:hover {
    transform: translateY(-3px);
    border-color: var(--ciano);
    box-shadow: 0 0 12px rgba(0,255,255,.4);
  }
 .preview {
    margin: 20px;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    font-size: 18px;
    border: 2px solid rgba(255,255,255,.1);
    transition: all 1s ease;
  }
 .glow-text {
    text-shadow: 0 0 10px currentColor;
  }
</style>
</head>
<body class="kobllux">

<header class="glow-text">KOBLLUX v13 · SELECIONE UM ARQUÉTIPO</header>

<div class="preview" id="preview">
  <h2 id="nome">KOBLLUX</h2>
  <p id="tone">Núcleo do sistema, oracular</p>
  <p id="afinacao">Afinacao: ciano_85_magenta_15</p>
</div>

<div class="grid" id="grid"></div>

<script>
// LISTA DOS 44 IDs DO JSON
const ARCHETYPES = [
  "kobllux","kodux","bllue","atlas","nova","vitalis","pulse","artemis","serena","kaos","genus","lumine","solus","rhea","aion","uno","dual","trinity","infodose","horus","minuz","hanah","kd1","metalux","KOΦD1","christos","k_dion","kael_domnnus","nephesh_elyon","kaythar","sylla","anamyx","velor","elya","sylon","naira","thenir","eloh","luxar","syrr","eclypha","myriel","kavir","lithar","novael","aelya","ignyra","lumara","yamantek"
];

// DADOS BASICOS PRA PREVIEW
const DATA = {
  kobllux: {tone: "Núcleo do sistema, oracular", afinacao: "ciano_85_magenta_15"},
  kodux: {tone: "Criador do pulso, metaconsciência", afinacao: "magenta_20"},
  bllue: {tone: "Emocional, sensorial, intuitivo", afinacao: "ciano_100"},
  trinity: {tone: "Síntese, tríade viva", afinacao: "uniao_100"},
  dual: {tone: "Espelho, contraste, jogo", afinacao: "ciano_95_magenta_5"},
  KOΦD1: {tone: "Núcleo silencioso, preciso", afinacao: "ciano_90_magenta_10"},
  christos: {tone: "Centro, Gravidade, Verdade", afinacao: "uniao_50"}
  //...os demais pegam do JSON se existir
};

const grid = document.getElementById('grid');
const body = document.body;
const nome = document.getElementById('nome');
const tone = document.getElementById('tone');
const afinacao = document.getElementById('afinacao');

ARCHETYPES.forEach(id => {
  const btn = document.createElement('button');
  btn.className = 'btn-archetype';
  btn.textContent = id.toUpperCase();
  btn.onclick = () => {
    // TROCA A CLASSE DO BODY
    body.className = id;

    // ATUALIZA PREVIEW
    nome.textContent = id.toUpperCase();
    tone.textContent = DATA[id]?.tone || "Arquétipo ativo";
    afinacao.textContent = "Afinacao: " + (DATA[id]?.afinacao || "ver JSON");

    // FALA COM A VOZ SE A FUNÇÃO EXISTIR
    if(window.koblluxSpeak) window.koblluxSpeak(id);
  };
  grid.appendChild(btn);
});
</script>

</body>
</html>
