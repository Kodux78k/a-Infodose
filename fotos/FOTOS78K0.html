<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KODUX OS | Grid 78k V2</title>

<style>
:root {
    /* Off-white clean farm background */
    --bg-color: #f4f3ef;
    --bg-gradient: radial-gradient(circle at 50% 0%, #ffffff, #e6e4d9);
    
    /* Dark alt glassmorphism */
    --glass-bg: rgba(20, 20, 22, 0.65);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-shadow: 0 24px 64px rgba(0, 0, 0, 0.15);
    --cell-bg: rgba(255, 255, 255, 0.05);
    --cell-border: rgba(255, 255, 255, 0.08);
    --cell-hover: rgba(255, 255, 255, 0.1);
    
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.6);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    height: 100%;
    background: var(--bg-color);
    background-image: var(--bg-gradient);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Session Window Wrapper */
.session-window {
    display: flex;
    flex-direction: column;
    width: 95vw;
    max-width: 600px;
    height: 90vh;
    max-height: 800px;
    background: var(--glass-bg);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    box-shadow: var(--glass-shadow);
    overflow: hidden;
}

/* Header & Brand */
header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
}

.brand {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-primary);
    font-weight: 600;
    letter-spacing: 0.5px;
}

.header-actions {
    display: flex;
    gap: 10px;
}

/* Action Buttons */
button {
    border: 1px solid var(--glass-border);
    padding: 10px 18px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

button:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-1px);
}

button.danger:hover {
    background: rgba(255, 59, 48, 0.2);
    border-color: rgba(255, 59, 48, 0.4);
    color: #ff453a;
}

button svg {
    width: 18px;
    height: 18px;
}

#board-container {
    flex: 1;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#board {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 10px;
}

.cell {
    background: var(--cell-bg);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--cell-border);
    position: relative;
    cursor: pointer;
    transition: background 0.3s ease, border-color 0.3s ease;
}

.cell:hover {
    background: var(--cell-hover);
    border-color: rgba(255, 255, 255, 0.2);
}

.cell svg.icon-plus {
    width: 28px;
    height: 28px;
    stroke: var(--text-secondary);
    transition: transform 0.3s ease;
}

.cell:hover svg.icon-plus {
    transform: scale(1.1);
}

.cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    animation: fadeIn 0.4s ease forwards;
}

/* Individual Remove Button (Glass Overlay) */
.remove-item-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(20, 20, 22, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.2s ease;
    z-index: 10;
}

.cell:hover .remove-item-btn {
    opacity: 1;
    transform: scale(1);
}

.remove-item-btn:hover {
    background: rgba(255, 59, 48, 0.8);
    border-color: rgba(255, 255, 255, 0.4);
}

.remove-item-btn svg {
    width: 14px;
    height: 14px;
    stroke: #ffffff;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

footer {
    padding: 20px;
    display: flex;
    justify-content: center;
    border-top: 1px solid var(--glass-border);
}

footer button {
    background: #ffffff;
    color: #000000;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
}

footer button:hover {
    background: #f0f0f0;
}
</style>
</head>
<body>

<div class="session-window">
    <header>
        <div class="brand">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span id="titleSpan">KODUX 78k</span>
        </div>
        <div class="header-actions">
            <button id="clearBtn" class="danger">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                <span id="clearText">Limpar</span>
            </button>
            <button id="uploadBtn">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span id="uploadText">Adicionar</span>
            </button>
        </div>
    </header>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <footer>
        <button id="downloadBtn">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            <span id="downloadText">Exportar PNG</span>
        </button>
    </footer>
</div>

<input type="file" id="picker" accept="image/*" hidden>

<script>
const board = document.getElementById("board");
const picker = document.getElementById("picker");
let currentCell = null;

// Garante o uso de textContent
document.getElementById("titleSpan").textContent = "KODUX 78k";
document.getElementById("clearText").textContent = "Limpar";
document.getElementById("uploadText").textContent = "Adicionar";
document.getElementById("downloadText").textContent = "Exportar";

const svgPlusIcon = `<svg class="icon-plus" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
const svgTrashIcon = `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

// Restaura a célula para o estado inicial
const resetCell = (cell) => {
    cell.innerHTML = svgPlusIcon;
};

// Construir o Grid
for(let i = 0; i < 25; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    resetCell(cell);

    cell.onclick = () => {
        // Só abre o picker se a célula estiver vazia
        if (!cell.querySelector('img')) {
            currentCell = cell;
            picker.click();
        }
    };
    board.appendChild(cell);
}

// Limpar Sessão (todas as células)
document.getElementById("clearBtn").onclick = () => {
    document.querySelectorAll(".cell").forEach(resetCell);
};

// Auto-selecionar próxima vazia
document.getElementById("uploadBtn").onclick = () => {
    const empty = [...document.querySelectorAll(".cell")]
        .find(c => !c.querySelector("img"));
    
    if (empty) {
        currentCell = empty;
        picker.click();
    }
};

// Handler do arquivo
picker.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
        currentCell.innerHTML = ""; // Limpa o ícone de plus
        
        // Adiciona a imagem
        const img = document.createElement("img");
        img.src = ev.target.result;
        
        // Cria botão de remoção individual
        const removeBtn = document.createElement("div");
        removeBtn.className = "remove-item-btn";
        removeBtn.innerHTML = svgTrashIcon;
        
        // Impede que o click no remover abra o input file (bubbling)
        removeBtn.onclick = (e) => {
            e.stopPropagation(); 
            resetCell(currentCell);
        };

        currentCell.appendChild(img);
        currentCell.appendChild(removeBtn);
    };
    reader.readAsDataURL(file);
    picker.value = "";
};

// ==========================================
// MOTOR CANVAS (Refatorado como Callback)
// ==========================================
const renderGridCanvas = (callback) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    const size = 1500;
    const cols = 5;
    const gap = 20;
    const padding = 40;
    
    canvas.width = size;
    canvas.height = size;

    // Fundo da imagem (dark alt)
    ctx.fillStyle = '#141416';
    ctx.fillRect(0, 0, size, size);

    const cellSize = (size - (padding * 2) - (gap * (cols - 1))) / cols;
    const cells = document.querySelectorAll('.cell');

    cells.forEach((cell, index) => {
        const row = Math.floor(index / cols);
        const col = index % cols;
        const x = padding + col * (cellSize + gap);
        const y = padding + row * (cellSize + gap);

        // Fundo célula vazia
        ctx.fillStyle = '#1e1e22';
        ctx.beginPath();
        ctx.roundRect(x, y, cellSize, cellSize, 32); 
        ctx.fill();

        const imgEl = cell.querySelector('img');
        if (imgEl) {
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(x, y, cellSize, cellSize, 32);
            ctx.clip(); 
            
            const imgRatio = imgEl.naturalWidth / imgEl.naturalHeight;
            let drawW = cellSize, drawH = cellSize, drawX = x, drawY = y;

            if (imgRatio > 1) {
                drawW = cellSize * imgRatio;
                drawX = x - (drawW - cellSize) / 2;
            } else {
                drawH = cellSize / imgRatio;
                drawY = y - (drawH - cellSize) / 2;
            }
            
            ctx.drawImage(imgEl, drawX, drawY, drawW, drawH);
            ctx.restore();
        }
    });

    // Retorna a Data URL via callback
    callback(canvas.toDataURL("image/png"));
};

// Execução do Callback
document.getElementById("downloadBtn").onclick = () => {
    renderGridCanvas((dataUrl) => {
        const link = document.createElement("a");
        link.download = "kodux-grid-78k-v2.png";
        link.href = dataUrl;
        link.click();
    });
};
</script>

</body>
</html>
