<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODUX SVG STUDIO · Visualizador + Gerador 78K</title>
<style>
  /* =========================================
     KODUX SVG STUDIO · CSS PURO
     ========================================= */

  :root {
    --cyan: #00f2ff;
    --purple: #bd00ff;
    --gold: #ffd700;
    --dark: #0A0A0F;
    --glass: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text: #ffffff;
    --text-70: rgba(255,255,255,0.7);
    --text-50: rgba(255,255,255,0.5);

    --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px;
    --s5: 24px; --s6: 32px; --s7: 48px; --s8: 64px;

    --r1: 8px; --r2: 12px; --r3: 16px; --r4: 24px;
  }

    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--dark);
    color: var(--text);
    line-height: 1.6;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(189,0,255,0.1), transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(0,242,255,0.08), transparent 50%);
  }

 .font-mono { font-family: 'Space Mono', 'Courier New', monospace; }

 .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: var(--s6) var(--s5);
  }

  /* Glass */
 .glass {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--r4);
  }

  /* Gradient */
 .gradient-text {
    background: linear-gradient(135deg, var(--cyan), var(--purple), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Header */
  header {
    text-align: center;
    padding: var(--s7) 0;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    margin-bottom: var(--s2);
  }

 .subtitle {
    opacity: 0.7;
    font-size: 1.125rem;
  }

  /* Layout */
 .grid {
    display: grid;
    gap: var(--s6);
    margin-top: var(--s6);
  }

 .grid-2 {
    grid-template-columns: 1fr 1fr;
  }

  @media (max-width: 968px) {
   .grid-2 { grid-template-columns: 1fr; }
  }

  /* Card */
 .card {
    padding: var(--s6);
    border-radius: var(--r4);
  }

 .card h2 {
    font-size: 1.5rem;
    margin-bottom: var(--s4);
    display: flex;
    align-items: center;
    gap: var(--s2);
  }

  /* Inputs */
 .input-group {
    margin-bottom: var(--s5);
  }

 .input-group label {
    display: block;
    font-weight: 700;
    font-size: 0.875rem;
    margin-bottom: var(--s2);
    opacity: 0.9;
  }

  textarea, input[type="text"], input[type="number"], input[type="color"], select {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: var(--s3) var(--s4);
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    transition: all 0.2s;
  }

  textarea {
    min-height: 200px;
    resize: vertical;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
  }

  textarea:focus, input:focus, select:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,242,255,0.1);
  }

  input[type="color"] {
    height: 48px;
    padding: var(--s1);
    cursor: pointer;
  }

  input[type="range"] {
    width: 100%;
    height: 6px;
    background: var(--glass);
    border-radius: var(--r1);
    outline: none;
  }

 .range-value {
    display: inline-block;
    min-width: 40px;
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 0.875rem;
    color: var(--cyan);
  }

  /* Botões */
 .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--s2);
    padding: var(--s3) var(--s5);
    border-radius: var(--r2);
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-size: 0.875rem;
    font-family: inherit;
    transition: all 0.2s;
    text-decoration: none;
  }

 .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #000;
  }

 .btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,242,255,0.4);
  }

 .btn-secondary {
    background: var(--glass);
    color: var(--text);
    border: 1px solid var(--border);
  }

 .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
  }

 .btn-group {
    display: flex;
    gap: var(--s2);
    flex-wrap: wrap;
  }

  /* Visualizador */
 .viewer {
    background: #000;
    border-radius: var(--r2);
    padding: var(--s6);
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid var(--border);
  }

 .viewer svg {
    max-width: 100%;
    max-height: 100%;
    filter: drop-shadow(0 0 20px rgba(0,242,255,0.3));
  }

 .viewer-empty {
    text-align: center;
    opacity: 0.3;
  }

  /* Grid de ícones */
 .icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: var(--s3);
    margin-top: var(--s4);
  }

 .icon-item {
    aspect-ratio: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

 .icon-item:hover {
    background: var(--glass);
    border-color: var(--cyan);
    transform: scale(1.1);
  }

 .icon-item svg {
    width: 32px;
    height: 32px;
    stroke: var(--text);
    stroke-width: 2;
  }

 .icon-item.selected {
    background: rgba(0,242,255,0.1);
    border-color: var(--cyan);
  }

  /* Tabs */
 .tabs {
    display: flex;
    gap: var(--s2);
    border-bottom: 1px solid var(--border);
    margin-bottom: var(--s5);
  }

 .tab {
    padding: var(--s3) var(--s5);
    background: transparent;
    border: none;
    color: var(--text-70);
    cursor: pointer;
    font-weight: 700;
    font-size: 0.875rem;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

 .tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
  }

 .tab-content {
    display: none;
  }

 .tab-content.active {
    display: block;
  }

  /* Utilitários */
 .flex { display: flex; }
 .items-center { align-items: center; }
 .justify-between { justify-content: space-between; }
 .gap-2 { gap: var(--s2); }
 .gap-4 { gap: var(--s4); }
 .mt-4 { margin-top: var(--s4); }
 .mt-6 { margin-top: var(--s5); }
 .mb-4 { margin-bottom: var(--s4); }
 .text-sm { font-size: 0.875rem; }
 .text-xs { font-size: 0.75rem; }
 .opacity-70 { opacity: 0.7; }
 .opacity-50 { opacity: 0.5; }
 .text-center { text-align: center; }

  /* Toast */
 .toast {
    position: fixed;
    bottom: var(--s6);
    right: var(--s6);
    background: var(--cyan);
    color: #000;
    padding: var(--s3) var(--s5);
    border-radius: var(--r2);
    font-weight: 700;
    z-index: 9999;
    animation: slideIn 0.3s ease;
    box-shadow: 0 0 30px rgba(0,242,255,0.5);
  }

  @keyframes slideIn {
    from { transform: translateX(400px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Code block */
 .code-block {
    background: #000;
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: var(--s4);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    overflow-x: auto;
    white-space: pre;
    color: var(--cyan);
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1 class="gradient-text">KODUX SVG STUDIO</h1>
    <p class="subtitle">Visualizador • Gerador • Download • 78K</p>
  </div>
</header>

<div class="container">

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="visualizar">Visualizar SVG</button>
    <button class="tab" data-tab="gerar">Gerar Ícones</button>
    <button class="tab" data-tab="biblioteca">Biblioteca</button>
  </div>

  <!-- TAB: VISUALIZAR -->
  <div id="tab-visualizar" class="tab-content active">
    <div class="grid grid-2">

      <!-- INPUT -->
      <div class="glass card">
        <h2>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
          Código SVG
        </h2>

        <div class="input-group">
          <label>Cole seu SVG aqui:</label>
          <textarea id="svgInput" placeholder='<svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor">
  <circle cx="12" cy="12" r="10"/>
  <path d="M12 6v6l4 2"/>
</svg>'></textarea>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="renderBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Renderizar
          </button>
          <button class="btn btn-secondary" id="clearBtn">Limpar</button>
        </div>

        <div class="input-group mt-6">
          <label>Exportar como:</label>
          <div class="btn-group">
            <button class="btn btn-secondary" id="downloadSvgBtn">SVG</button>
            <button class="btn btn-secondary" id="downloadPngBtn">PNG</button>
            <button class="btn btn-secondary" id="copyCodeBtn">Copiar Código</button>
          </div>
        </div>

        <div class="input-group">
          <label>Dimensões PNG:</label>
          <div class="flex gap-4">
            <input type="number" id="pngWidth" value="512" min="64" max="4096" placeholder="Largura">
            <input type="number" id="pngHeight" value="512" min="64" max="4096" placeholder="Altura">
          </div>
        </div>
      </div>

      <!-- VIEWER -->
      <div class="glass card">
        <h2>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Visualização
        </h2>

        <div class="viewer" id="viewer">
          <div class="viewer-empty">
            <svg class="icon icon-xl" style="opacity: 0.2; margin: 0 auto 16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
            <p class="text-sm opacity-50">Cole um SVG e clique em Renderizar</p>
          </div>
        </div>

        <div class="mt-4 text-sm opacity-70">
          <div>Dimensões: <span id="svgDimensions" class="font-mono">--</span></div>
          <div>ViewBox: <span id="svgViewbox" class="font-mono">--</span></div>
        </div>
      </div>

    </div>
  </div>

  <!-- TAB: GERAR -->
  <div id="tab-gerar" class="tab-content">
    <div class="grid grid-2">

      <!-- CONTROLES -->
      <div class="glass card">
        <h2>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          Gerador de Ícones
        </h2>

        <div class="input-group">
          <label>Tipo de Ícone:</label>
          <select id="iconType">
            <option value="circle">Círculo</option>
            <option value="square">Quadrado</option>
            <option value="triangle">Triângulo</option>
            <option value="hexagon">Hexágono</option>
            <option value="star">Estrela</option>
            <option value="heart">Coração</option>
            <option value="zap">Raio</option>
            <option value="shield">Escudo</option>
            <option value="atom">Átomo</option>
            <option value="infinity">Infinito</option>
          </select>
        </div>

        <div class="input-group">
          <label>Tamanho: <span class="range-value" id="sizeValue">64</span>px</label>
          <input type="range" id="iconSize" min="24" max="256" value="64">
        </div>

        <div class="input-group">
          <label>Cor Principal:</label>
          <input type="color" id="iconColor" value="#00f2ff">
        </div>

        <div class="input-group">
          <label>Cor Secundária:</label>
          <input type="color" id="iconColor2" value="#bd00ff">
        </div>

        <div class="input-group">
          <label>Espessura: <span class="range-value" id="strokeValue">2</span>px</label>
          <input type="range" id="iconStroke" min="1" max="8" value="2">
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="iconFill"> Preenchido
          </label>
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="iconGlow"> Brilho 78K
          </label>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="generateIconBtn">Gerar Ícone</button>
          <button class="btn btn-secondary" id="randomIconBtn">Aleatório</button>
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="glass card">
        <h2>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          Preview
        </h2>

        <div class="viewer" id="iconViewer">
          <div class="viewer-empty">
            <p class="text-sm opacity-50">Configure e clique em Gerar</p>
          </div>
        </div>

        <div class="btn-group mt-4">
          <button class="btn btn-primary" id="downloadIconSvgBtn">Download SVG</button>
          <button class="btn btn-secondary" id="downloadIconPngBtn">Download PNG</button>
          <button class="btn btn-secondary" id="copyIconCodeBtn">Copiar Código</button>
        </div>

        <div class="mt-6">
          <label class="text-sm opacity-70">Código SVG:</label>
          <div class="code-block" id="iconCode">&lt;!-- Gere um ícone --&gt;</div>
        </div>
      </div>

    </div>
  </div>

  <!-- TAB: BIBLIOTECA -->
  <div id="tab-biblioteca" class="tab-content">
    <div class="glass card">
      <h2>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 0 0 1 4 19.5v-15A2.5 0 0 1 6.5 2z"/>
        </svg>
        Biblioteca KODUX 78K
      </h2>
      <p class="text-sm opacity-70 mb-6">Clique em um ícone para carregar no visualizador</p>

      <div class="icon-grid" id="iconLibrary"></div>

      <div class="btn-group mt-6">
        <button class="btn btn-primary" id="downloadAllBtn">Download Todos (ZIP)</button>
        <button class="btn btn-secondary" id="generateSpriteBtn">Gerar Sprite SVG</button>
      </div>
    </div>
  </div>

</div>

<script>
  /* =========================================
     KODUX SVG STUDIO · JAVASCRIPT
     ========================================= */

  // TABS
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // TOAST
  function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    if (isError) toast.style.background = '#c44';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // TAB 1: VISUALIZADOR
  const svgInput = document.getElementById('svgInput');
  const viewer = document.getElementById('viewer');
  const renderBtn = document.getElementById('renderBtn');
  const clearBtn = document.getElementById('clearBtn');
  const downloadSvgBtn = document.getElementById('downloadSvgBtn');
  const downloadPngBtn = document.getElementById('downloadPngBtn');
  const copyCodeBtn = document.getElementById('copyCodeBtn');
  const pngWidth = document.getElementById('pngWidth');
  const pngHeight = document.getElementById('pngHeight');
  const svgDimensions = document.getElementById('svgDimensions');
  const svgViewbox = document.getElementById('svgViewbox');

  let currentSVG = null;

  function renderSVG() {
    const code = svgInput.value.trim();
    if (!code) {
      showToast('Cole um código SVG primeiro', true);
      return;
    }

    try {
      viewer.innerHTML = code;
      currentSVG = viewer.querySelector('svg');

      if (currentSVG) {
        const w = currentSVG.getAttribute('width') || 'auto';
        const h = currentSVG.getAttribute('height') || 'auto';
        const vb = currentSVG.getAttribute('viewBox') || 'não definido';
        svgDimensions.textContent = `${w} x ${h}`;
        svgViewbox.textContent = vb;
        showToast('SVG renderizado!');
      } else {
        throw new Error('SVG inválido');
      }
    } catch (e) {
      showToast('Erro ao renderizar SVG', true);
      viewer.innerHTML = '<div class="viewer-empty"><p class="text-sm opacity-50">Erro no código SVG</p></div>';
    }
  }

  renderBtn.addEventListener('click', renderSVG);

  clearBtn.addEventListener('click', () => {
    svgInput.value = '';
    viewer.innerHTML = '<div class="viewer-empty"><p class="text-sm opacity-50">Cole um SVG e clique em Renderizar</p></div>';
    svgDimensions.textContent = '--';
    svgViewbox.textContent = '--';
    currentSVG = null;
  });

  downloadSvgBtn.addEventListener('click', () => {
    if (!currentSVG) {
      showToast('Renderize um SVG primeiro', true);
      return;
    }
    const blob = new Blob([svgInput.value], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kodux-svg-${Date.now()}.svg`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('SVG baixado!');
  });

  downloadPngBtn.addEventListener('click', () => {
    if (!currentSVG) {
      showToast('Renderize um SVG primeiro', true);
      return;
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const w = parseInt(pngWidth.value) || 512;
    const h = parseInt(pngHeight.value) || 512;
    canvas.width = w;
    canvas.height = h;

    const img = new Image();
    const svgData = new XMLSerializer().serializeToString(currentSVG);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    img.onload = () => {
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `kodux-svg-${Date.now()}.png`;
        a.click();
        showToast('PNG baixado!');
      });
    };
    img.src = url;
  });

  copyCodeBtn.addEventListener('click', () => {
    if (!svgInput.value) {
      showToast('Nada para copiar', true);
      return;
    }
    navigator.clipboard.writeText(svgInput.value);
    showToast('Código copiado!');
  });

  // TAB 2: GERADOR
  const iconType = document.getElementById('iconType');
  const iconSize = document.getElementById('iconSize');
  const iconColor = document.getElementById('iconColor');
  const iconColor2 = document.getElementById('iconColor2');
  const iconStroke = document.getElementById('iconStroke');
  const iconFill = document.getElementById('iconFill');
  const iconGlow = document.getElementById('iconGlow');
  const sizeValue = document.getElementById('sizeValue');
  const strokeValue = document.getElementById('strokeValue');
  const generateIconBtn = document.getElementById('generateIconBtn');
  const randomIconBtn = document.getElementById('randomIconBtn');
  const iconViewer = document.getElementById('iconViewer');
  const iconCode = document.getElementById('iconCode');
  const downloadIconSvgBtn = document.getElementById('downloadIconSvgBtn');
  const downloadIconPngBtn = document.getElementById('downloadIconPngBtn');
  const copyIconCodeBtn = document.getElementById('copyIconCodeBtn');

  let currentGeneratedSVG = null;

  iconSize.addEventListener('input', () => {
    sizeValue.textContent = iconSize.value;
  });

  iconStroke.addEventListener('input', () => {
    strokeValue.textContent = iconStroke.value;
  });

  const iconTemplates = {
    circle: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>` : ''}
  <circle cx="12" cy="12" r="9" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    square: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <rect x="3" y="3" width="18" height="18" rx="2" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    triangle: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <polygon points="12 3 21 19 3 19" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    hexagon: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <polygon points="12 2 20 7 20 17 12 22 4 17 4 7" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    star: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    heart: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 0 0 0 0-7.78z" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    zap: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    shield: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

    atom: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <circle cx="12" cy="12" r="1" fill="${c1}"/>
  <ellipse cx="12" cy="12" rx="10" ry="4" stroke="${c1}" stroke-width="${sw}" fill="none" ${g? 'filter="url(#glow)"' : ''}/>
  <ellipse cx="12" cy="12" rx="10" ry="4" stroke="${c2}" stroke-width="${sw}" fill="none" transform="rotate(60 12 12)" ${g? 'filter="url(#glow)"' : ''}/>
  <ellipse cx="12" cy="12" rx="10" ry="4" stroke="${c1}" stroke-width="${sw}" fill="none" transform="rotate(120 12 12)" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`,

        infinity: (s, c1, c2, sw, f, g) => `
<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  ${g? `<defs><filter id="glow"><feGaussianBlur stdDeviation="2"/></filter></defs>` : ''}
  <path d="M18.6 6.6c-1.4-1.4-3.5-1.4-4.9 0L12 8.3l-1.7-1.7c-1.4-3.5-1.4-4.9 0s-1.4 3.5 0 4.9L12 18.1l6.6-6.6c1.4-1.4 1.4-3.5 0-4.9z" stroke="${c1}" stroke-width="${sw}" fill="${f? c1 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
  <path d="M5.4 17.4c1.4 3.5 1.4 4.9 0L12 15.7l1.7 1.7c1.4 3.5 1.4 4.9 0s1.4-3.5 0-4.9L12 5.9l-6.6 6.6c-1.4 1.4-1.4 3.5 0 4.9z" stroke="${c2}" stroke-width="${sw}" fill="${f? c2 : 'none'}" ${g? 'filter="url(#glow)"' : ''}/>
</svg>`
  };

  function generateIcon() {
    const type = iconType.value;
    const size = iconSize.value;
    const color1 = iconColor.value;
    const color2 = iconColor2.value;
    const stroke = iconStroke.value;
    const fill = iconFill.checked;
    const glow = iconGlow.checked;

    const svgCode = iconTemplates[type](size, color1, color2, stroke, fill, glow).trim();

    iconViewer.innerHTML = svgCode;
    iconCode.textContent = svgCode;
    currentGeneratedSVG = svgCode;

    showToast('Ícone gerado!');
  }

  generateIconBtn.addEventListener('click', generateIcon);

  randomIconBtn.addEventListener('click', () => {
    const types = Object.keys(iconTemplates);
    iconType.value = types[Math.floor(Math.random() * types.length)];
    iconSize.value = Math.floor(Math.random() * 100) + 48;
    iconStroke.value = Math.floor(Math.random() * 4) + 1;
    iconFill.checked = Math.random() > 0.5;
    iconGlow.checked = Math.random() > 0.5;
    iconColor.value = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
    iconColor2.value = `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;

    sizeValue.textContent = iconSize.value;
    strokeValue.textContent = iconStroke.value;

    generateIcon();
  });

  downloadIconSvgBtn.addEventListener('click', () => {
    if (!currentGeneratedSVG) {
      showToast('Gere um ícone primeiro', true);
      return;
    }
    const blob = new Blob([currentGeneratedSVG], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kodux-icon-${iconType.value}-${Date.now()}.svg`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('SVG baixado!');
  });

  downloadIconPngBtn.addEventListener('click', () => {
    if (!currentGeneratedSVG) {
      showToast('Gere um ícone primeiro', true);
      return;
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const size = parseInt(iconSize.value);
    canvas.width = size * 2;
    canvas.height = size * 2;

    const img = new Image();
    const svgBlob = new Blob([currentGeneratedSVG], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    img.onload = () => {
      ctx.drawImage(img, 0, 0, size * 2, size * 2);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `kodux-icon-${iconType.value}-${Date.now()}.png`;
        a.click();
        showToast('PNG baixado!');
      });
    };
    img.src = url;
  });

  copyIconCodeBtn.addEventListener('click', () => {
    if (!currentGeneratedSVG) {
      showToast('Nada para copiar', true);
      return;
    }
    navigator.clipboard.writeText(currentGeneratedSVG);
    showToast('Código copiado!');
  });

  // TAB 3: BIBLIOTECA
  const iconLibrary = document.getElementById('iconLibrary');
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  const generateSpriteBtn = document.getElementById('generateSpriteBtn');

  const koduxLibrary = [
    { name: 'Atlas', icon: 'circle', color: '#3B82F6' },
    { name: 'Nova', icon: 'star', color: '#EC4899' },
    { name: 'Vitalis', icon: 'zap', color: '#F59E0B' },
    { name: 'Pulse', icon: 'atom', color: '#8B5CF6' },
    { name: 'Artemis', icon: 'triangle', color: '#10B981' },
    { name: 'Serena', icon: 'heart', color: '#06B6D4' },
    { name: 'Kaos', icon: 'hexagon', color: '#EF4444' },
    { name: 'Genus', icon: 'square', color: '#F97316' },
    { name: 'Lumine', icon: 'star', color: '#EAB308' },
    { name: 'Rhea', icon: 'circle', color: '#6366F1' },
    { name: 'Solus', icon: 'hexagon', color: '#64748B' },
    { name: 'Aion', icon: 'infinity', color: '#A855F7' }
  ];

  function renderLibrary() {
    iconLibrary.innerHTML = '';
    koduxLibrary.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'icon-item';
      div.dataset.index = idx;
      div.title = item.name;

      const svg = iconTemplates[item.icon](32, item.color, '#bd00ff', 2, false, true);
      div.innerHTML = svg;

      div.addEventListener('click', () => {
        document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('selected'));
        div.classList.add('selected');

        // Carrega no visualizador
        svgInput.value = svg;
        renderSVG();

        // Muda para tab visualizar
        document.querySelector('[data-tab="visualizar"]').click();
        showToast(`${item.name} carregado!`);
      });

      iconLibrary.appendChild(div);
    });
  }

  renderLibrary();

  downloadAllBtn.addEventListener('click', async () => {
    showToast('Gerando ZIP...');

    // Simula JSZip (sem dependência externa)
    const files = koduxLibrary.map(item => {
      const svg = iconTemplates[item.icon](64, item.color, '#bd00ff', 2, false, true);
      return { name: `kodux-${item.name.toLowerCase()}.svg`, content: svg };
    });

    // Cria arquivo único com todos os SVGs
    let combined = `<?xml version="1.0" encoding="UTF-8"?>\n<!-- KODUX SVG LIBRARY 78K -->\n<svg xmlns="http://www.w3.org/2000/svg">\n`;
    files.forEach(f => {
      combined += `\n<!-- ${f.name} -->\n${f.content}\n`;
    });
    combined += `\n</svg>`;

    const blob = new Blob([combined], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kodux-library-${Date.now()}.svg`;
    a.click();
    URL.revokeObjectURL(url);

    showToast('Biblioteca baixada!');
  });

  generateSpriteBtn.addEventListener('click', () => {
    let sprite = `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" style="display:none;">\n <defs>\n`;

    koduxLibrary.forEach(item => {
      const svg = iconTemplates[item.icon](24, item.color, '#bd00ff', 2, false, false);
      const inner = svg.match(/<svg[^>]*>([\s\S]*)<\/svg>/)[1];
      sprite += ` <symbol id="kodux-${item.name.toLowerCase()}" viewBox="0 0 24 24">\n${inner} </symbol>\n`;
    });

    sprite += ` </defs>\n</svg>`;

    svgInput.value = sprite;
    renderSVG();
    document.querySelector('[data-tab="visualizar"]').click();
    showToast('Sprite gerado! Use: <use href="#kodux-atlas"/>');
  });

  // Inicializa com ícone exemplo
  generateIcon();

</script>

</body>
</html>
