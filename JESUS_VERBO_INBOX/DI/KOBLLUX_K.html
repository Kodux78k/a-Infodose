  <!-- ══════════════════════════════════════════════════════════
       BLOCO: SCRIPT · IDLE
       TIPO: script-inline
       GRUPO: idle
       TOGGLE: on
       DESCRIÇÃO: adiciona/remove .idle no <body> após 30s sem
       mousemove/mousedown/keydown/touchstart/scroll.
  ══════════════════════════════════════════════════════════ -->
  <script id="script-idle" data-k-id="JSI_20" data-k-group="idle" data-k-toggle="on">
    (function() {
      'use strict';
      let idleTimer;
      const IDLE_TIMEOUT = 30000; // 30 segundos
      function resetIdle() {
        document.body.classList.remove('idle');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          document.body.classList.add('idle');
        }, IDLE_TIMEOUT);
      }
      // Eventos que resetam o idle
      ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(event => {
        document.addEventListener(event, resetIdle, { passive: true });
      });
      // Iniciar
      resetIdle();
      console.log('⧈ Idle System: Ativado');
    })();
  </script>
  <!-- ══════════════════════════════════════════════════════════

       TIPO: script-inline
       GRUPO: init
       TOGGLE: on  ⚠ registra o listener de 'KOBLLUX_READY' que

       window.toggleSection / window.setMode. Desligar isso deixa
       tudo que depende do evento KOBLLUX_READY inerte.
       DESCRIÇÃO: ouvinte único disparado quando o bootloader
       termina de montar os componentes de UI.
  ══════════════════════════════════════════════════════════ -->
  <script data-k-id="JSI_21" data-k-group="init" data-k-toggle="on">
    window.addEventListener('KOBLLUX_READY', () => {
      console.log('🧿 KOBLLUX Pronto! Componentes UI carregados.');
      // Inicializar ícones Lucide
      if (window.lucide) lucide.createIcons();
      // Inicializar Particles.js
      if (window.particlesJS) {
        particlesJS('particles-js', {
          particles: {
            number: { value: 24 },
            color: { value: ['#0ff', '#f0f'] }
          },
          retina_detect: true
        });
      }
      // Dev Panel Toggle
      const devBtn = document.getElementById('dev-btn');
      const devPanel = document.getElementById('dev-panel');
      const closeDevPanel = document.getElementById('close-dev-panel');
      if (devBtn && devPanel) {
        devBtn.addEventListener('click', () => {
          devPanel.style.display = devPanel.style.display === 'none' ? 'block' : 'none';
        });
      }
      if (closeDevPanel) {
        closeDevPanel.addEventListener('click', () => {
          devPanel.style.display = 'none';
        });
      }
      // KBLX Panel Toggle
      const kblxBack = document.getElementById('kblx-back');
      const closeKblxPanel = document.getElementById('close-kblx-panel');
      const kblxClose = document.getElementById('kblx-close');
      if (closeKblxPanel) {
        closeKblxPanel.addEventListener('click', () => {
          kblxBack.style.display = 'none';
        });
      }
      if (kblxClose) {
        kblxClose.addEventListener('click', () => {
          kblxBack.style.display = 'none';
        });
      }
      // Função global para toggle de seções
      window.toggleSection = function(id, forceOpen = false) {
        const el = document.getElementById(id);
        if (!el) return;
        const h = el.classList.contains('activation-hidden');
        if (forceOpen && !h) return;
        el.classList.toggle('activation-hidden', !forceOpen && !h);
        el.classList.toggle('activation-open', forceOpen || h);
      };
      // Função global para modos
      window.setMode = function(mode) {
        if (window.OrbEngine) window.OrbEngine.setMode(mode);
        const btnModeCard = document.getElementById('btnModeCard');
        const btnModeOrb = document.getElementById('btnModeOrb');
        const btnModeHud = document.getElementById('btnModeHud');
        [btnModeCard, btnModeOrb, btnModeHud].forEach(btn => {
          if (btn) btn.classList.remove('active-mode');
        });
        if (mode === 'card' && btnModeCard) btnModeCard.classList.add('active-mode');
        if (mode === 'orb' && btnModeOrb) btnModeOrb.classList.add('active-mode');
        if (mode === 'hud' && btnModeHud) btnModeHud.classList.add('active-mode');
      };
    });
  </script>
