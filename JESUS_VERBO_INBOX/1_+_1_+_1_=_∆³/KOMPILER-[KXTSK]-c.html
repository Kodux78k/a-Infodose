<html lang="pt-BR"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KOBLLUX · iFSw + .kob Visualizer</title>

  <!-- ===== ESTILOS EXTERNOS (iFSw + KOBLLUX) ===== -->
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/M0D/iFSw/css/iFSw-fix.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-glass-0.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-e.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kxt-solar.css">
  <link rel="stylesheet" href="https://kodux78k.github.io/oiDual--Y-/css/kob-nanai.css">

  <!-- ===== ESTILOS LOCAIS (customizações) ===== -->
  <style>
    /* Reset / Base */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg-base, #0a0c14);
      color: var(--text-main, #e8e8e8);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header do sistema */
    .os-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      background: rgba(10, 10, 15, 0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.08));
      flex-shrink: 0;
      z-index: 100;
    }
    .os-brand {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .os-brand small {
      font-weight: 300;
      font-size: 0.7rem;
      color: var(--text-muted, #888);
      margin-left: 8px;
    }
    .top-actions {
      display: flex;
      gap: 12px;
    }
    .top-actions button {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .top-actions button:hover {
      background: rgba(255,255,255,0.12);
      border-color: var(--neon-cyan, #00f3ff);
    }

    /* Layout principal: aside + conteúdo */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ASIDE (lista de arquivos do pack) */
    aside {
      width: 280px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .aside-header {
      padding: 16px 20px 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid var(--glass-border);
    }
    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 20px;
    }
    .file-group {
      margin-bottom: 16px;
    }
    .file-group .group-title {
      font-size: 0.6rem;
      text-transform: uppercase;
      color: var(--text-dim, #555);
      letter-spacing: 0.8px;
      margin-bottom: 4px;
      padding-left: 4px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .file-item:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }
    .file-item.active {
      background: rgba(0, 243, 255, 0.08);
      color: var(--neon-cyan);
      border-left: 2px solid var(--neon-cyan);
    }
    .file-item .name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item .size {
      font-size: 0.6rem;
      color: var(--text-dim);
    }
    .aside-footer {
      padding: 10px 20px;
      border-top: 1px solid var(--glass-border);
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* Área principal (stack de janelas iFSw) */
    #stackWrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at 20% 30%, rgba(188,19,254,0.05), transparent 60%);
    }

    /* Janela iFSw (reaproveitando estilo do arquivo) */
    .session-window {
      position: absolute;
      inset: 20px;
      background: rgba(20,20,30,0.7);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: all 0.3s ease;
      resize: both;
    }
    .session-window.maximized {
      inset: 0 !important;
      border-radius: 0 !important;
      resize: none !important;
    }
    .session-window.collapsed .win-frame {
      display: none;
    }
    .win-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--glass-border);
      cursor: default;
      flex-shrink: 0;
    }
    .win-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .win-controls {
      display: flex;
      gap: 6px;
    }
    .win-controls button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: 0.15s;
    }
    .win-controls button:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }
    .win-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #0a0c14;
    }

    /* Editor de código (dentro da janela, mas podemos colocar abaixo) */
    .editor-area {
      height: 160px;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .editor-area .editor-header {
      padding: 4px 16px;
      font-size: 0.65rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
    }
    .editor-area textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0e0;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      padding: 12px;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    /* Orb (mini avatar) no header */
    .orb-avatar {
      display: inline-block;
      width: 28px;
      height: 28px;
      vertical-align: middle;
      margin-right: 6px;
    }
    .orb-avatar svg {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    /* Responsividade */
    @media (max-width: 700px) {
      aside { width: 200px; }
    }
    @media (max-width: 550px) {
      .app-layout { flex-direction: column; }
      aside { width: 100%; height: 180px; border-right: none; border-bottom: 1px solid var(--glass-border); }
      .file-list { display: flex; flex-wrap: wrap; gap: 4px; overflow-y: auto; }
      .file-group { width: 100%; margin-bottom: 4px; }
      .session-window { inset: 10px; }
    }
  </style>
</head>
<body>

  <!-- ===== TOPBAR ===== -->
  <header class="os-topbar">
    <div class="os-brand">
      <span class="orb-avatar" id="headerOrb"></span>
      KxTsK <small>iFSw + .kob</small>
    </div>
    <div class="top-actions">
      <button id="btnOpenPack">📂 Abrir .kob</button>
      <button id="btnSavePack">💾 Salvar Local</button>
      <button id="btnExportPack" style="background:var(--neon-cyan);color:#000;border-color:var(--neon-cyan);">⬇ Exportar .kob</button>
      <button id="btnFullscreenWin">⛶ Tela Cheia</button>
    </div>
  </header>

  <!-- ===== LAYOUT PRINCIPAL ===== -->
  <div class="app-layout">

    <!-- ASIDE (lista de arquivos) -->
    <aside id="aside">
      <div class="aside-header">
        <span>📁 Arquivos do Pack</span>
        <span id="fileCount">0</span>
      </div>
      <div class="file-list" id="fileList">
        <!-- injetado via JS -->
      </div>
      <div class="aside-footer">
        <span>📦 <span id="totalSize">0 KB</span></span>
        <span>📄 <span id="totalFiles">0</span></span>
      </div>
    </aside>

    <!-- ÁREA DE JANELAS iFSw -->
    <div id="stackWrap">
      <div class="session-window" id="mainWindow">
        <div class="win-hdr" id="winHeader">
          <div class="win-title">
            <span class="orb-avatar" id="windowOrb"></span>
            <span id="winTitle">🌐 Preview</span>
          </div>
          <div class="win-controls">
            <button onclick="toggleCollapse()" title="Colapsar">—</button>
            <button onclick="toggleMaximize()" title="Maximizar">⬜</button>
            <button onclick="toggleFullscreen()" title="Tela Cheia">⛶</button>
          </div>
        </div>
        <iframe class="win-frame" id="previewFrame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" loading="lazy"></iframe>
        <!-- Editor de código (dentro da janela, na parte inferior) -->
        <div class="editor-area" id="editorArea">
          <div class="editor-header">
            <span>📝 Editor</span>
            <span id="editorInfo">—</span>
          </div>
          <textarea id="codeEditor" placeholder="Conteúdo do arquivo selecionado…" spellcheck="false"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== INPUT OCULTO PARA ABRIR .kob ===== -->
  <input type="file" id="fileInputPack" accept=".kob" style="display:none;">

  <!-- ===== SCRIPTS EXTERNOS (iFSw, orbs, etc.) ===== -->
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/FSWIN/js/modules/iFSw-fix.js"></script>
  <script src="https://kodux78k.github.io/oiDual-KxT-di_oi/js/modules/bgPaneli.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/js/78F-bgPanel.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/LS/js/insert-LS-3.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kard/js/modules/0-inline-000.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kard/js/modules/inline-000.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/kard/js/modules/o0.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/js/koblluxv30.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/js/kodbrain.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/js/kob-LVb.js"></script>

  <!-- ===== SCRIPT PRINCIPAL (Visualizador .kob + integração) ===== -->
  <script>
    (function() {
      'use strict';

      // ----- ESTADO DO PACK -----
      const state = {
        pack: { html: {}, css: {}, js: {}, images: {}, icons: {}, manifest: {}, assets: {} },
        selected: null, // { type, name }
      };

      // ----- DOM REFS -----
      const $ = (id) => document.getElementById(id);
      const fileListEl = $('fileList');
      const fileCountEl = $('fileCount');
      const totalSizeEl = $('totalSize');
      const totalFilesEl = $('totalFiles');
      const previewFrame = $('previewFrame');
      const codeEditor = $('codeEditor');
      const editorInfo = $('editorInfo');
      const winTitle = $('winTitle');
      const fileInputPack = $('fileInputPack');
      const mainWindow = $('mainWindow');

      // ----- UTILITÁRIOS -----
      function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
      }

      function getFileType(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (['html', 'htm'].includes(ext)) return 'html';
        if (['css'].includes(ext)) return 'css';
        if (['js', 'mjs'].includes(ext)) return 'js';
        if (['png', 'jpg', 'jpeg', 'webp', 'gif'].includes(ext)) return 'images';
        if (['svg', 'ico'].includes(ext)) return 'icons';
        if (['json', 'webmanifest'].includes(ext)) return 'manifest';
        return 'assets';
      }

      function base64ToString(b64) {
        try {
          const raw = atob(b64);
          return decodeURIComponent(raw.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        } catch (e) {
          return atob(b64);
        }
      }

      function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      // ----- RENDERIZA A LISTA DE ARQUIVOS NO ASIDE -----
      function renderFileList() {
        const pack = state.pack;
        const groups = [
          { key: 'html', label: '🌐 HTML' },
          { key: 'css', label: '🎨 CSS' },
          { key: 'js', label: '⚡ JS' },
          { key: 'images', label: '🖼️ Imagens' },
          { key: 'icons', label: '🔮 Ícones' },
          { key: 'manifest', label: '📋 Manifestos' },
          { key: 'assets', label: '📎 Outros' },
        ];

        let html = '';
        let totalFiles = 0;
        let totalBytes = 0;

        groups.forEach(group => {
          const files = pack[group.key] || {};
          const names = Object.keys(files);
          if (names.length === 0) return;
          totalFiles += names.length;
          names.forEach(name => {
            const dataUrl = files[name];
            const base64 = dataUrl.split(',')[1] || '';
            totalBytes += base64.length * 0.75;
          });

          html += `<div class="file-group"><div class="group-title">${group.label}</div>`;
          names.forEach(name => {
            const isActive = (state.selected && state.selected.type === group.key && state.selected.name === name);
            html += `
              <div class="file-item ${isActive ? 'active' : ''}" data-type="${group.key}" data-name="${name}">
                <span class="name">${name}</span>
                <span class="size">${formatSize(files[name].length * 0.75)}</span>
              </div>
            `;
          });
          html += `</div>`;
        });

        fileListEl.innerHTML = html || '<div style="padding:20px;color:#555;font-size:0.9rem;">Nenhum arquivo carregado.</div>';
        fileCountEl.textContent = totalFiles;
        totalFilesEl.textContent = totalFiles;
        totalSizeEl.textContent = formatSize(totalBytes);

        // Eventos de clique
        document.querySelectorAll('.file-item').forEach(el => {
          el.addEventListener('click', () => {
            const type = el.dataset.type;
            const name = el.dataset.name;
            selectFile(type, name);
          });
        });
      }

      // ----- SELECIONA UM ARQUIVO E ATUALIZA PREVIEW/EDITOR -----
      function selectFile(type, name) {
        const pack = state.pack;
        if (!pack[type] || !pack[type][name]) return;

        state.selected = { type, name };
        const dataUrl = pack[type][name];
        const base64 = dataUrl.split(',')[1] || '';

        // Atualiza título da janela
        winTitle.textContent = `📄 ${name}`;

        // Se for HTML, renderiza no iframe com CSS/JS injetados
        if (type === 'html') {
          let htmlContent = base64ToString(base64);
          // Injeta CSS e JS do pack
          let css = '';
          for (let c in pack.css) {
            css += `<style>${base64ToString(pack.css[c].split(',')[1])}</style>`;
          }
          let js = '';
          for (let j in pack.js) {
            js += `<script>${base64ToString(pack.js[j].split(',')[1])}<\/script>`;
          }
          // Substitui </head> e </body> para injetar
          htmlContent = htmlContent.replace('</head>', css + '</head>');
          htmlContent = htmlContent.replace('</body>', js + '</body>');
          previewFrame.srcdoc = htmlContent;
        } else if (type === 'images' || type === 'icons') {
          // Exibe imagem
          previewFrame.srcdoc = `<html><body style="background:#0a0c14;display:flex;align-items:center;justify-content:center;height:100%;margin:0;"><img src="${dataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;"></body></html>`;
        } else {
          // Texto (CSS, JS, etc.)
          const text = base64ToString(base64);
          previewFrame.srcdoc = `<html><body style="background:#0a0c14;color:#e0e0e0;font-family:monospace;padding:20px;white-space:pre-wrap;word-wrap:break-word;">${text}</body></html>`;
        }

        // Editor de código (mostra o conteúdo textual)
        let rawText = '';
        try {
          rawText = base64ToString(base64);
        } catch (e) {
          rawText = 'Não foi possível decodificar.';
        }
        codeEditor.value = rawText;
        editorInfo.textContent = `${name} (${formatSize(dataUrl.length * 0.75)})`;

        // Destaque na lista
        document.querySelectorAll('.file-item').forEach(el => {
          el.classList.toggle('active', el.dataset.type === type && el.dataset.name === name);
        });
      }

      // ----- ADICIONA ARQUIVOS AO PACK (via upload ou drag) -----
      async function addFilesToPack(files) {
        for (const file of files) {
          const dataUrl = await fileToDataURL(file);
          const type = getFileType(file.name);
          // Se for imagem, direciona para images ou icons
          let category = type;
          if (type === 'images' || type === 'icons') {
            // Mantém a categoria já definida
          } else if (!['html', 'css', 'js', 'manifest'].includes(type)) {
            category = 'assets';
          }
          state.pack[category][file.name] = dataUrl;
        }
        renderFileList();
        // Seleciona o primeiro arquivo (se houver)
        const first = document.querySelector('.file-item');
        if (first) {
          selectFile(first.dataset.type, first.dataset.name);
        }
      }

      // ----- CARREGAR PACK .kob (JSON) -----
      function loadPackFromJSON(json) {
        const pack = json;
        ['html', 'css', 'js', 'images', 'icons', 'manifest', 'assets'].forEach(key => {
          if (!pack[key]) pack[key] = {};
        });
        state.pack = pack;
        renderFileList();
        // Seleciona primeiro HTML ou o primeiro arquivo
        const htmlKeys = Object.keys(pack.html);
        if (htmlKeys.length > 0) {
          selectFile('html', htmlKeys[0]);
        } else {
          for (const key of ['html', 'css', 'js', 'images', 'icons', 'manifest', 'assets']) {
            const names = Object.keys(pack[key]);
            if (names.length > 0) {
              selectFile(key, names[0]);
              break;
            }
          }
        }
      }

      // ----- EXPORTAR .kob -----
      function exportPack() {
        const dataStr = JSON.stringify(state.pack);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pack.kob';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      // ----- SALVAR LOCALSTORAGE -----
      function saveToLocalStorage() {
        try {
          localStorage.setItem('di_kobllux_pack', JSON.stringify(state.pack));
          alert('Pack salvo no LocalStorage!');
        } catch (e) {
          alert('Erro ao salvar: ' + e.message);
        }
      }

      // ----- CARREGAR DO LOCALSTORAGE -----
      function loadFromLocalStorage() {
        const data = localStorage.getItem('di_kobllux_pack');
        if (data) {
          try {
            const pack = JSON.parse(data);
            loadPackFromJSON(pack);
          } catch (e) {
            alert('Erro ao ler dados salvos.');
          }
        } else {
          alert('Nenhum pack salvo no LocalStorage.');
        }
      }

      // ----- CONTROLES DA JANELA iFSw -----
      window.toggleCollapse = function() {
        mainWindow.classList.toggle('collapsed');
      };
      window.toggleMaximize = function() {
        mainWindow.classList.toggle('maximized');
      };
      window.toggleFullscreen = function() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      };

      // ----- EVENTOS -----
      // Abrir .kob
      $('btnOpenPack').addEventListener('click', () => fileInputPack.click());
      fileInputPack.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const pack = JSON.parse(ev.target.result);
            loadPackFromJSON(pack);
          } catch (err) {
            alert('Erro ao ler .kob: ' + err.message);
          }
        };
        reader.readAsText(file);
        fileInputPack.value = '';
      });

      // Exportar
      $('btnExportPack').addEventListener('click', exportPack);

      // Salvar local
      $('btnSavePack').addEventListener('click', saveToLocalStorage);

      // Carregar local (duplo clique no logo ou botão extra? vou usar no logo)
      document.querySelector('.os-brand').addEventListener('dblclick', loadFromLocalStorage);

      // Fullscreen da janela (botão na topbar)
      $('btnFullscreenWin').addEventListener('click', () => {
        if (mainWindow.requestFullscreen) {
          mainWindow.requestFullscreen();
        } else {
          toggleFullscreen();
        }
      });

      // Drag & Drop global para adicionar arquivos ao pack
      let dragCounter = 0;
      document.addEventListener('dragover', (e) => {
        e.preventDefault();
        dragCounter++;
      });
      document.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
      });
      document.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        if (e.dataTransfer.files.length) {
          addFilesToPack(e.dataTransfer.files);
        }
      });

      // ----- INICIALIZAÇÃO -----
      function init() {
        // Tenta carregar do localStorage
        const saved = localStorage.getItem('di_kobllux_pack');
        if (saved) {
          try {
            const pack = JSON.parse(saved);
            loadPackFromJSON(pack);
            return;
          } catch (e) {}
        }
        // Exemplo com HTML básico
        const exampleHTML = `<html><head><title>KOBLLUX</title><style>body{background:#0a0c14;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:sans-serif;}</style></head><body><h1 style="background:linear-gradient(135deg,#fff,#ffa500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">KOBLLUX · iFSw + .kob</h1></body></html>`;
        const b64 = btoa(unescape(encodeURIComponent(exampleHTML)));
        state.pack.html['index.html'] = 'data:text/html;base64,' + b64;
        renderFileList();
        selectFile('html', 'index.html');
        // Salva automaticamente como exemplo
        saveToLocalStorage();
      }

      init();

      // ===== ORB (avatar) no header e na janela =====
      // Função makeOrbAvatar deve estar disponível (vinda dos scripts externos)
      function updateOrbs(name) {
        const safe = name || 'Convidado';
        const headerOrb = document.getElementById('headerOrb');
        const windowOrb = document.getElementById('windowOrb');
        if (window.makeOrbAvatar) {
          if (headerOrb) headerOrb.innerHTML = window.makeOrbAvatar(safe, 28);
          if (windowOrb) windowOrb.innerHTML = window.makeOrbAvatar(safe, 28);
        }
      }
      // Atualiza quando o nome mudar (via input do usuário)
      window.addEventListener('storage', (e) => {
        if (e.key === 'di_userName' || e.key === 'userName') {
          updateOrbs(e.newValue);
        }
      });
      // Pega o nome atual
      const currentName = localStorage.getItem('di_userName') || 'Convidado';
      updateOrbs(currentName);

    })();
  </script>
