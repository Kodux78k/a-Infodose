<!doctype html><html lang="pt-BR"><meta charset="utf-8"/>
<title>3×6×9×7 = ♾️</title>
<style>html,body{margin:0;height:100%;background:#0a0a0a;color:#eee;font-family:monospace;display:flex;align-items:center;justify-content:center}
#f{position:absolute;top:12px;left:0;right:0;text-align:center;color:#3cf}</style>
<canvas id="c" width="640" height="640"></canvas><div id="f">VERDADE × INTEGRAR ÷ Δ = ∴</div>
<script>
const k={W:640,H:640,ctx:null,t:0,base:[51,204,255]},C=document.getElementById("c"),X=C.getContext("2d");
function rc(a,b,t){return a.map((v,i)=>Math.round(v+(b[i]-v)*t))}
function css(r,a=1){return`rgba(${r[0]},${r[1]},${r[2]},${a})`}
function circ(x,y,r,col){X.beginPath();X.arc(x,y,r,0,2*Math.PI);X.fillStyle=col;X.shadowColor=col;X.shadowBlur=r*.4;X.fill();X.shadowBlur=0}
function fract(x,y,r,d){if(d<=0||r<1)return;let a=.4+.6*Math.sin(k.t*.01+d);let col=css(rc(k.base,[255,255,255],d/7),a);circ(x,y,r,col);
  let n=7,st=2*Math.PI/n,cr=r*.4;for(let i=0;i<n;i++){let ang=i*st+k.t*.002*d,pu=Math.sin(k.t*.02+i)*r*.12;fract(x+(r+pu)*Math.cos(ang),y+(r+pu)*Math.sin(ang),cr,d-1)}}
function draw(t){k.t=t||0;X.clearRect(0,0,k.W,k.H);fract(k.W/2,k.H/2,120,7);requestAnimationFrame(draw)}requestAnimationFrame(draw);
</script></html>
