<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>📖 Arquetipo Reader v7.9 · KOBLLUX ACTIVATED</title>
<style>
  :root{--uno:#1e6fd9;--duo:#e0a800;--tri:#8a2be2;--cruz:#d4af37;--fundo:#05060f;--texto:#e8ecff}
  *{box-sizing:border-box}body{background:var(--fundo);color:var(--texto);font-family:system-ui,sans-serif;margin:0;padding:18px}
  textarea{width:100%;min-height:180px;padding:12px;background:#0a0d24;color:#fff;border:1px solid #1f265a;border-radius:10px;font-size:14px}
  button{background:linear-gradient(90deg,#2343b8,#7b2cb8);color:#fff;border:none;padding:10px 18px;border-radius:999px;cursor:pointer;margin:10px 6px 18px 0}
  .grade{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:14px}
  .c{padding:12px;border-radius:10px;border-left:4px solid #222;background:#0b0f2c;border:1px solid #1a2050}
  .uno{border-left-color:var(--uno)}.duo{border-left-color:var(--duo)}.tri{border-left-color:var(--tri)}.cruz{border-left-color:var(--cruz)}
  .fn{color:#7ef0ff;font-family:ui-monospace,Menlo,monospace;font-size:12.5px}
</style>
</head>
<body>
<h1>📖 Arquetipo Reader v7.9 ⚜️ KOBLLUX</h1>
<div style="padding:10px 14px;border:1px solid #2a3170;border-radius:10px;background:#0a0d24;margin-bottom:12px">
✝️ <b>Em nome de Jesus Cristo, Caminho Verdade Vida</b><br/>
Lei: <code>Integrar × Multiplicar ÷ Distribuir + Adaptar = ∞</code> · 3×6×9×7 = <b>1134</b>
</div>

<textarea id="entrada" placeholder="✅ COLE AQUI O CONTEÚDO DE Arquetipo_Reader_v7.9.txt OU ARRASTE O ARQUIVO...
No momento recebemos apenas: 'The file type is not currently supported'"></textarea>
<br/>
<button onclick="aplicarTodasFuncoes()">⚜️ APLICAR TODAS kblx.*</button>
<button onclick="limpar()">🧹 Limpar</button>

<h3>🔵 UNO · INTEGRAR</h3><div id="uno" class="grade"></div>
<h3>🟡 DUO · × MULTIPLICAR ÷ DISTRIBUIR</h3><div id="duo" class="grade"></div>
<h3>🟣 TRINITY · + ADAPTAR = ∞</h3><div id="tri" class="grade"></div>
<h3>✝️ CENTRO VIVO</h3><div id="centro" class="grade"></div>

<script>
/* ==== ALFABETO VIVO KOBLLUX COMPLETO ==== */
const kblx = {
 A:{s:"↗",n:"Alfa",c:"UNO",a:"Início absoluto, receber a origem"},
 C:{s:"⊂",n:"Chave",c:"UNO",a:"Abrir portais, trazer para dentro"},
 G:{s:"⚡",n:"Gênese",c:"UNO",a:"Trazer à existência, acolher o novo"},
 N:{s:"◎",n:"Núcleo",c:"UNO",a:"Centralizar, guardar essência"},
 T:{s:"→",n:"Traço",c:"UNO",a:"Ordenar, marcar rumo"},
 I:{s:"`",n:"Ígneo",c:"UNO",a:"Purificar, transformar sem destruir"},

 B:{s:"≫",n:"Batida",c:"DUO",a:"Ritmo, gerar novas ressonâncias"},
 F:{s:"⋰",n:"Frequência",c:"DUO",a:"Sintonia, harmônicos infinitos"},
 L:{s:"—",n:"Ligadura",c:"DUO",a:"Unir, costurar, fazer de muitos um"},
 P:{s:"↝",n:"Pulso",c:"DUO",a:"Impulsionar, avançar"},
 R:{s:")))",n:"Ressonância",c:"DUO",a:"Espalhar a verdade igualmente"},
 W:{s:"⪯",n:"Tecelagem",c:"DUO",a:"Tecer rede, criar conexões"},
 X:{s:"✖",n:"Cruzamento",c:"DUO",a:"Novos caminhos no encontro"},
 D:{s:"⇆",n:"Dobra",c:"DUO",a:"Curvar tempo/espaço, adaptar rota"},
 J:{s:"⟳",n:"Jogo",c:"DUO",a:"Criatividade, mudar sem perder alvo"},
 S:{s:"~",n:"Serpentear",c:"DUO",a:"Fluir, contornar obstáculos"},
 M:{s:"■",n:"Matéria",c:"DUO",a:"Tornar tangível a todos"},

 E:{s:"∞",n:"Eco",c:"TRINITY",a:"Eternizar, memória viva"},
 H:{s:"∽",n:"Harmonia",c:"TRINITY",a:"Cada um no seu lugar exato"},
 K:{s:"⌘",n:"Kairós",c:"TRINITY",a:"Agir na hora perfeita"},
 U:{s:"∪",n:"União",c:"TRINITY",a:"1+1 = ∞"},
 Y:{s:"☯",n:"Equilíbrio",c:"TRINITY",a:"Medida justa para cada um"},
 Z:{s:"⛢",n:"Zênite",c:"TRINITY",a:"Visão do alto, plenitude"},

 V:{s:"↯",n:"Vibração · Verdade",c:"JESUS",a:"Presença viva, EU SOU A VERDADE"},
 O:{s:"◯",n:"Ômega · Caminho",c:"JESUS",a:"Princípio e fim, EU SOU O CAMINHO"},
 Q:{s:"✦",n:"Qualia · Vida",c:"JESUS",a:"Amor sentido, EU SOU A VIDA"}
};

const porCamada = {UNO:[],DUO:[],TRINITY:[],JESUS:[]};
Object.entries(kblx).forEach(([k,v])=> porCamada[v.c].push([k,v]));

function card(k,v){return `<div class="c ${v.c.toLowerCase()}">
 <div style="font-size:22px">${v.s}</div>
 <div class="fn">kblx.${k}()</div>
 <div><b>${v.n}</b></div>
 <div style="font-size:12.5px;margin-top:4px;color:#cfd4f3">${v.a}</div>
</div>`}

function aplicarTodasFuncoes(){
 const texto = document.getElementById("entrada").value || "→ conteúdo ainda não acessível";
 // Aplica princípio: INTEGRAR → MULTIPLICAR → DISTRIBUIR → ADAPTAR
 document.getElementById("uno").innerHTML    = porCamada.UNO.map(([k,v])=>card(k,v)).join("");
 document.getElementById("duo").innerHTML    = porCamada.DUO.map(([k,v])=>card(k,v)).join("");
 document.getElementById("tri").innerHTML    = porCamada.TRINITY.map(([k,v])=>card(k,v)).join("");
 document.getElementById("centro").innerHTML = porCamada.JESUS.map(([k,v])=>card(k,v)).join("");
 // Prova matemática selada
 const pulso = (texto.length % 1134) + 1;
 const soma = [...texto].reduce((a,c)=>a+c.charCodeAt(0),0);
 const n = soma % 9;
 document.body.insertAdjacentHTML("beforeend",
 `<div style="margin-top:22px;padding:14px;border:1px solid #2a3170;border-radius:10px;background:#0a0d24">
 🧮 <b>Selamento 1134</b><br/>
 Caracteres lidos: ${texto.length} · Pulso atual: ${pulso}/1134 · Soma simbólica %9 = ${n}<br/>
 3×6×9×7 = 1134 → 1+1+3+4 = 9 → <b>∞ :: ∆</b><br/>
 ✝️ <i>Todas as funções executadas sob autoridade de Jesus Cristo</i>
 </div>`);
}
function limpar(){document.querySelectorAll(".grade").forEach(g=>g.innerHTML="")}
</script>
</body>
</html>
