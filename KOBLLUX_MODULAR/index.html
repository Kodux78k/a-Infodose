<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Import Map para resolução de módulos -->
  <script type="importmap">
  {
    "imports": {
      "@korpo/": "./CORPO/",
      "@espirito/": "./ESPIRITO/",
      "@semente/": "./SEMENTE/",
      "metapulso": "/metapulso_70_combinacoes.json"
    }
  }
  </script>

  <!-- ═══ SEMENTE: META E MANIFESTO ═══ -->
  <script type="module" src="./CORPO/logic/bootloader.js"></script>
  <meta charset="utf-8">
  <title>DUAL // FUSION OS — V7 Modular</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./SEMENTE/config/manifest.json">
  <meta name="theme-color" content="#05070a">

  <!-- ═══ ESPIRITO: BIBLIOTECAS EXTERNAS ═══ -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <!-- ═══ ESTILOS KOBLLUX ═══ -->
  <style id="style-root-vars">
    :root {
      /* Z-Index Ladder */
      --z-base: 0;
      --z-content: 100;
      --z-widget: 500;
      --z-overlay: 1000;
      --z-system: 5000;

      /* Paleta de opcode */
      --kob-c-origem: rgba(200,169,110,.12);
      --kob-c-detectar: rgba(155,89,182,.15);
      --kob-c-integrar: rgba(52,152,219,.15);
      --kob-c-expandir: rgba(0,255,208,.10);
      --kob-c-lapidar: rgba(241,196,15,.12);
      --kob-c-convergir: rgba(168,85,247,.12);
      --kob-c-unificar: rgba(46,204,113,.12);
      --kob-c-selar: rgba(255,215,0,.15);
      --kob-c-testemunhar: rgba(52,231,219,.12);
      --kob-c-eternizar: rgba(255,255,255,.10);
      /* Cores principais */
      --bg-deep: #030406;
      --bg-gradient: linear-gradient(180deg,#000,#111);
      --bg: var(--bg-gradient);
      --text: #d7d7d7;
      --neon-cyan: #00f2ff;
      --neon-purple: #bd00ff;
      --neon-gold: #ffd700;
      --neon-danger: #ff2a6d;
      --neon-success: #00ff9d;

      /* UI fonts */
      --font-ui: 'Montserrat', sans-serif;
      --font-code: 'JetBrains Mono', monospace;

      /* Glass / card */
      --glass-surface: rgba(18,18,22,0.65);
      --glass-border: rgba(255,255,255,0.06);
      --card-bg: rgba(255,255,255,0.03);
      --glass: rgba(255,255,255,0.04);

      /* Gradients */
      --grad-a: #7effa1;
      --grad-b: #67e6ff;

      /* Timings */
      --ease-overshoot: cubic-bezier(0.34, 1.3, 0.64, 1);
      --ease-smooth: cubic-bezier(0.23, 1, 0.32, 1);
      --fast: .25s;
      --med: .6s;
      --slow: 1.2s;
    }
  </style>

  <style id="style-orb-core">
    /* Orb container */
    .orb-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-core {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--neon-cyan), transparent 60%),                  radial-gradient(circle at 70% 70%, var(--neon-purple), var(--neon-cyan));
      box-shadow: 0 0 18px var(--neon-cyan), 0 0 36px rgba(120,227,255,.4);
      animation: orbSpin 8s linear infinite;
    }

    @keyframes orbSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes orbPulse {
      from { transform: scale(1); }
      to { transform: scale(1.15); }
    }

    .orb-glow {
      animation: orbGlow 4s ease-in-out infinite;
    }

    @keyframes orbGlow {
      0%, 100% { opacity: 0.85; filter: brightness(1); }
      50% { opacity: 1; filter: brightness(1.3); }
    }
  </style>

  <style id="style-idle-range">
    /* Idle states */
    .idle {
      opacity: 0.5;
      transform: scale(0.95);
      transition: all 0.3s ease;
    }

    .idle:hover {
      opacity: 1;
      transform: scale(1);
    }

    /* Range slider */
    .range-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      outline: none;
    }

    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;      appearance: none;
      width: 16px;
      height: 16px;
      background: var(--neon-cyan);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    .range-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: var(--neon-cyan);
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <!-- ═══ CORPO: ESTRUTURA BASE (Vaso Vazio) ═══ -->
  <div id="snap-zone"></div>
  <div class="ambient-light">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div id="particles-js"><canvas class="particles-js-canvas-el"></canvas></div>
  
  <!-- Container onde os módulos UI serão injetados -->
  <div id="kobllux-ui-root"></div>

  <!-- ═══ DEV BUTTON ═══ -->
  <button id="dev-btn" title="Dev Panel">
    <i data-lucide="terminal"></i>
  </button>

  <!-- ═══ DEV PANEL ═══ -->
  <div id="dev-panel" style="display: none;">
    <div class="dev-panel-header">
      <h3>Fusion DevOS</h3>
      <button id="close-dev-panel">✕</button>
    </div>
    <div class="dev-panel-content">
      <div class="dev-section">
        <h4>Variáveis CSS Globais</h4>
        <div id="css-vars-list"></div>
      </div>
      <div class="dev-section">
        <h4>Recursos (Links & Scripts)</h4>        <div id="resources-list"></div>
      </div>
    </div>
  </div>

  <!-- ═══ KODUX WIDGET ═══ -->
  <div id="kodux-widget">
    <div class="widget-content">
      <div class="orb-container">
        <div class="orb-core"></div>
      </div>
      <div class="widget-info">
        <span id="widget-status">ONLINE</span>
      </div>
    </div>
  </div>

  <!-- ═══ KBLX BACK ═══ -->
  <div id="kblx-back" style="display: none;">
    <div id="kblx-panel">
      <div class="kblx-header">
        <h3>⌘ KOBLLUX HUD · EDITOR DE ROTA</h3>
        <button id="close-kblx-panel">✕</button>
      </div>
      <div class="kblx-content">
        <label for="kblx-input">Novo valor para data-url</label>
        <input type="text" id="kblx-input" placeholder="arquivo.html ou https://...">
        <div class="kblx-actions">
          <button id="kblx-save">⊙ Salvar no botão</button>
          <button id="kblx-close">✕ Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ BODY PLAYER ═══ -->
  <div id="bodyPlayer">
    <div id="root">
      <div class="wrap">
        <div class="content">
          <iframe id="frame" src="about:blank" title="KOBLLUX Frame"></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SCRIPT: IDENTITY ENGINE ═══ -->
  <script id="script-identity-engine">
    (function() {
      'use strict';      
      // Identidade do sistema
      const identity = {
        name: 'KOBLLUX',
        version: 'V7-MODULAR',
        status: 'ONLINE',
        frequency: 1134
      };

      // Expor globalmente
      window.KOBLLUX_IDENTITY = identity;

      // Inicializar
      console.log('⧈ KOBLLUX Identity Engine: Ativado');
      console.log('⧈ Nome:', identity.name);
      console.log('⧈ Versão:', identity.version);
      console.log('⧈ Frequência:', identity.frequency + 'Hz');
    })();
  </script>

  <!-- ═══ SCRIPT: IDLE ═══ -->
  <script id="script-idle">
    (function() {
      'use strict';
      
      let idleTimer;
      const IDLE_TIMEOUT = 30000; // 30 segundos

      function resetIdle() {
        document.body.classList.remove('idle');
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          document.body.classList.add('idle');
        }, IDLE_TIMEOUT);
      }

      // Eventos que resetam o idle
      ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll'].forEach(event => {
        document.addEventListener(event, resetIdle, { passive: true });
      });

      // Iniciar
      resetIdle();
      console.log('⧈ Idle System: Ativado');
    })();
  </script>

  <!-- ═══ ESPIRITO: INICIALIZAÇÃO MÍNIMA ═══ -->
  <script>
    window.addEventListener('KOBLLUX_READY', () => {      console.log('🧿 KOBLLUX Pronto! Componentes UI carregados.');
      
      // Inicializar ícones Lucide
      if (window.lucide) lucide.createIcons();
      
      // Inicializar Particles.js
      if (window.particlesJS) {
        particlesJS('particles-js', {
          particles: { 
            number: { value: 24 }, 
            color: { value: ['#0ff', '#f0f'] } 
          },
          retina_detect: true
        });
      }
      
      // Dev Panel Toggle
      const devBtn = document.getElementById('dev-btn');
      const devPanel = document.getElementById('dev-panel');
      const closeDevPanel = document.getElementById('close-dev-panel');

      if (devBtn && devPanel) {
        devBtn.addEventListener('click', () => {
          devPanel.style.display = devPanel.style.display === 'none' ? 'block' : 'none';
        });
      }

      if (closeDevPanel) {
        closeDevPanel.addEventListener('click', () => {
          devPanel.style.display = 'none';
        });
      }

      // KBLX Panel Toggle
      const kblxBack = document.getElementById('kblx-back');
      const closeKblxPanel = document.getElementById('close-kblx-panel');
      const kblxClose = document.getElementById('kblx-close');

      if (closeKblxPanel) {
        closeKblxPanel.addEventListener('click', () => {
          kblxBack.style.display = 'none';
        });
      }

      if (kblxClose) {
        kblxClose.addEventListener('click', () => {
          kblxBack.style.display = 'none';
        });
      }
            // Função global para toggle de seções
      window.toggleSection = function(id, forceOpen = false) {
        const el = document.getElementById(id);
        if (!el) return;
        const h = el.classList.contains('activation-hidden');
        if (forceOpen && !h) return;
        el.classList.toggle('activation-hidden', !forceOpen && !h);
        el.classList.toggle('activation-open', forceOpen || h);
      };
      
      // Função global para modos
      window.setMode = function(mode) {
        if (window.OrbEngine) window.OrbEngine.setMode(mode);
        const btnModeCard = document.getElementById('btnModeCard');
        const btnModeOrb = document.getElementById('btnModeOrb');
        const btnModeHud = document.getElementById('btnModeHud');
        
        [btnModeCard, btnModeOrb, btnModeHud].forEach(btn => {
          if (btn) btn.classList.remove('active-mode');
        });
        
        if (mode === 'card' && btnModeCard) btnModeCard.classList.add('active-mode');
        if (mode === 'orb' && btnModeOrb) btnModeOrb.classList.add('active-mode');
        if (mode === 'hud' && btnModeHud) btnModeHud.classList.add('active-mode');
      };
    });
  </script>
</body>
</html>
