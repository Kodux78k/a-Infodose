<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nicole & Luca · Save The Date</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Italiana&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f6f2;
  --ink: #8a7f75;
  --accent: #d4af37;
  --shadow: rgba(138, 127, 117, 0.15);
  --shadow-pulse: rgba(138, 127, 117, 0.35);
}

* { margin: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  overflow: hidden;
  perspective: 1000px; /* Adicionado para profundidade do 3D */
}

/* CARTÃO PRINCIPAL */
.invitation {
  width: min(90vw, 500px);
  aspect-ratio: 3/4;
  position: relative;
  background: var(--bg);
  border-radius: 2px;
  overflow: hidden; /* Mantém os assets dentro do card */
  /* Combinação de pulso da sombra e flutuação */
  animation: cinematicDepth 12s ease-in-out infinite;
}

@keyframes cinematicDepth {
  0%, 100% {
    transform: translateY(0) rotateX(0deg);
    box-shadow: 0 30px 60px var(--shadow);
  }
  50% {
    transform: translateY(-8px) rotateX(1.5deg);
    box-shadow: 0 45px 90px var(--shadow-pulse);
  }
}

/* CORTINAS PNG */
/* Substitua a URL abaixo pelo seu Base64 no futuro */
.cortinas {
  position: absolute;
  inset: 0;
  background-image: url('https://infodose.com.br/NL/img/Cortinas-CR-NL.PNG');
  background-size: cover;
  background-position: center;
  opacity: 0.5;
  mix-blend-mode: multiply;
  animation: breath 16s ease-in-out infinite;
  z-index: 1;
}

@keyframes breath {
  0%, 100% { opacity: 0.45; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(1.03); }
}

/* PALMEIRAS SVG INLINE ANIMADAS */
.palm {
  position: absolute;
  top: 0; 
  bottom: 0;
  width: 45%;
  height: 100%;
  opacity: 0.6;
  filter: blur(0.3px);
  z-index: 2;
  pointer-events: none;
  /* Animação contínua de balanço */
  animation: sway 12s ease-in-out infinite;
}

.palm path {
  /* Configuração para o efeito After Effects (Draw Path) */
  stroke-dasharray: 1200; 
  stroke-dashoffset: 1200;
  animation: drawPath 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.palm.left { 
  left: 0; 
  --base-transform: scaleX(-1); /* Inverte a palmeira esquerda */
}

.palm.right { 
  right: 0; 
  --base-transform: scaleX(1); 
  animation-delay: -6s; /* Dessincroniza o balanço */
}

.palm.right path {
  animation-delay: 0.5s; /* Atrasa o desenho da segunda palmeira */
}

@keyframes drawPath {
  to { stroke-dashoffset: 0; }
}

@keyframes sway {
  0%, 100% { transform: var(--base-transform) translateX(0) rotate(0deg); }
  50% { transform: var(--base-transform) translateX(3px) rotate(0.5deg); }
}

/* SHIMMER DOURADO */
.invitation::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(212,175,55,.08) 48%, rgba(212,175,55,.15) 50%, rgba(212,175,55,.08) 52%, transparent 70%);
  background-size: 200% 100%;
  animation: shimmer 8s ease-in-out infinite;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 15;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* LOGO NL PNG */
/* Substitua a URL abaixo pelo seu Base64 no futuro */
.logo-nl {
  position: absolute;
  top: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  height: 140px;
  background-image: url('https://infodose.com.br/NL/img/NL_[2].png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  mix-blend-mode: multiply;
  z-index: 10;
  animation: embossLogo 6s ease-in-out infinite, fadeInLogo 3s ease-out forwards;
  opacity: 0;
}

@keyframes fadeInLogo {
  to { opacity: 1; }
}

@keyframes embossLogo {
  0%, 100% { 
    filter: drop-shadow(0 4px 12px var(--shadow)) brightness(1); 
    transform: translateX(-50%) scale(1); 
  }
  50% { 
    filter: drop-shadow(0 8px 24px rgba(212,175,55,.4)) brightness(1.05); 
    transform: translateX(-50%) scale(1.03); 
  }
}

/* TEXTOS E CONTEÚDO EM CASCATA */
.content {
  position: absolute;
  top: 55%; /* Levemente ajustado para balancear com a logo */
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: var(--ink);
  width: 80%;
  z-index: 10;
}

.content > div {
  opacity: 0;
  transform: translateY(15px);
  animation: fadeInUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

.save { font-size: 0.75rem; letter-spacing: 0.3em; margin-bottom: 2rem; font-weight: 300; animation-delay: 1.5s; }
.names { font-family: 'Italiana', serif; font-size: 2.6rem; line-height: 1.1; margin-bottom: 1.5rem; animation-delay: 2s; }
.date { font-size: 0.9rem; letter-spacing: 0.1em; margin-bottom: 0.5rem; animation-delay: 2.5s; }
.place { font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0.7; animation-delay: 3s; }

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>
<body>

  <div class="invitationn" id="card">
    
    <!-- Camada de fundo animada -->
    <div class="cortinas" id="cortinasBg"></div>

    <!-- Palmeira Esquerda (SVG Inline) -->
    <svg class="palm left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="none">
      <path fill="none" stroke="#e8e3dc" stroke-width="1.5" d="M50 400C55 350 60 300 65 250c5-40 10-80 15-120-5-10-10-20-15-30-10-15-20-25-35-30M50 400c-5-50-10-100-15-150-5-40-10-80-15-120 5-10 10-20 15-30 10-15 20-25 35-30M65 250c10-5 20-10 30-12 15-3 30-2 45 2M50 250c-10-5-20-10-30-12-15-3-30-2-45 2"/>
    </svg>

    <!-- Palmeira Direita (SVG Inline) -->
    <svg class="palm right" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="none">
      <path fill="none" stroke="#e8e3dc" stroke-width="1.5" d="M50 400C55 350 60 300 65 250c5-40 10-80 15-120-5-10-10-20-15-30-10-15-20-25-35-30M50 400c-5-50-10-100-15-150-5-40-10-80-15-120 5-10 10-20 15-30 10-15 20-25 35-30M65 250c10-5 20-10 30-12 15-3 30-2 45 2M50 250c-10-5-20-10-30-12-15-3-30-2-45 2"/>
    </svg>

    <!-- Logo NL -->
    <div class="logo-nl"></div>

    <!-- Textos com entrada em cascata -->
    <div class="content">
      <div class="save">SAVE THE DATE</div>
      <div class="names">Nicole & Luca</div>
      <div class="date">27 de fevereiro de 2027</div>
      <div class="place">SALVADOR – BAHIA</div>
    </div>
    
  </div>

<script>
// 528HZ VIBE - Auto play no click (sem alterações)
document.addEventListener('click', () => {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = 528;
  gain.gain.setValueAtTime(0,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.1,ctx.currentTime+.5);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+3);
}, {once:true});
</script>
</body>
</html>
