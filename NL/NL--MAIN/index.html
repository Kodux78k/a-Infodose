<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Nicole & Luca · Save The Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Italiana&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- CONTAINER PRINCIPAL (vídeo + cartão) -->
  <div id="scene">
    
    <!-- VÍDEO DE FUNDO (tela cheia) -->
    <video id="bgVideo" autoplay loop muted playsinline>
      <source src="https://infodose.com.br/NL/img/palmeiras_loop_perfeito.mp4" type="video/mp4">
    </video>

    <!-- CARTÃO (logo e texto) -->
    <div class="invitation" id="card">
      <div class="logo-nl"></div>
      <div class="content-text">
        <div class="save">SAVE THE DATE</div>
        <div class="names">Nicole &amp; Luca</div>
        <div class="date">27 de fevereiro de 2027</div>
        <div class="place">SALVADOR – BAHIA</div>
      </div>
    </div>

  </div>

  <!-- SCROLL (para ativar o parallax) -->
  <div id="scrollArea"></div>

  <!-- CHECKLIST -->
  <button class="btn-checklist" id="btnChecklist" aria-label="Abrir checklist">
    <span class="icon">✓</span> Checklist
  </button>

  <div class="checklist-overlay" id="checklistOverlay">
    <div class="checklist-panel">
      <h2>✦ Lista de Serviços ✦</h2>
      <div class="sub">Marque os itens já reservados</div>
      <!-- itens... -->
      <button class="checklist-close" id="btnCloseChecklist">Fechar</button>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/gesture.js"></script>
  <script src="js/checklist.js"></script>



 
  <!-- PLAYER (opcional – descomente se for usar) -->
  <!-- 
  <div id="bodyPlayer" data-mode="player" ...> ... </div>
  <script src="player/js/db.js"></script>
  <script src="player/js/archetypes.js"></script>
  <script src="player/js/player.js"></script>
  <script src="player/js/idle.js"></script>
  <script> document.addEventListener('DOMContentLoaded', initKoduxPlayer); </script>
  -->
</body>
</html>
