<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KOBLLUX Bundle Builder</title>

<style>
body{
    margin:20px;
    background:#111;
    color:#0ff;
    font-family:monospace;
}
textarea{
    width:100%;
    height:180px;
    margin:10px 0;
    background:#000;
    color:#0f0;
}
button{
    padding:10px 20px;
    cursor:pointer;
}
pre{
    white-space:pre-wrap;
    background:#000;
    padding:10px;
    max-height:250px;
    overflow:auto;
}
</style>

</head>
<body>

<h2>78K Bundle Builder</h2>

<textarea id="urls">
https://www.infodose.com.br/js/modules/78K_eliza.js
https://www.infodose.com.br/js/modules/Kmotor.js
https://www.infodose.com.br/js/modules/kdx-perf-container.js
https://www.infodose.com.br/js/kxt-insert.js
</textarea>

<button id="gerar">GERAR BUNDLE</button>
<button id="baixar">BAIXAR bundle.js</button>

<pre id="status"></pre>

<textarea id="resultado"></textarea>

<script>
const status=document.getElementById("status");
const resultado=document.getElementById("resultado");

document.getElementById("gerar").onclick=async()=>{

    resultado.value="";
    status.textContent="";

    const urls=document.getElementById("urls")
        .value
        .split("\n")
        .map(v=>v.trim())
        .filter(Boolean);

    let bundle="";

    for(const url of urls){

        status.textContent+="Baixando "+url+"\n";

        try{

            const txt=await fetch(url).then(r=>r.text());

            bundle+=`
//====================================================
// ${url}
//====================================================

${txt}

`;

        }catch(e){

            bundle+=`
// ERRO AO LER ${url}

`;

        }

    }

    resultado.value=bundle;

    status.textContent+="\nConcluído.";

};

document.getElementById("baixar").onclick=()=>{

    const blob=new Blob(
        [resultado.value],
        {type:"application/javascript"}
    );

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);
    a.download="bundle.js";
    a.click();

    URL.revokeObjectURL(a.href);

};
</script>

</body>
</html>
