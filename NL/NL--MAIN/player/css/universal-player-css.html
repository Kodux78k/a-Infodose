      --kob-voice-bg: rgba(10, 12, 20, 0.7);

    /* --- ÍCONES SVG POLIDOS --- */
    .icon {
      width: 1em; height: 1em;
      fill: none; stroke: currentColor;
      /* Deixando os ícones mais finos e elegantes */
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      display: inline-block; vertical-align: middle;
      transition: all 0.2s ease;
    }
    .icon-fill { fill: currentColor; stroke: none; }
    .w-3 { width: 0.875rem; height: 0.875rem; }
    .icon-4xl { font-size: 2.25rem; width: 2.25rem; height: 2.25rem; }

    /* --- LAYOUT GLOBAL & UTILITÁRIOS --- */

      position: relative; width: 100%; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; overflow: hidden;

    .bg-overlay {
      position: absolute; inset: 0; z-index: var(--z-base);
      opacity: 0.1; pointer-events: none; display: flex;
      align-items: center; justify-content: center; user-select: none;

    .off-screen { position: absolute; left: -9999px; }
    .text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spin { animation: spin 4s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .transition-base { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .transition-transform { transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .hover-scale:hover { transform: scale(1.05); }
    .hover-scale-lg:hover { transform: scale(1.10); }

    .v-glass {
      background: var(--kob-glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--kob-glass-border);
      border-radius: 1.25rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);

    .layout-padding { padding: 7rem 1.5rem 0 1.5rem; }
    .container { max-width: 64rem; margin: 0 auto; padding-bottom: 6rem; }
    
    .d-flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .items-end { align-items: flex-end; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .gap-sm { gap: 0.75rem; }
    .gap-md { gap: 1.25rem; }
    
    .mb-sm { margin-bottom: 0.75rem; }
    .mb-md { margin-bottom: 1.5rem; }

    .text-title { font-size: 2.25rem; font-weight: 200; letter-spacing: -0.05em; line-height: 1; }
    .text-subtitle { font-size: 0.75rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.35rem; font-weight: 600; }
    .text-right { text-align: right; }
    .text-count { font-size: 1.875rem; font-weight: 700; letter-spacing: -0.05em; line-height: 1; color: var(--kob-voice-primary); }
    .text-label-sm { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; }
    .font-mono { font-family: ui-monospace, SFMono-Regular, monospace; }

    .scroll-x { overflow-x: auto; scrollbar-width: none; }
    .scroll-x::-webkit-scrollbar { display: none; }
    .w-max { width: max-content; }
    .pb-xs { padding-bottom: 0.5rem; }
    .pb-sm { padding-bottom: 1rem; }
    .snap-x { scroll-snap-type: x mandatory; }

    .dt-tab { 
      border-radius: 2rem; 
      padding: 0.5rem 1rem; 
      border: 1px solid transparent; 
      background: rgba(255,255,255,0.02); 
    }
    .dt-tab-on { 
      background: color-mix(in srgb, var(--kob-voice-primary) 15%, transparent); 
      border-color: color-mix(in srgb, var(--kob-voice-primary) 40%, transparent); 
      color: var(--kob-voice-primary); 
    }
    .text-tab { font-size: 11px; white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; font-weight: 500; }

    .panel-header {
      padding: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem;
      border: 1px solid color-mix(in srgb, var(--kob-voice-primary) 20%, transparent);
    }
    .text-icon-lg { font-size: 1.5rem; color: var(--kob-voice-primary); }
    .text-panel-title { font-size: 0.875rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--kob-voice-primary); }
    .text-panel-desc { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 0.25rem; }

    .grid-matriz { display: grid; gap: 1.25rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    .space-y-6 > * + * { margin-top: 1.5rem; }

    .gh-form { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; padding: 1rem; }
    .input-gh {
      flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--kob-glass-border);
      border-radius: 1rem; padding: 0.75rem 1rem; font-size: 0.875rem; color: white; outline: none; transition: all 0.3s ease;

    .input-gh::placeholder { color: rgba(255,255,255,0.3); }
    .input-gh:focus { border-color: var(--kob-voice-primary); box-shadow: 0 0 10px color-mix(in srgb, var(--kob-voice-primary) 20%, transparent); }
    .btn-gh {
      font-size: 0.875rem; padding: 0.75rem 1.25rem; border-radius: 1rem;
      background: color-mix(in srgb, var(--kob-voice-primary) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--kob-voice-primary) 30%, transparent); color: var(--kob-voice-primary);
    }
    .helper-text { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 1rem; text-align: center; }

    /* --- GLOBAL PLAYER OVERLAY (ARREDONDADO) --- */
    .player-window-controls { position: absolute; top: 1rem; right: 1rem; z-index: 20; display: flex; gap: 0.5rem; }
    .btn-win {
      width: 2.25rem; height: 2.25rem; border-radius: 50%; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--kob-glass-border); transition: all 0.2s ease; color: white;
    }
    .btn-win:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
    .btn-win.hover-red:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.5); color: #ff5252; }

    /* Containers do iFrame arredondados */
    .player.botao { position: relative; width: 100%; height: 100%; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .player-bg { width: 100%; height: 100%; background: black; border-radius: 1.5rem; overflow: hidden; }
    .yt-overlay { position: absolute; inset: 0; z-index: 10; border-radius: 1.5rem; overflow: hidden; }

    /* --- IDLE & DOCK COMPONENT --- */
    .kob-tts-dock, #kodux-widget, [data-idle-target] {
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.6s ease;
      will-change: transform, opacity; box-shadow: none !important; position: absolute;
    }
    .kob-tts-dock.idle, #kodux-widget.idle, [data-idle-target].idle { opacity: 0.2; transform: scale(0.85); }
    .kob-tts-dock:hover, #kodux-widget:hover, [data-idle-target]:hover { opacity: 1; transform: scale(1); }

    .text-title-sm { font-size: 12px; font-weight: 700; color: white; letter-spacing: 0.02em; }

    .btn-play-prev { color: white; z-index: 10; }
    .btn-play-prev:hover { color: var(--kob-voice-primary); }

    #content-footer { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; border-radius: inherit; overflow: hidden; }
    .progress-area { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
    .progress-fill { height: 100%; background: var(--kob-voice-primary); width: 0; box-shadow: 0 0 12px var(--kob-voice-primary); transition: width 0.1s linear; }
    .footer-body { flex: 1; display: flex; align-items: center; padding: 0 1.5rem; gap: 1.25rem; }

    .btn-collapse:hover { color: white; background: rgba(255,255,255,0.1); }

    .input-wrap { flex: 1; position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--kob-voice-muted); }
    
    /* Inputs super arredondados */

    .glass-inp:focus { border-color: var(--kob-voice-primary); outline: none; box-shadow: 0 0 15px color-mix(in srgb, var(--kob-voice-primary) 15%, transparent); }
    
    .glass-sel { border-radius: 1.5rem; padding: 0 1rem; font-size: 0.875rem; min-width: 135px; height: 46px; background: rgba(0,0,0,0.3); border: 1px solid var(--kob-glass-border); color: white; }
    
    .btn-action { padding: 0 1.25rem; border-radius: 1.5rem; background: var(--kob-voice-primary); color: #0a0c14; box-shadow: 0 8px 20px color-mix(in srgb, var(--kob-voice-primary) 30%, transparent); height: 46px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; border: none; }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 12px 25px color-mix(in srgb, var(--kob-voice-primary) 40%, transparent); }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-head h3 { font-size: 1rem; font-weight: 700; color: white; }

    .list-group { display: flex; flex-direction: column; gap: 1rem; }

    .bottom-dock { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(10,12,20,0.85); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border-top: 1px solid var(--kob-glass-border); padding: 1.5rem; }

    .dock-flex { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
